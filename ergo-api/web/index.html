<!doctype html>
<html lang="en" class="theme-dark">
<head>
<meta charset="utf-8">
<title>Ergo Node</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/tokens.css">
<link rel="stylesheet" href="/components.css">
<link rel="stylesheet" href="/dashboard.css">
</head>
<body>
<div class="app">
  <nav class="side" aria-label="primary">
    <div class="side__brand">
      <span class="side__mark" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M12 2.2 21.8 12 12 21.8 2.2 12 12 2.2Zm0 4.6L6.8 12l5.2 5.2 5.2-5.2L12 6.8Z"/></svg></span>
      <span class="side__product">
        <b>Ergo Node</b>
        <span id="side-net" class="side__net"></span>
      </span>
    </div>
    <div class="side__nav">
      <div class="side__group-label">Operate</div>
      <a class="side__link" href="#overview" data-section="overview"><span class="side__glyph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="7" height="7" rx="1.6"/><rect x="13.5" y="3.5" width="7" height="7" rx="1.6"/><rect x="3.5" y="13.5" width="7" height="7" rx="1.6"/><rect x="13.5" y="13.5" width="7" height="7" rx="1.6"/></svg></span>Overview</a>
      <a class="side__link" href="#explorer" data-section="explorer"><span class="side__glyph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="6.5"/><path d="m20.5 20.5-4.9-4.9"/></svg></span>Explorer</a>
      <a class="side__link" href="#peers" data-section="peers"><span class="side__glyph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5.5" r="2.4"/><circle cx="5.5" cy="18" r="2.4"/><circle cx="18.5" cy="18" r="2.4"/><path d="M10.9 7.6 6.7 15.9m6.4-8.3 4.2 8.3M8 18h8"/></svg></span>Peers</a>
      <a class="side__link" href="#mempool" data-section="mempool"><span class="side__glyph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3 8.5 4.7L12 12.4 3.5 7.7 12 3Z"/><path d="m3.5 12.2 8.5 4.7 8.5-4.7"/><path d="m3.5 16.7 8.5 4.7 8.5-4.7"/></svg></span>Mempool</a>
      <a class="side__link" href="#mining" data-section="mining"><span class="side__glyph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 20.5 12 13"/><path d="M9 4.5C12.5 3 17 3.7 19.5 6.2 17 6 13.6 6.6 11.2 9c-2.4 2.4-3 5.8-2.8 8.3C5.9 14.8 5.2 10.3 6.7 6.8 7.3 5.9 8.1 5 9 4.5Z"/></svg></span>Mining</a>
      <a class="side__link" href="#voting" data-section="voting"><span class="side__glyph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="m8.4 12.4 2.5 2.5 4.9-5.4"/></svg></span>Voting</a>
      <a class="side__link" href="#wallet" data-section="wallet"><span class="side__glyph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="6" width="17" height="13" rx="2.5"/><path d="M3.5 10h17"/><path d="M14.5 14.5h3"/></svg></span>Wallet</a>
    </div>
    <div class="side__foot">
      <div class="side__tools">
        <div class="side__group-label">Access</div>
        <button class="side__link side__link--mini" id="auth-chip" type="button"><span aria-hidden="true">●</span> Authorize</button>
        <button class="side__link side__link--mini" id="open-settings" type="button">Settings</button>
        <a class="side__link side__link--mini" href="/swagger">Scala API ↗</a>
        <a class="side__link side__link--mini" href="/swagger/native">Native API ↗</a>
      </div>
      <div class="side__status">
        <div class="side__status-line"><span id="conn-dot" aria-hidden="true">●</span> <span id="conn-state">connecting</span></div>
        <div class="side__clock" id="clock"></div>
      </div>
    </div>
  </nav>
  <main class="main">
    <section id="section-overview" class="section" aria-label="Overview"></section>
    <section id="section-explorer" class="section" aria-label="Explorer" hidden></section>
    <section id="section-peers" class="section" aria-label="Peers" hidden></section>
    <section id="section-mempool" class="section" aria-label="Mempool" hidden></section>
    <section id="section-mining" class="section" aria-label="Mining" hidden></section>
    <section id="section-voting" class="section" aria-label="Voting" hidden></section>
    <section id="section-wallet" class="section" aria-label="Wallet" hidden></section>
  </main>
</div>
<dialog id="settings-dialog" class="dialog"></dialog>
<dialog id="auth-dialog" class="dialog"></dialog>
<script type="module" src="/js/app.js"></script>
</body>
</html>

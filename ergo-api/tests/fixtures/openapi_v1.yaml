        total:
          type: integer
          format: int64
          description: Session-total reorgs detected (not reset by age/count prune).
          minimum: 0
    ApiReorgRecord:
      type: object
      description: |-
        One retained reorg for `GET /api/v1/diagnostics/reorgs` — postmortem
        ring (last 64 **or** 7 days), not the coarse glanceable event feed.
      required:
      - unixMs
      - height
      - headerId

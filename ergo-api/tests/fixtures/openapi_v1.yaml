openapi: 3.1.0
info:
  title: Ergo Rust Node — v1 API
  description: 'The Rust-native v1 product API (`/api/v1/*`): chain/boxes/tokens/addresses/mempool/transactions reads, tx-intelligence (build/simulate/fee-estimate/status), the ErgoScript playground (`script/*`), semantic decode (`protocols/*`, `boxes/decode`), light-client trustless-sync proofs (`light/*`), time-series analytics (`stats/*`), operator diagnostics, webhooks, real-time WebSocket subscriptions, the scan/accounts surface, and node/network/mining/voting operator controls. Distinct from the pre-v1 native surface documented at `/swagger/native` (wallet/mining/votes/indexer/node) — the two specs are additive, not overlapping. Every v1 error follows the nested error envelope (`error.reason`/`error.message`/`error.detail`); `reason` is the stable machine-readable field to switch on. Query `GET /api/v1/node/health` to confirm a running node''s state.'
  license:
    name: MIT OR Apache-2.0
    identifier: MIT OR Apache-2.0
  version: 0.5.1
paths:
  /api/v1/accounts:
    get:
      tags:
      - accounts
      summary: |-
        Any named-account route (`v1-api-design.md` §3.11). Net-new subsystem with
        no `account_id` model in the wallet layer today → honest `route_unavailable`.
        Representative mount for the whole named-accounts family — every method on
        `/api/v1/accounts`, `/api/v1/accounts/{account_id}`,
        `/api/v1/accounts/{account_id}/balance`, and
        `/api/v1/accounts/{account_id}/addresses` shares this SAME handler and
        answers identically.
      operationId: accounts_seam
      responses:
        '503':
          description: Named-accounts subsystem not wired on this node (same answer on every named-accounts route/method)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/accounts/private-key:
    post:
      tags:
      - accounts
      summary: |-
        `POST /api/v1/accounts/private-key` — export the raw secp256k1 scalar for a
        tracked address (the spec's `wallet/keys/derive-at-path`, relocated to a
        collision-free T2 mount). Requires `acknowledge = true` AND
        `[wallet] expose_private_keys = true`. `Cache-Control: no-store`.
      description: |-
        The T2 gate (admin api-key + loopback-preferred) is enforced by the
        route_layer BEFORE this handler runs — a secret scalar is unreachable at
        T0/T1 and, under hard-deny, from any non-loopback caller.
      operationId: private_key
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivateKeyRequest'
        required: true
      responses:
        '200':
          description: 'Raw secp256k1 scalar — `{ private_key }` (Cache-Control: no-store)'
          content:
            application/json:
              schema: {}
        '400':
          description: Invalid address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Missing acknowledgement, wallet uninitialized/locked, or sensitive-op disabled by config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/accounts/watch:
    get:
      tags:
      - accounts
      summary: |-
        `GET /api/v1/accounts/watch?limit=&cursor=` — watch-only scans (the
        `wallet_interaction = "off"` marker), ascending by `scan_id`. T0.
      description: |-
        The scan registry stores no watch label / originating address, so those are
        `null` here (Phase-2 durable watch registry); `tracking_rule` is the opaque
        predicate the scan was registered with.
      operationId: watch_list
      parameters:
      - name: limit
        in: query
        description: Page size (default 50, cap 500)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Watch-only scans — `{ items, page }` (address/label always null; Phase-2 durable registry)
          content:
            application/json:
              schema: {}
        '400':
          description: Invalid cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Wallet uninitialized or locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
    post:
      tags:
      - accounts
      summary: |-
        `POST /api/v1/accounts/watch` — register a watch-only address as an
        `equals(R1, <script>)` scan (`scan_p2s_rule`), tracked but never spendable.
        T1. Reuses the scan primitive; no second tracking mechanism.
      operationId: watch_register
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WatchRequest'
        required: true
      responses:
        '200':
          description: Registered — `{ address, scan_id, label }`
          content:
            application/json:
              schema: {}
        '400':
          description: Invalid address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Wallet uninitialized or locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/accounts/watch/{scan_id}:
    delete:
      tags:
      - accounts
      summary: '`DELETE /api/v1/accounts/watch/{scan_id}` — deregister a watch-only scan. T1.'
      operationId: watch_delete
      parameters:
      - name: scan_id
        in: path
        description: Registered watch-only scan id
        required: true
        schema:
          type: integer
          format: int32
          minimum: 0
      responses:
        '200':
          description: Deregistered — `{ scan_id }`
          content:
            application/json:
              schema: {}
        '404':
          description: No watch-only scan with that id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Wallet uninitialized or locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/accounts/watch/{scan_id}/unspent:
    get:
      tags:
      - scan
      summary: |-
        `GET /api/v1/accounts/watch/{scan_id}/unspent` — the T0 (public) mount of
        the unspent read, scoped to WATCH-ONLY scans exactly like `watch_list`
        (`wallet_interaction = "off"`): a wallet-interacting operator scan answers
        `scan_not_found` here, so the public route can never read it — only the T1
        api-key mount (`scan/scans/{id}/unspent`) can.
      operationId: watch_unspent
      parameters:
      - name: scan_id
        in: path
        description: Registered WATCH-ONLY scan id
        required: true
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: limit
        in: query
        description: Page size (default 50, cap 2499)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      - name: min_confirmations
        in: query
        description: Minimum confirmations
        required: false
        schema:
          type: integer
          format: int32
      - name: max_confirmations
        in: query
        description: Maximum confirmations (-1 = unbounded)
        required: false
        schema:
          type: integer
          format: int32
      - name: min_inclusion_height
        in: query
        description: Minimum inclusion height
        required: false
        schema:
          type: integer
          format: int32
      - name: max_inclusion_height
        in: query
        description: Maximum inclusion height (-1 = unbounded)
        required: false
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: Unspent boxes tracked by this watch-only scan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_ScanBoxView'
        '400':
          description: Invalid filter bounds/cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '404':
          description: No watch-only scan with that id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Wallet uninitialized or locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/addresses/{address}/balance:
    get:
      tags:
      - addresses
      summary: |-
        `GET /api/v1/addresses/{address}/balance`. `unconfirmed` is strictly
        additive (Scala parity) — pool outputs add; pool spends do NOT subtract from
        `confirmed`.
      operationId: balance
      parameters:
      - name: address
        in: path
        description: Base58 address
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Confirmed + unconfirmed balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Balance'
        '400':
          description: Invalid address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Extra index disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Extra index syncing/halted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/addresses/{address}/transactions:
    get:
      tags:
      - addresses
      summary: |-
        `GET /api/v1/addresses/{address}/transactions` — a small tx summary
        projected DOWN from the shared indexed-tx builder (never re-derives the
        confirmation math).
      operationId: transactions
      parameters:
      - name: address
        in: path
        description: Base58 address
        required: true
        schema:
          type: string
      - name: limit
        in: query
        description: Page size (default 20, cap 500)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      - name: sort
        in: query
        description: '`desc` (default) or `asc`'
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Address transaction history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_V1AddressTxSummary'
        '400':
          description: Invalid address/sort/cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Extra index disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '500':
          description: Failed to assemble the address transaction summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Chain reader unavailable, or extra index syncing/halted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/batch:
    post:
      tags:
      - batch
      summary: |-
        `POST /api/v1/batch` handler. Reads `api_key`-free (T0) — every entry on
        today's allow-list is T0 (see module docs on mixed-tier deferral).
      operationId: batch_handler
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchRequest'
        required: true
      responses:
        '200':
          description: Per-item results (partial-failure semantics — a structurally valid batch is always 200)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchResponse'
        '400':
          description: Malformed/empty batch, or a target not on the allow-list (forbidden_target)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '413':
          description: Too many items, or summed weight/body size exceeds the batch cap
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '429':
          description: Rate limit exceeded for this client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/boxes/by-address/{address}:
    get:
      tags:
      - boxes
      summary: |-
        `GET /api/v1/boxes/by-address/{address}` (also mounted at
        `addresses/{address}/boxes`) — full history (spent + unspent). v1 drops the
        Scala `.reverse` DESC-page quirk: strict requested-sort order.
      operationId: boxes_by_address
      parameters:
      - name: address
        in: path
        description: Base58 address
        required: true
        schema:
          type: string
      - name: limit
        in: query
        description: Page size (default 20, cap 500)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      - name: sort
        in: query
        description: '`desc` (default) or `asc`'
        required: false
        schema:
          type: string
      - name: decode
        in: query
        description: Semantic-decode each box's contract
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Boxes at this address (full history)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_V1Box'
        '400':
          description: Invalid address/sort/cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Extra index disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Extra index syncing/halted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/boxes/by-ergo-tree:
    post:
      tags:
      - boxes
      summary: '`POST /api/v1/boxes/by-ergo-tree` — body `{ "ergo_tree": "<hex>" }`.'
      operationId: boxes_by_ergo_tree
      parameters:
      - name: limit
        in: query
        description: Page size (default 20, cap 500)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      - name: sort
        in: query
        description: '`desc` (default) or `asc`'
        required: false
        schema:
          type: string
      - name: decode
        in: query
        description: Semantic-decode each box's contract
        required: false
        schema:
          type: boolean
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErgoTreeBody'
        required: true
      responses:
        '200':
          description: Boxes for this ErgoTree (full history)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_V1Box'
        '400':
          description: Invalid ergo_tree/sort/cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Extra index disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Extra index syncing/halted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/boxes/by-template/{template_hash}:
    get:
      tags:
      - boxes
      summary: |-
        `GET /api/v1/boxes/by-template/{template_hash}`. Unknown template → `200`
        empty page (Scala parity), never 404.
      operationId: boxes_by_template
      parameters:
      - name: template_hash
        in: path
        description: 64-char lowercase hex blake2b256 template hash
        required: true
        schema:
          type: string
      - name: limit
        in: query
        description: Page size (default 20, cap 500)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      - name: sort
        in: query
        description: Only `desc` (fixed reader order) is supported
        required: false
        schema:
          type: string
      - name: decode
        in: query
        description: Semantic-decode each box's contract
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Boxes matching this template (empty page if unknown)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_V1Box'
        '400':
          description: Invalid template_hash/cursor, or sort=asc (unsupported)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Extra index disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Extra index syncing/halted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/boxes/by-token/{token_id}:
    get:
      tags:
      - boxes
      summary: '`GET /api/v1/boxes/by-token/{token_id}`. Unknown token → `200` empty page.'
      operationId: boxes_by_token
      parameters:
      - name: token_id
        in: path
        description: 64-char lowercase hex token id
        required: true
        schema:
          type: string
      - name: limit
        in: query
        description: Page size (default 20, cap 500)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      - name: sort
        in: query
        description: Only `desc` (fixed reader order) is supported
        required: false
        schema:
          type: string
      - name: decode
        in: query
        description: Semantic-decode each box's contract
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Boxes carrying this token (empty page if unknown)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_V1Box'
        '400':
          description: Invalid token_id/cursor, or sort=asc (unsupported)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Extra index disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Extra index syncing/halted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/boxes/decode:
    post:
      tags:
      - decode
      summary: |-
        `POST /api/v1/boxes/decode` — decode an off-chain / not-yet-submitted box.
        Stateless: works even when the indexer is disabled. Pure CPU, body-capped.
      operationId: decode_off_chain_box
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecodeBoxBody'
        required: true
      responses:
        '200':
          description: Derived address + decoded contract (null if unmatched)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecodeBoxResponse'
        '400':
          description: Invalid ergo_tree/value/asset amount
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/boxes/range:
    get:
      tags:
      - boxes
      summary: |-
        `GET /api/v1/boxes/range` — bare box-id list over a global-index range.
        Cursor `{gi}` is genuinely stable (append-only global index).
      operationId: box_range
      parameters:
      - name: limit
        in: query
        description: Page size (default 100, cap 2000)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Box ids in global-index order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_String'
        '400':
          description: Invalid cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Extra index disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Extra index syncing/halted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/boxes/unspent/by-address/{address}:
    get:
      tags:
      - boxes
      summary: |-
        `GET /api/v1/boxes/unspent/by-address/{address}` (also mounted at
        `addresses/{address}/unspent`).
      operationId: boxes_unspent_by_address
      parameters:
      - name: address
        in: path
        description: Base58 address
        required: true
        schema:
          type: string
      - name: limit
        in: query
        description: Page size (default 20, cap 500)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      - name: sort
        in: query
        description: '`desc` (default) or `asc`'
        required: false
        schema:
          type: string
      - name: decode
        in: query
        description: Semantic-decode each box's contract
        required: false
        schema:
          type: boolean
      - name: include_unconfirmed
        in: query
        description: Merge in unspent mempool outputs
        required: false
        schema:
          type: boolean
      - name: exclude_mempool_spent
        in: query
        description: Drop confirmed boxes already spent in the mempool
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Unspent boxes at this address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_V1Box'
        '400':
          description: Invalid address/sort/cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Extra index disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Extra index syncing/halted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/boxes/unspent/by-ergo-tree:
    post:
      tags:
      - boxes
      summary: '`POST /api/v1/boxes/unspent/by-ergo-tree`.'
      operationId: boxes_unspent_by_ergo_tree
      parameters:
      - name: limit
        in: query
        description: Page size (default 20, cap 500)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      - name: sort
        in: query
        description: '`desc` (default) or `asc`'
        required: false
        schema:
          type: string
      - name: decode
        in: query
        description: Semantic-decode each box's contract
        required: false
        schema:
          type: boolean
      - name: include_unconfirmed
        in: query
        description: Merge in unspent mempool outputs
        required: false
        schema:
          type: boolean
      - name: exclude_mempool_spent
        in: query
        description: Drop confirmed boxes already spent in the mempool
        required: false
        schema:
          type: boolean
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErgoTreeBody'
        required: true
      responses:
        '200':
          description: Unspent boxes for this ErgoTree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_V1Box'
        '400':
          description: Invalid ergo_tree/sort/cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Extra index disabled
          content:
            application/json:

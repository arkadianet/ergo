        value:
          type: string
    TrackInfo:
      type: object
      description: |-
        The `network/track-info` aggregate counters (§3.2 #5). Bare object, not a
        collection.
      required:
      - num_requested
      - num_received
      - num_failed
      properties:
        num_failed:
          type: integer
          format: int32
          minimum: 0
        num_received:
          type: integer
          format: int32
          minimum: 0
        num_requested:
          type: integer
          format: int32
          minimum: 0
    TxReprDto:
      oneOf:
      - type: object
        required:
        - bytes
        - type
        properties:
          bytes:
            type: string
          type:
            type: string
            enum:
            - bytes
    TypedConstant:
      type: object
      description: |-
        A typed constant on the wire: `{ "type": "<sigma type>", "value": "<string>" }`
        (fragment §4.1). Scalars are decimal strings, byte collections / group
        elements are hex, booleans are `"true"`/`"false"`.
      required:
      - type
      - value
      properties:
        type:
          type: string
          description: Lowercase-or-Scala sigma type name (`SInt`, `SLong`, `Coll[Byte]`, …).
        value:
          type: string
          description: The value as a string (decimal for numerics, hex for byte/group).
    V1AdProofs:
      type: object
      required:
      - proof_bytes
      - digest
      properties:
        digest:
          type: string
        proof_bytes:
          type: string
    V1AddressTxSummary:
      type: object
      description: |-
        A deliberately smaller tx projection for `addresses/{address}/transactions`
        — glossary-named (`header_id`, `inclusion_height`, `size_bytes`,
        `input_count`/`output_count`, coherence Part B/C), projected DOWN from
        [`IndexedErgoTransactionResponse`] so the confirmation math never re-derives
        (a second drift site).
      required:
      - tx_id
      - header_id
      - inclusion_height
      - confirmations
      - timestamp_unix_ms
      - timestamp_iso
      - size_bytes
      - input_count
      - output_count
      - global_index
      properties:
        confirmations:
          type: integer
          format: int64
        global_index:
          type: integer
          format: int64
        header_id:
          type: string
        inclusion_height:
          type: integer
          format: int32
        input_count:
          type: integer
          format: int32
          minimum: 0
        output_count:
          type: integer
          format: int32
          minimum: 0
        size_bytes:
          type: integer
          format: int32
          minimum: 0
        timestamp_iso:
          type: string
        timestamp_unix_ms:
          type: integer
          format: int64
          minimum: 0
        tx_id:
          type: string
    V1Asset:
      type: object
      required:
      - token_id
      - amount
      properties:
        amount:
          type: string
        token_id:
          type: string
    V1Balance:
      type: object
      description: |-
        `addresses/{address}/balance`. `unconfirmed` is strictly additive (Scala
        parity): pool outputs paying the address add here; pool spends do NOT
        subtract from `confirmed`.
      required:
      - address
      - confirmed
      - unconfirmed
      properties:
        address:
          type: string
        confirmed:
          $ref: '#/components/schemas/V1BalanceEntry'
        unconfirmed:
          $ref: '#/components/schemas/V1BalanceEntry'
    V1BalanceEntry:
      type: object
      description: |-
        One confirmed/unconfirmed side of an `addresses/{address}/balance`. The
        nanoERG leaf is `value` (glossary C.2), a decimal string.
      required:
      - value
      - assets
      properties:
        assets:
          type: array
          items:
            $ref: '#/components/schemas/V1Asset'
        value:
          type: string
    V1Block:
      allOf:
      - $ref: '#/components/schemas/V1HeaderBase'
      - type: object
        required:
        - size_bytes
        - transactions
        - extension
        properties:
          ad_proofs:
            oneOf:
            - type: 'null'
            - $ref: '#/components/schemas/V1AdProofs'
              description: '`null` in UTXO / pruned mode (block exists, section doesn''t).'
          extension:
            $ref: '#/components/schemas/V1Extension'
          size_bytes:
            type: integer
            format: int32
            minimum: 0
          transactions:
            type: array
            items:
              $ref: '#/components/schemas/V1BlockTx'
      description: Full block (`GET /chain/blocks/{header_id}`).
    V1BlockAdProofs:
      type: object
      description: '`GET /chain/proofs/{header_id}` — the block''s AD-proofs section.'
      required:
      - header_id
      - proof_bytes
      - digest
      - size_bytes
      properties:
        digest:
          type: string
        header_id:
          type: string
        proof_bytes:
          type: string
        size_bytes:
          type: integer
          format: int32
          minimum: 0
    V1BlockSummary:
      allOf:
      - $ref: '#/components/schemas/V1HeaderBase'
      - type: object
        required:
        - size_bytes
        - transaction_count
        properties:
          delivered_by:
            type:
            - string
            - 'null'
            description: |-
              First-deliverer peer — only known inside the near-tip live ring;
              `null` for any block outside it (documented capability gap, §3.5).
          size_bytes:
            type: integer
            format: int32
            minimum: 0
          transaction_count:
            type: integer
            format: int32
            minimum: 0
      description: One item of the `GET /chain/blocks` list — a block summary.
    V1BlockTransactions:
      type: object
      description: The block-transactions section as a modifier `data` payload.
      required:
      - header_id
      - transactions
      - size_bytes
      properties:
        header_id:
          type: string
        size_bytes:
          type: integer
          format: int32
          minimum: 0
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/V1BlockTx'
    V1BlockTx:
      type: object
      description: |-
        A transaction as embedded in a block (`GET /chain/blocks/*`): inputs are
        spend-references, outputs are the block's own output boxes.
      required:
      - tx_id
      - inputs
      - data_inputs
      - outputs
      - size_bytes
      properties:
        data_inputs:
          type: array
          items:
            type: string
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/V1SpendInput'
        outputs:
          type: array
          items:
            $ref: '#/components/schemas/V1Box'
        size_bytes:
          type: integer
          format: int32
          minimum: 0
        tx_id:
          type: string
    V1Box:
      type: object
      description: |-
        The v1 box object (`v1-api-design.md` §3.7). Every box-returning surface
        shares this shape. `box_id`/`confirmed` are always present; the remaining
        fields are `Option` because a box can appear in three provenance contexts
        with different available metadata:

        * fully-indexed (confirmed tx read) — all fields populated;
        * block-embedded output (from a block's own bytes) — no `global_index` /
          `spent_by`;
        * an unresolved input of an unconfirmed tx — only `box_id` is known, the
          rest are `null` (honest "unknown", never fabricated — §1.1).

        The `boxes/*` group owns the final canonical box shape (coherence Part B /
        coordination flag #2); this is the transactions-group projection it must
        match when it lands.
      required:
      - box_id
      - confirmed
      properties:
        address:
          type:
          - string
          - 'null'
        assets:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/V1Asset'
        box_id:
          type: string
        confirmations:
          type:
          - integer
          - 'null'
          format: int64
        confirmed:
          type: boolean
        creation_height:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
        decoded:
          description: |-
            Semantic decode (§0.3): **omitted** unless `?decode=true`, `null` when
            requested but the semantic-decode registry (a later group) matched no
            contract. The registry owns the populated object's shape; this group
            owns the toggle + presence contract.
        ergo_tree:
          type:
          - string
          - 'null'
        global_index:
          type:
          - integer
          - 'null'
          format: int64
        inclusion_height:
          type:
          - integer
          - 'null'
          format: int32
        output_index:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
        registers:
          type:
          - object
          - 'null'
          additionalProperties:
            type: string
          propertyNames:
            type: string
        spending_proof:
          description: 'Reserved: populated only on input boxes carrying a proof; `null` here.'
        spent_by:
          type:
          - string
          - 'null'
        tx_id:
          type:
          - string
          - 'null'
        value:
          type:
          - string
          - 'null'
    V1Error:
      type: object
      description: |-
        The v1 error envelope: `{ "error": { reason, message, detail } }`
        (`v1-api-design.md` §1.3). Carries its own HTTP status via the `reason`.

        Prefer returning `Result<T, V1Error>` from a handler and `?`-ing the
        error path; [`IntoResponse`] renders the envelope with the correct
        status. [`v1_error`] is the free-function form for inline early returns.
      required:
      - error
      properties:
        error:
          $ref: '#/components/schemas/V1ErrorInner'
          description: The single `error` key holding the machine/human/actionable triple.
    V1ErrorInner:
      type: object
      description: Inner object of the v1 error envelope (`v1-api-design.md` §1.3).
      required:
      - reason
      - message
      - detail
      properties:
        detail:
          type: string
          description: Actionable remediation hint (may be empty when none applies).
        message:
          type: string
          description: Human-readable one-liner.
        reason:
          $ref: '#/components/schemas/Reason'
          description: Stable machine-readable enum a client switches on.
    V1Extension:
      type: object
      required:
      - digest
      - fields
      properties:
        digest:
          type: string
        fields:
          type: array
          items:
            type: array
            items:
              type: string
    V1FeeHistogram:
      type: object
      description: |-
        The v1 `mempool/fee-histogram` bare object (§3.8): active `weight_function`,
        the `max_wait_ms` horizon the bins span, and the per-bin counts.
      required:
      - weight_function
      - max_wait_ms
      - bins
      properties:
        bins:
          type: array
          items:
            $ref: '#/components/schemas/V1FeeHistogramBin'
        max_wait_ms:
          type: integer
          format: int64
          minimum: 0
        weight_function:
          $ref: '#/components/schemas/ApiWeightFunction'
    V1FeeHistogramBin:
      type: object
      description: |-
        One bin of the v1 `mempool/fee-histogram` (§3.8). `total_fee` is
        string-amount per §1.1. `fee_per_byte_min`/`_max` are the ASSUMED-new band:
        the frozen `pool_fee_histogram` hook is a WAIT-TIME histogram carrying only
        `{n_txns, total_fee}` per bin, so the band is honestly `null` until a
        fee-keyed histogram hook exists (design correction — see the group report).
      required:
      - index
      - n_txns
      - total_fee
      properties:
        fee_per_byte_max:
          type:
          - string
          - 'null'
        fee_per_byte_min:
          type:
          - string
          - 'null'
        index:
          type: integer
          format: int32
          minimum: 0
        n_txns:
          type: integer
          format: int32
          minimum: 0
        total_fee:
          type: string
    V1Header:
      allOf:
      - $ref: '#/components/schemas/V1HeaderBase'
      - type: object
        required:
        - size_bytes
        properties:
          size_bytes:
            type: integer
            format: int32
            minimum: 0
      description: Standalone header object (`GET /chain/headers/{header_id}` etc.).
    V1HeaderBase:
      type: object
      description: |-
        Glossary-renamed header fields shared by the standalone header object,
        the full block, and a block summary (`serde(flatten)`ed into each).
      required:
      - header_id
      - height
      - parent_id
      - timestamp_unix_ms
      - timestamp_iso
      - version
      - difficulty
      - n_bits
      - votes
      - state_root
      - ad_proofs_root
      - transactions_root
      - extension_id
      - extension_hash
      - miner_pk
      properties:
        ad_proofs_root:
          type: string
        difficulty:
          type: string
          description: Decimal string (may exceed 2^53).
        extension_hash:
          type: string
        extension_id:
          type: string
        header_id:
          type: string
        height:
          type: integer
          format: int32
          minimum: 0
        miner_address:
          type:
          - string
          - 'null'
          description: P2PK address derived from `miner_pk`; `null` if the pubkey is malformed.
        miner_pk:
          type: string
          description: |-
            Miner public key (frozen `pk` wire name lives only on the mining
            `WorkMessage`; here the glossary name is `miner_pk`).
        n_bits:
          type: integer
          format: int64
          minimum: 0
        parent_id:
          type: string
        state_root:
          type: string
        timestamp_iso:
          type: string
        timestamp_unix_ms:
          type: integer
          format: int64
          minimum: 0
        transactions_root:
          type: string
        version:
          type: integer
          format: int32
          minimum: 0
        votes:
          type: string
          description: Fixed-width hex vote triple, e.g. `"000000"`.
    V1IoBox:
      type: object
      description: |-
        A resolved input/output of a pooled tx (§3.8 `io_box`). Every field is
        nullable: a spent input may not resolve against the extra index or the
        pool-output overlay, and `null` ≠ `[]` (an unresolved box is not a box with
        no assets) per the §1.1 honesty rule.
      properties:
        address:
          type:
          - string
          - 'null'
        assets:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/V1Asset'
        box_id:
          type:
          - string
          - 'null'
        value:
          type:
          - string
          - 'null'
    V1MempoolDepthPoint:
      type: object
      description: |-
        One point of the O4 mempool-depth series (`stats/mempool-depth` point shape,
        §3.14). The wire projection of a [`crate::v1::mempool_depth::MempoolDepthSample`];
        the future `stats/mempool-depth` endpoint reuses this SAME type over the SAME
        ring (Overlap O4).
      required:
      - timestamp_unix_ms
      - timestamp_iso
      - size
      - total_bytes
      - capacity_count
      - capacity_bytes
      - min_fee_per_byte
      - revalidation_pending
      properties:
        capacity_bytes:
          type: integer
          format: int64
          minimum: 0
        capacity_count:
          type: integer
          format: int32
          minimum: 0
        min_fee_per_byte:
          type: string
        revalidation_pending:
          type: integer
          format: int32
          minimum: 0
        size:
          type: integer
          format: int32
          minimum: 0
        timestamp_iso:
          type: string
        timestamp_unix_ms:
          type: integer
          format: int64
          minimum: 0
        total_bytes:
          type: integer
          format: int64
          minimum: 0
    V1MempoolSummary:
      type: object
      description: |-
        The v1 `mempool/summary` bare object (§3.8): capacity counters + derived
        `utilization` + active `weight_function`, plus the OPTIONAL O4 depth
        `history` (present only when `?history=<n>` is requested).
      required:
      - size
      - total_bytes
      - capacity_count
      - capacity_bytes
      - utilization
      - revalidation_pending
      - weight_function
      properties:
        capacity_bytes:
          type: integer
          format: int64
          minimum: 0
        capacity_count:
          type: integer
          format: int32
          minimum: 0
        history:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/V1MempoolDepthPoint'
        revalidation_pending:
          type: integer
          format: int32
          minimum: 0
        size:
          type: integer
          format: int32
          minimum: 0
        total_bytes:
          type: integer
          format: int64
          minimum: 0
        utilization:
          $ref: '#/components/schemas/V1MempoolUtilization'
        weight_function:
          $ref: '#/components/schemas/ApiWeightFunction'
    V1MempoolTx:
      type: object
      description: |-
        The v1 `mempool_tx` row (`v1-api-design.md` §3.8) — the glossary-renamed,
        string-amount projection of [`ApiMempoolTransaction`] (`types.rs`). Fees and
        the priority weight become strings (§1.1); `first_seen` follows the §1.2 flat
        `*_unix_ms` + `*_iso` timestamp rule (superseding the fragment's nested
        `first_seen:{}` shape).
      required:
      - tx_id
      - fee
      - fee_per_byte
      - size_bytes
      - validation_cost_units
      - priority_weight
      - source
      - input_count
      - output_count
      - parents_in_pool
      - first_seen_unix_ms
      - first_seen_iso
      - first_seen_age_ms
      - last_checked_age_ms
      properties:
        fee:
          type: string
        fee_per_byte:
          type: string
        first_seen_age_ms:
          type: integer
          format: int64
          minimum: 0
        first_seen_iso:
          type: string
        first_seen_unix_ms:
          type: integer
          format: int64
          minimum: 0
        input_count:
          type: integer
          format: int32
          minimum: 0
        last_checked_age_ms:
          type: integer
          format: int64
          minimum: 0
        output_count:
          type: integer
          format: int32
          minimum: 0
        parents_in_pool:
          type: integer
          format: int32
          minimum: 0
        priority_weight:
          type: string
        size_bytes:
          type: integer
          format: int32
          minimum: 0
        source:
          type: string
          description: |-
            Where the tx entered our pool: `peer | api | wallet | demoted_from_block`
            (the real [`ApiTxSource`] taxonomy — see the design correction in the
            group report; the fragment's `propagated|local|reemission|rebroadcast`
            never matched the implemented enum).
        tx_id:
          type: string
        validation_cost_units:
          type: integer
          format: int64
          minimum: 0
    V1MempoolTxDetail:
      allOf:
      - $ref: '#/components/schemas/V1MempoolTx'
      - type: object
        required:
        - inputs
        - data_inputs
        - outputs
        properties:
          data_inputs:
            type: array
            items:
              type: string
          inputs:
            type: array
            items:
              $ref: '#/components/schemas/V1IoBox'
          outputs:
            type: array
            items:
              $ref: '#/components/schemas/V1IoBox'
      description: |-
        The v1 `mempool/transactions/{tx_id}` bare object (§3.8): the `mempool_tx`
        row (flattened) plus its resolved `io_box` inputs/outputs.
    V1MempoolUtilization:
      type: object
      description: |-
        Derived pool-utilization fractions on [`V1MempoolSummary`] (0.0 when the
        matching capacity is unset — never a divide-by-zero).
      required:
      - count_pct
      - bytes_pct
      properties:
        bytes_pct:
          type: number
          format: double
        count_pct:
          type: number
          format: double
    V1MerkleLevel:
      type: object
      required:
      - sibling
      - side
      properties:
        sibling:
          type: string
        side:
          $ref: '#/components/schemas/MerkleSide'
    V1MerkleProof:
      type: object
      description: |-
        `GET /chain/proofs/{header_id}/transactions/{tx_id}` — Merkle membership
        proof. Side byte `0/1` rendered as `"left"/"right"` strings (§3.5).
      required:
      - tx_id
      - levels
      properties:
        levels:
          type: array
          items:
            $ref: '#/components/schemas/V1MerkleLevel'
        tx_id:
          type: string
    V1Modifier:
      oneOf:
      - type: object
        required:
        - data
        - kind
        properties:
          data:
            $ref: '#/components/schemas/V1Header'
          kind:
            type: string
            enum:
            - header
      - type: object
        required:
        - data
        - kind
        properties:
          data:
            $ref: '#/components/schemas/V1BlockTransactions'
          kind:
            type: string
            enum:
            - block_transactions
      - type: object
        required:
        - data
        - kind
        properties:
          data:
            $ref: '#/components/schemas/V1Extension'
          kind:
            type: string
            enum:
            - extension
      - type: object
        required:
        - data
        - kind
        properties:
          data:
            $ref: '#/components/schemas/V1BlockAdProofs'
          kind:
            type: string
            enum:
            - ad_proofs
      description: |-
        `GET /chain/modifiers/{modifier_id}` — v1 adds the explicit `kind`
        discriminant the untagged Scala `BlockSection` lacks (§3.5).
    V1SpendInput:
      type: object
      description: |-
        A block-embedded transaction input — a *reference* to a spent box, not a
        resolved box (the block does not carry the spent box's body).
      required:
      - box_id
      - spending_proof
      properties:
        box_id:
          type: string
        spending_proof:
          $ref: '#/components/schemas/V1SpendingProof'
    V1SpendingProof:
      type: object
      description: Spending-proof reference on a block-embedded transaction input.
      required:
      - proof_bytes
      - extension
      properties:
        extension:
          type: object
          additionalProperties:
            type: string
          propertyNames:
            type: string
        proof_bytes:
          type: string
    V1Token:
      type: object
      description: |-
        The v1 token object (`v1-api-design.md` §3.7). `box_id` is the *minting*
        box; `emission_amount` is the string-restrung ever-minted figure.
      required:
      - token_id
      - box_id
      - emission_amount
      - name
      - description
      - decimals
      properties:
        box_id:
          type: string
        decimals:
          type: integer
          format: int32
        description:
          type: string
        emission_amount:
          type: string
        name:
          type: string
        token_id:
          type: string
    V1TokenHolder:
      type: object
      description: One row of `tokens/{token_id}/holders`.
      required:
      - address
      - amount
      properties:
        address:
          type: string
        amount:
          type: string
    V1TokenStats:
      type: object
      description: |-
        `tokens/{token_id}/stats` — bare object (not a collection). `box_count` is
        exact/cheap; `circulating_supply` / `holder_count` come from the same
        bounded scan as `/holders` and inherit its `scan_capped` honesty flag.
      required:
      - token_id
      - emission_amount
      - circulating_supply
      - holder_count
      - box_count
      - scan_capped
      properties:
        box_count:
          type: integer
          format: int64
          minimum: 0
        circulating_supply:
          type: string
        emission_amount:
          type: string
        holder_count:
          type: integer
          format: int64
          minimum: 0
        scan_capped:
          type: boolean
        token_id:
          type: string
    V1Tx:
      type: object
      description: |-
        A single transaction read (`GET /api/v1/transactions/{tx_id}`): inputs and
        outputs are resolved box objects; on-chain metadata is `null` when the tx
        is still in the mempool (`confirmed = false`).
      required:
      - tx_id
      - confirmed
      - size_bytes
      - fee
      - inputs
      - data_inputs
      - outputs
      properties:
        confirmations:
          type:
          - integer
          - 'null'
          format: int64
        confirmed:
          type: boolean
        data_inputs:
          type: array
          items:
            type: string
        fee:
          type: string
          description: |-
            Sum of output values paying the fee proposition (output-side, so
            computable even with unresolved inputs). Decimal string.
        global_index:
          type:
          - integer
          - 'null'
          format: int64
        header_id:
          type:
          - string
          - 'null'
        inclusion_height:
          type:
          - integer
          - 'null'
          format: int32
        index_in_block:
          type:
          - integer
          - 'null'
          format: int32
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/V1Box'
        outputs:
          type: array
          items:
            $ref: '#/components/schemas/V1Box'
        size_bytes:
          type: integer
          format: int32
          minimum: 0
        timestamp_iso:
          type:
          - string
          - 'null'
        timestamp_unix_ms:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
        tx_id:
          type: string
    VotableParam:
      type: object
      description: |-
        A votable parameter + bounds, snake_case (reshape of the camelCase
        `ApiVotableParam`).
      required:
      - id
      - name
      - description
      - current
      - step
      - min
      - max
      properties:
        current:
          type: integer
          format: int32
        description:
          type: string
        id:
          type: integer
          format: int32
          minimum: 0
        max:
          type: integer
          format: int32
        min:
          type: integer
          format: int32
        name:
          type: string
        step:
          type: integer
          format: int32
    VoteChange:
      type: object
      description: One epoch boundary at which the active parameters changed, snake_case.
      required:
      - height
      - params
      properties:
        height:
          type: integer
          format: int32
          minimum: 0
        params:
          type: array
          items:
            $ref: '#/components/schemas/ParamChange'
    VoteTarget:
      type: object
      description: One desired vote in a `POST /voting/operator-votes` body, snake_case.
      required:
      - parameter_id
      - target
      properties:
        parameter_id:
          type: integer
          format: int32
          minimum: 0
        target:
          type: integer
          format: int64
    VotesHistory:
      type: object
      description: |-
        The `voting/history` body, snake_case (reshape of the camelCase
        `ApiVotesHistory`).
      required:
      - epoch_length
      - current_height
      - changes
      properties:
        changes:
          type: array
          items:
            $ref: '#/components/schemas/VoteChange'
        current_height:
          type: integer
          format: int32
          minimum: 0
        epoch_length:
          type: integer
          format: int32
          minimum: 0
    WatchRequest:
      type: object
      description: '`POST /api/v1/accounts/watch` request.'
      required:
      - address
      properties:
        address:
          type: string
        label:
          type:
          - string
          - 'null'
      additionalProperties: false
    WireAsset:
      type: object
      required:
      - token_id
      - amount
      properties:
        amount:
          type: string
        token_id:
          type: string
    WireBytes:
      type: object
      required:
      - type
      - bytes
      properties:
        bytes:
          type: string
        type:
          type: string
    WireChange:
      type: object
      required:
      - address
      - value
      - assets
      properties:
        address:
          type: string
        assets:
          type: array
          items:
            $ref: '#/components/schemas/WireAsset'
        value:
          type: string
    WireConflict:
      type: object
      required:
      - box_id
      - conflicting_tx_id
      properties:
        box_id:
          type: string
        conflicting_tx_id:
          type: string
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: api_key

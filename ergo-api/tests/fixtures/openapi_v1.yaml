                type: array
                items:
                  type: string
              decodable:
                type: boolean
                description: |-
                  `true` only when a verified matcher + real decoder exist. `false` marks
                  a discoverable stub (recognized, full decode TODO) — never a lie.
              family:
                type: string
              matcher_count:
                type: integer
                minimum: 0
              name:
                type: string
              note:
                type: string
              protocol_id:
                type: string
              reference:
                type: string
              version:
                type: string
        page:
          $ref: '#/components/schemas/Page'
    Collection_ScanBoxView:
      type: object
      description: |-
        A v1 collection: `{items, page}` (`v1-api-design.md` §1.3). Uniform for

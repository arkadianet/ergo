      - light
      summary: |-
        `GET /api/v1/light/bootstrap-proof` — the NiPoPoW suffix proof for
        from-scratch trustless sync. Heaviest T0 read in the group: `m` is capped,
        and the serialized proof is subject to a response-byte ceiling.
      operationId: bootstrap_proof
      parameters:
      - name: m
        in: query
        description: Min-superchain prefix param (default 6, cap 100)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: k
        in: query
        description: Suffix/unstable-head param (default 6, cap 100)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: at
        in: query
        description: Anchor header id (64-char hex); default = tip
        required: false
        schema:
          type: string
      responses:
        '200':
          description: NiPoPoW bootstrap proof
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LightPopowProof'
        '400':
          description: m/k out of range, or `at` is not a valid header id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '413':
          description: Serialized proof exceeds the response-byte ceiling
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '500':
          description: Proof failed to serialize
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: This node cannot build a NiPoPoW proof (pruned), or chain reader unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'

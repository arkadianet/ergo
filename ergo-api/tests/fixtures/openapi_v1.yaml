      - syncing
      - at_tip
      - stalled
    TipHealth:
      type: object
      required:
      - status
      - headers_synced
      - gap
      - best_header_height
      - best_full_block_height
      - last_progress_age_ms
      - stall_threshold_ms
      - pending_blocks
      - download_window
      - unknown
      properties:
        best_full_block_height:
          type: integer
          format: int32
          minimum: 0
        best_header_height:
          type: integer
          format: int32
          minimum: 0
        delivery_failure_rate_pct:
          type:
          - string
          - 'null'
          description: |-
            `null`: the aggregate `DeliveryCounters` are not plumbed to the API
            layer (ASSUMED-new), so the failure rate cannot be computed here.
        download_window:
          type: integer
          format: int32
          minimum: 0
        gap:
          type: integer
          format: int32
          minimum: 0
        headers_synced:
          type: boolean
        last_progress_age_ms:
          type: integer
          format: int64
          minimum: 0
        pending_blocks:
          type: integer
          format: int32
          minimum: 0
        stall_threshold_ms:
          type: integer
          format: int64
          minimum: 0

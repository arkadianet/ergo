          - integer
          - 'null'
          format: int64
          minimum: 0
    SyncInfoEntry:
      type: object
      description: |-
        One per-peer sync-info entry (§3.2 #4). `peer_height` (not bare `height`)
        disambiguates whose height; `status` is the lowercased Scala
        `PeerChainStatus` set (`equal|younger|older|fork|unknown|nonsense`).
      required:
      - addr
      - peer_height
      - status

            - amount
            properties:
              address:
                type: string
              amount:
                type: string
        meta:
          type: object
          description: |-
            Whole-result scalars for `tokens/{token_id}/holders`, carried under the
            collection `meta` (Part D). `scan_capped` is set honestly when the token's
            total unspent-box count exceeds the bounded scan cap — an approximate
            ranking, never a silently-partial one.
          required:
          - as_of_height
          - scanned_boxes
          - scan_capped
          properties:
            as_of_height:
              type: integer
              format: int64
              minimum: 0
            scan_capped:
              type: boolean
            scanned_boxes:
              type: integer
              format: int64
              minimum: 0
        page:
          $ref: '#/components/schemas/Page'
    Collection_ApiPeer:
      type: object
      description: |-
        A v1 collection: `{items, page}` (`v1-api-design.md` §1.3). Uniform for
        every list, even single-page ones (a block's tx list, header-ids at a
        height): those carry `page.has_more = false`, `page.next_cursor = null`.
      required:
      - items
      - page
      properties:
        items:
          type: array
          items:
            type: object
            required:
            - addr
            - direction
            - state
            - score
            - sync_version
            - connected_seconds
            - last_seen_seconds
            properties:
              addr:
                type: string
              agent:
                type:
                - string
                - 'null'
              bytes_in:
                type:
                - integer
                - 'null'
                format: int64
                description: |-
                  Cumulative post-handshake framed-message bytes received from this
                  peer (per-frame header+checksum+payload), counted at the per-peer
                  I/O task's transport boundary. Excludes the handshake exchange,
                  which precedes that task. Read-only telemetry, never fed into peer
                  scoring/throttle. `None` only on snapshots that predate the peer's
                  connection.
                minimum: 0
              bytes_out:
                type:
                - integer
                - 'null'
                format: int64
                description: |-
                  Cumulative post-handshake framed-message bytes sent to this peer.
                  Same accounting as [`Self::bytes_in`].
                minimum: 0
              connected_seconds:
                type: integer
                format: int64
                minimum: 0
              declared_address:
                type:
                - string
                - 'null'
                description: |-
                  Peer's declared public address (`ip:port`) from its `PeerSpec`,
                  what it advertises as reachable. `None` when the peer declared no
                  address (anonymous / not gossipable).
              direction:
                $ref: '#/components/schemas/ApiPeerDirection'
              last_seen_seconds:
                type: integer
                format: int64
                minimum: 0
              node_name:
                type:
                - string
                - 'null'
              peer_height:
                type:
                - integer
                - 'null'
                format: int32
                description: |-
                  Peer's own best-block height as advertised in the most recent
                  `SyncInfo` exchange. `None` until the sync layer plumbs it through.
                minimum: 0
              rest_api_url:
                type:
                - string
                - 'null'
                description: |-
                  Peer's advertised REST API URL (the `RestApiUrl` handshake
                  feature), verbatim as the peer sent it. `None` when the peer
                  advertised none. Identity/observability only — not validated
                  here beyond what the handshake parser already did.
              score:
                type: integer
                format: int32
              state:
                $ref: '#/components/schemas/ApiPeerState'
              sync_version:
                type: string
              version:
                type:
                - string
                - 'null'
        page:
          $ref: '#/components/schemas/Page'
    Collection_BlacklistedPeer:
      type: object
      description: |-
        A v1 collection: `{items, page}` (`v1-api-design.md` §1.3). Uniform for
        every list, even single-page ones (a block's tx list, header-ids at a
        height): those carry `page.has_more = false`, `page.next_cursor = null`.
      required:
      - items
      - page
      properties:
        items:
          type: array
          items:
            type: object
            description: |-
              One blacklisted-peer entry (§3.2 #3). `addr` is the clean canonical
              `ip[:port]` — the compat path keeps the ugly Java `InetAddress.toString()`
              `hostname/ip` double-form for byte-parity; v1 strips it.
            required:
            - addr
            properties:
              addr:
                type: string
        page:
          $ref: '#/components/schemas/Page'
    Collection_ConfiguredVote:
      type: object
      description: |-
        A v1 collection: `{items, page}` (`v1-api-design.md` §1.3). Uniform for
        every list, even single-page ones (a block's tx list, header-ids at a
        height): those carry `page.has_more = false`, `page.next_cursor = null`.
      required:
      - items
      - page
      properties:
        items:
          type: array
          items:
            type: object
            description: |-
              One configured operator vote, snake_case (reshape of the camelCase

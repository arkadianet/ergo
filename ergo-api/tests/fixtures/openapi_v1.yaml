      - light
      summary: |-
        `GET /api/v1/light/status`. `serves_*` are derived from whether the node
        wires a chain reader at all (the prover hooks live on it); a node without
        one honestly advertises `false` rather than 404.
      operationId: status
      responses:
        '200':
          description: Light-client serving capability advertisement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LightStatus'
  /api/v1/mempool/by-address/{address}:
    get:
      tags:
      - mempool
      summary: |-
        `GET /api/v1/mempool/by-address/{address}` — pooled txs paying a P2PK/P2S
        address (output side). The address decodes to its ergo_tree; P2S addresses
        map through the same ergo_tree path.
      operationId: by_address
      parameters:
      - name: address
        in: path
        description: Base58 address
        required: true
        schema:
          type: string
      - name: limit
        in: query
        description: Page size (default 50, cap 100)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Pooled txs paying this address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_V1MempoolTx'
        '400':
          description: Invalid address/cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Mempool filtering not wired on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/mempool/by-box-id/{box_id}:
    get:
      tags:
      - mempool
      summary: |-
        `GET /api/v1/mempool/by-box-id/{box_id}` — pooled tx(s) that SPEND the given
        box (input side): the pending-spend / double-spend question (0..n rows).
      operationId: by_box_id
      parameters:
      - name: box_id
        in: path
        description: 64-char lowercase hex box id
        required: true
        schema:
          type: string
      - name: limit
        in: query
        description: Page size (default 50, cap 100)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Pooled txs spending this box (0..n — double-spend candidates)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_V1MempoolTx'
        '400':
          description: Invalid box_id/cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Mempool filtering not wired on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/mempool/by-ergo-tree/{ergo_tree}:
    get:
      tags:
      - mempool
      summary: |-
        `GET /api/v1/mempool/by-ergo-tree/{ergo_tree}` — pooled txs paying the given
        ergo_tree (output side). The tree is unprefixed wire hex.
      operationId: by_ergo_tree
      parameters:
      - name: ergo_tree
        in: path
        description: Unprefixed hex ErgoTree
        required: true
        schema:
          type: string
      - name: limit
        in: query
        description: Page size (default 50, cap 100)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Pooled txs paying this ErgoTree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_V1MempoolTx'
        '400':
          description: Invalid ergo_tree/cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Mempool filtering not wired on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/mempool/by-token-id/{token_id}:
    get:
      tags:
      - mempool
      summary: |-
        `GET /api/v1/mempool/by-token-id/{token_id}` — pooled txs that reference the
        given token id (output side).
      operationId: by_token_id
      parameters:
      - name: token_id
        in: path
        description: 64-char lowercase hex token id
        required: true
        schema:
          type: string
      - name: limit
        in: query
        description: Page size (default 50, cap 100)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Pooled txs referencing this token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_V1MempoolTx'
        '400':
          description: Invalid token_id/cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Mempool filtering not wired on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/mempool/fee-histogram:
    get:
      tags:
      - mempool
      summary: |-
        `GET /api/v1/mempool/fee-histogram` — the pool's wait-time histogram
        (`{index, n_txns, total_fee}` per bin). The `fee_per_byte_min/max` band is
        honestly `null`: the frozen hook is wait-time-keyed and carries no per-bin
        fee-per-byte bounds (design correction — see the group report).
      operationId: fee_histogram
      parameters:
      - name: bins
        in: query
        description: Number of bins (default 12, cap 64)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: max_wait_ms
        in: query
        description: Wait-time horizon the bins span; 0 (default) = whole pool
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
      responses:
        '200':
          description: Wait-time fee histogram
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1FeeHistogram'
        '409':
          description: Mempool filtering not wired on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/mempool/summary:
    get:
      tags:
      - mempool
      summary: |-
        `GET /api/v1/mempool/summary` — pool depth + capacity + derived utilization
        + active weight-function, plus the optional O4 depth history.
      operationId: summary
      parameters:
      - name: history
        in: query
        description: Trailing depth samples to include (oldest-first); omitted/0 = field omitted
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      responses:
        '200':
          description: Pool summary + derived utilization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1MempoolSummary'
  /api/v1/mempool/transactions:
    get:
      tags:
      - mempool
      summary: |-
        `GET /api/v1/mempool/transactions` — cursor-paginated pool listing,
        priority-weight descending by default (mining order).
      operationId: transactions
      parameters:
      - name: order
        in: query
        description: '`weight` (default), `fee_per_byte`, or `first_seen`'
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: Page size (default 50, cap 200)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Pooled transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_V1MempoolTx'
        '400':
          description: Invalid order/cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/mempool/transactions/{tx_id}:
    get:
      tags:
      - mempool
      summary: |-
        `GET /api/v1/mempool/transactions/{tx_id}` — one pooled tx: the `mempool_tx`
        row plus resolved `io_box` inputs/outputs (best-effort, from the extra index
        + the pool-output overlay). `404 tx_not_found` when not pooled.
      operationId: transaction_by_id
      parameters:
      - name: tx_id
        in: path
        description: 64-char lowercase hex transaction id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Pooled tx + resolved io_box inputs/outputs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1MempoolTxDetail'
        '400':
          description: Malformed tx id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '404':
          description: Not in this node's mempool
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/mining/candidate:
    get:
      tags:
      - mining
      summary: |-
        `GET /api/v1/mining/candidate` — T1. Reuses [`NodeMining::candidate`]
        (longpoll semantics preserved). Bare `WorkMessageJson` (reused verbatim —
        already snake_case + Scala-parity). `503 candidate_unavailable` when no
        candidate can be built. This CLOSES the finding-3 gap: the flat compat
        `/mining/candidate` mounts ungated; this v1 path is api_key-gated.
      operationId: candidate
      parameters:
      - name: longpoll
        in: query
        description: getblocktemplate-style longpoll id — block until the candidate changes from this msg
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Work message (WorkMessageJson — Scala-parity shape)
          content:
            application/json:
              schema: {}
        '409':
          description: Mining disabled on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: No candidate could be built (not synced or generation race)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/mining/candidate-with-txs:
    post:
      tags:
      - mining
      summary: |-
        `POST /api/v1/mining/candidate-with-txs` — T1, seam-deferred. The wire shape
        is documented (§3.3 #5) but no `NodeMining::candidate_with_txs` seam exists,
        so this answers the honest `route_unavailable` rather than silently ignoring
        the forced-tx set. Still gated at `Tier::Operator`.
      operationId: candidate_with_txs
      responses:
        '503':
          description: Forced-transaction candidate building not wired on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/mining/miner-stats:
    get:
      tags:
      - mining
      summary: |-
        `GET /api/v1/mining/miner-stats` — T0. Bare `ApiMinerStats` (already
        snake_case; the only compat violation was the `minerStats` camelCase path).
        Folds [`NodeChainQuery::last_headers`](crate::compat::NodeChainQuery) by
        miner pk, same logic as the compat `miner_stats_handler`.
      operationId: miner_stats
      parameters:
      - name: window
        in: query
        description: Trailing headers to fold (default 720, clamped 1..=16384)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      responses:
        '200':
          description: Miner attribution over the trailing window
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMinerStats'
        '503':
          description: Chain reader unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/mining/reward-address:
    get:
      tags:
      - mining
      summary: |-
        `GET /api/v1/mining/reward-address` — T1. Reuses
        [`NodeMining::reward_address`] into a fresh snake_case DTO.
        `503 reward_unavailable` while the wallet-resolved key isn't ready.
      operationId: reward_address
      responses:
        '200':
          description: Miner reward address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RewardAddress'
        '409':
          description: Mining disabled on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Wallet-resolved reward key not yet ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/mining/reward-pubkey:
    get:
      tags:
      - mining
      summary: |-
        `GET /api/v1/mining/reward-pubkey` — T1. Reuses [`NodeMining::reward_pubkey`]
        into a fresh snake_case DTO.
      operationId: reward_pubkey
      responses:
        '200':
          description: Miner reward pubkey
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RewardPubkey'
        '409':
          description: Mining disabled on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Wallet-resolved reward key not yet ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/mining/solution:
    post:
      tags:
      - mining
      summary: |-
        `POST /api/v1/mining/solution` — T1. Reuses [`NodeMining::submit_solution`].
        Body = `AutolykosSolutionJson`. `200` empty on accept. Same auth-gate closure
        as [`candidate`].
      operationId: solution
      requestBody:
        description: AutolykosSolutionJson — Scala-parity shape
        content:
          application/json:
            schema: {}
        required: true
      responses:
        '200':
          description: Accepted
        '400':
          description: Malformed solution body, or invalid PoW / stale candidate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Mining disabled on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Mining subsystem cannot answer right now
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/mining/status:
    get:
      tags:
      - mining
      summary: |-
        `GET /api/v1/mining/status` — T0. Composed from existing snapshot reads
        (`identity().mining` + `status().sync_state`); never triggers a `candidate()`
        build just to health-check.
      operationId: status
      responses:
        '200':
          description: Mining capability + template freshness (nulls until the template-cache seam is wired)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MiningStatus'
  /api/v1/network/blacklist:
    post:
      tags:
      - network
      summary: |-
        `POST /api/v1/network/blacklist` — T1, seam-deferred. No manual-ban write
        path exists on the peer manager yet (§3.2 #7), so this answers the honest
        `route_unavailable` rather than pretending to ban.
      operationId: blacklist_add
      responses:
        '503':
          description: Manual peer blacklisting not wired on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/network/blacklist/{addr}:
    delete:
      tags:
      - network
      summary: |-
        `DELETE /api/v1/network/blacklist/{addr}` — T1, seam-deferred (same gap as
        [`blacklist_add`]).
      operationId: blacklist_remove
      parameters:
      - name: addr
        in: path
        description: Peer address to un-blacklist
        required: true
        schema:
          type: string
      responses:
        '503':
          description: Manual peer un-blacklisting not wired on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/network/blacklisted:
    get:
      tags:
      - network
      summary: |-
        `GET /api/v1/network/blacklisted` — T0. Collection `{items:[{addr}], page}`
        over [`NodeChainQuery::peers_blacklisted`](crate::compat::NodeChainQuery),
        addresses cleaned to canonical form. `503 chain_reader_unavailable` when no
        chain reader is wired.
      operationId: blacklisted
      parameters:
      - name: limit
        in: query
        description: Page size (default 100, cap 500)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Blacklisted peer addresses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_BlacklistedPeer'
        '400':
          description: Invalid cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Chain reader unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/network/connect:
    post:
      tags:
      - network
      summary: |-
        `POST /api/v1/network/connect` — T1. Body: JSON string `"host:port"`. Reuses
        [`NodeAdmin::connect_to_peer`](crate::traits::NodeAdmin) (fire-and-forget
        dial). `200 "OK"` on accepted; `400 invalid_address` on unparseable input.
        Preserves the saner-than-Scala divergences (IPv6 accepted, unresolvable host
        → 400 not 500, out-of-range port → 400). `503 route_unavailable` with no
        admin bridge.
      operationId: connect
      requestBody:
        description: JSON string "host:port" to dial
        content:
          text/plain:
            schema:
              type: string
        required: true
      responses:
        '200':
          description: Dial accepted (fire-and-forget) — literal "OK"
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: Malformed body, or host:port did not parse/resolve
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Admin control bridge not wired on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/network/connected:
    get:
      tags:
      - network
      summary: |-
        `GET /api/v1/network/connected` — T0. Server-side filter of the same
        `peers()` data down to handshake-complete (`state == active`) peers (§3.2
        #2) — no new trait method.
      operationId: connected
      parameters:
      - name: limit
        in: query
        description: Page size (default 256, cap 1024)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Handshake-complete peers only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_ApiPeer'
        '400':
          description: Invalid cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/network/peers:
    get:
      tags:
      - network
      summary: |-
        `GET /api/v1/network/peers` — T0. Collection of `ApiPeer` (reused verbatim,
        already snake_case) — a superset view (every tracked entry, any state).
      operationId: peers
      parameters:
      - name: limit
        in: query
        description: Page size (default 256, cap 1024)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Every tracked peer (any state)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_ApiPeer'
        '400':
          description: Invalid cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/network/sync-info:
    get:
      tags:
      - network
      summary: |-
        `GET /api/v1/network/sync-info` — T0. Collection reshape of
        [`NodeChainQuery::peers_sync_info`](crate::compat::NodeChainQuery).
      operationId: sync_info
      parameters:
      - name: limit
        in: query
        description: Page size (default 100, cap 500)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Per-peer sync status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_SyncInfoEntry'
        '400':
          description: Invalid cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Chain reader unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/network/track-info:
    get:
      tags:
      - network
      summary: |-
        `GET /api/v1/network/track-info` — T0. Bare-object reshape of
        [`NodeChainQuery::peers_track_info`](crate::compat::NodeChainQuery).
      operationId: track_info
      responses:
        '200':
          description: Aggregate modifier-tracking counters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackInfo'
        '503':
          description: Chain reader unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/node/config:
    get:
      tags:
      - node
      summary: |-
        `GET /api/v1/node/config` — T1. No `NodeConfigView` seam exists on the node
        yet (§3.1 #8, Phase-2 ASSUMED-new), so this answers the honest
        `route_unavailable` (503) rather than fabricating or half-projecting a config
        tree. Gated at `Tier::Operator` so the closed shape is still auth-bounded.
      operationId: config_get
      responses:
        '503':
          description: Effective-config read not wired on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
    patch:
      tags:
      - node
      summary: |-
        `PATCH /api/v1/node/config` — T2. Config mutation is the more dangerous half
        of `node/config`, so it sits at `Tier::Admin` (loopback-preferred). No
        `apply_config_patch` seam exists yet, so it answers `route_unavailable`
        rather than exposing a mutation that isn't safely backed.
      operationId: config_patch
      responses:
        '503':
          description: Config mutation not wired on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/node/health:
    get:
      tags:
      - node
      summary: |-
        `GET /api/v1/node/health` — T0, dual status. `200` when `status = ok`; `503`
        for `stalled|disconnected|rejecting`, WITH the full typed body (§3.1 — never
        a bare error). Same mapping as the compat `health_handler`.
      operationId: health
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiHealth'
        '503':
          description: Stalled, disconnected, or rejecting a block
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiHealth'
  /api/v1/node/host:
    get:
      tags:
      - node
      summary: |-
        `GET /api/v1/node/host` — T0. Bare `ApiHost` (reused verbatim). Fold of the
        pre-existing flat `/api/v1/host` (design gap G1) into the `node/*` group.
      operationId: host
      responses:
        '200':
          description: Host info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiHost'
  /api/v1/node/identity:
    get:
      tags:
      - node
      summary: '`GET /api/v1/node/identity` — T0. Bare `ApiIdentity` (reused verbatim).'
      operationId: identity
      responses:
        '200':
          description: Node identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiIdentity'
  /api/v1/node/info:
    get:
      tags:
      - node
      summary: '`GET /api/v1/node/info` — T0. Bare `ApiInfo` (reused verbatim, §3.1).'
      operationId: info
      responses:
        '200':
          description: Node info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiInfo'
  /api/v1/node/status:
    get:
      tags:
      - node
      summary: '`GET /api/v1/node/status` — T0. Bare `ApiStatus` (reused verbatim).'
      operationId: status
      responses:
        '200':
          description: Dashboard status snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatus'
  /api/v1/node/sync:
    get:
      tags:
      - node
      summary: '`GET /api/v1/node/sync` — T0. Bare `ApiSyncStatus` (reused verbatim).'
      operationId: sync
      responses:
        '200':
          description: Sync status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSyncStatus'
  /api/v1/node/tip:
    get:
      tags:
      - node
      summary: '`GET /api/v1/node/tip` — T0. Bare `ApiTip` (reused verbatim).'
      operationId: tip
      responses:
        '200':
          description: Chain tip
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiTip'
  /api/v1/node/version:
    get:
      tags:
      - node
      summary: |-
        `GET /api/v1/node/version` — T0. Composed from existing snapshot reads
        (`info().version` + `votes().block_version`); no new read path.
      operationId: version
      responses:
        '200':
          description: Version + activated protocol version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeVersion'
  /api/v1/protocols:
    get:
      tags:
      - decode
      summary: |-
        `GET /api/v1/protocols` — the registry listing (discoverability: a client
        learns exactly what this node can decode). Static registry → a trivial
        single page. No indexer dependency; the cheapest possible T0.
      operationId: list_protocols
      responses:
        '200':
          description: Registered protocols (single page)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_ProtocolListItem'
  /api/v1/protocols/{protocol_id}:
    get:
      tags:
      - decode
      summary: |-
        `GET /api/v1/protocols/{protocol_id}` — one registry entry incl. its
        matchers. Unknown id → `404 protocol_not_found` (a genuinely absent
        resource, not a disabled subsystem).
      operationId: protocol_by_id
      parameters:
      - name: protocol_id
        in: path
        description: Registry protocol id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Protocol detail incl. matchers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProtocolDetail'
        '404':
          description: No protocol with that id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/protocols/{protocol_id}/state:
    get:
      tags:
      - decode
      summary: |-
        `GET /api/v1/protocols/{protocol_id}/state` — resolve the current unspent box
        holding the protocol's identifying NFT and return its decoded state (the
        "give me SigmaUSD reserves right now" one-shot). Requires an
        `identifying_token` matcher.
      operationId: protocol_state
      parameters:
      - name: protocol_id
        in: path
        description: Registry protocol id
        required: true
        schema:
          type: string
      - name: box_role
        in: query
        description: Disambiguate when the protocol has more than one singleton role
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Singleton box + decoded contract state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProtocolStateResponse'
        '400':
          description: box_role does not match this protocol's identifying-token role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '404':
          description: No protocol with that id, or the protocol has no singleton to resolve
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Extra index disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '500':
          description: Registry data bug (bad identifying-token key), or box assembly failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: No unspent box currently holds the singleton NFT (mid-reorg/uninitialized), or extra index syncing/halted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/scan/scans:
    get:
      tags:
      - scan
      summary: |-
        `GET /api/v1/scan/scans?limit=&cursor=` — every registered scan, ascending
        by `scan_id`, cursor-paginated on that natural key.
      operationId: list
      parameters:
      - name: limit
        in: query
        description: Page size (default 50, cap 500)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Registered scans — `{ items, page }`
          content:
            application/json:
              schema: {}
        '400':
          description: Invalid cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Wallet uninitialized or locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
    post:
      tags:
      - scan
      summary: '`POST /api/v1/scan/scans` — register a scan, returning its allocated id.'
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScanRegisterRequest'
        required: true
      responses:
        '201':
          description: Registered — `{ scan_id }`
          content:
            application/json:
              schema: {}
        '400':
          description: Invalid tracking_rule/wallet_interaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Wallet uninitialized or locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/scan/scans/{scan_id}:
    get:
      tags:
      - scan
      summary: |-
        `GET /api/v1/scan/scans/{scan_id}` — a single scan (filters `list_scans`).
        A missing id is `404 scan_not_found` (a GET must 404 on absence, never the
        compat 400).
      operationId: get_one
      parameters:
      - name: scan_id
        in: path
        description: Registered scan id
        required: true
        schema:
          type: integer
          format: int32
          minimum: 0
      responses:
        '200':
          description: The scan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanView'
        '404':
          description: No scan with that id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Wallet uninitialized or locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
    delete:
      tags:
      - scan
      summary: |-
        `DELETE /api/v1/scan/scans/{scan_id}` — deregister a scan. The trait treats a
        missing id as `bad_request`; this surface maps that to `404 scan_not_found`
        so a DELETE of an absent scan reads as "gone", not "malformed".
      operationId: deregister
      parameters:
      - name: scan_id
        in: path
        description: Registered scan id
        required: true
        schema:
          type: integer
          format: int32
          minimum: 0
      responses:
        '200':
          description: Deregistered — `{ scan_id }`
          content:
            application/json:
              schema: {}
        '404':
          description: No scan with that id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Wallet uninitialized or locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/scan/scans/{scan_id}/boxes:
    post:
      tags:
      - scan
      summary: '`POST /api/v1/scan/scans/{scan_id}/boxes` — manually attach a box.'
      operationId: attach_box
      parameters:
      - name: scan_id
        in: path
        description: Registered scan id
        required: true
        schema:
          type: integer
          format: int32
          minimum: 0
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachBoxRequest'
        required: true
      responses:
        '200':
          description: Attached — `{ box_id }`
          content:
            application/json:
              schema: {}
        '400':
          description: Malformed box JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Wallet uninitialized or locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/scan/scans/{scan_id}/boxes/{box_id}:
    delete:
      tags:
      - scan
      summary: |-
        `DELETE /api/v1/scan/scans/{scan_id}/boxes/{box_id}` — stop tracking a box
        (200, idempotent-friendly).
      operationId: detach_box
      parameters:
      - name: scan_id
        in: path
        description: Registered scan id
        required: true
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: box_id
        in: path
        description: 64-char lowercase hex box id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Untracked (idempotent) — `{ scan_id, box_id }`
          content:
            application/json:
              schema: {}
        '409':
          description: Wallet uninitialized or locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/scan/scans/{scan_id}/transactions:
    get:
      tags:
      - scan
      summary: |-
        `GET /api/v1/scan/scans/{scan_id}/transactions` — wallet transactions tagged
        with this scan id. An unknown/deregistered id is an empty page, not 404
        (trait contract). Item = the wallet tx summary + `scan_ids`.
      operationId: transactions
      parameters:
      - name: scan_id
        in: path
        description: Registered scan id (unknown/deregistered id → empty page)
        required: true
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: limit
        in: query
        description: Page size (default 50, cap 500)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Wallet transactions tagged with this scan id — `{ items, page }`
          content:
            application/json:
              schema: {}
        '400':
          description: Invalid cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Wallet uninitialized or locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/scan/scans/{scan_id}/unspent:
    get:
      tags:
      - scan
      summary: '`GET /api/v1/scan/scans/{scan_id}/unspent` — unspent boxes tracked by a scan.'
      operationId: unspent
      parameters:
      - name: scan_id
        in: path
        description: Registered scan id
        required: true
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: limit
        in: query
        description: Page size (default 50, cap 2499)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      - name: min_confirmations
        in: query
        description: Minimum confirmations
        required: false
        schema:
          type: integer
          format: int32
      - name: max_confirmations
        in: query
        description: Maximum confirmations (-1 = unbounded)
        required: false
        schema:
          type: integer
          format: int32
      - name: min_inclusion_height
        in: query
        description: Minimum inclusion height
        required: false
        schema:
          type: integer
          format: int32
      - name: max_inclusion_height
        in: query
        description: Maximum inclusion height (-1 = unbounded)
        required: false
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: Unspent boxes tracked by this scan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_ScanBoxView'
        '400':
          description: Invalid filter bounds/cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Wallet uninitialized or locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/script/compile:
    post:
      tags:
      - script
      summary: |-
        `POST /script/compile` — ErgoScript source → tree / address / typed-AST.
        A thin adapter over [`ergo_compiler::compile`]; a compile error is the v1
        envelope with the error position / phase / Scala class in `detail`.
      operationId: compile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompileBody'
        required: true
      responses:
        '200':
          description: Compiled tree + addresses + typed AST
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompileResponse'
        '400':
          description: Compile error (position/phase/Scala class in detail)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '413':
          description: Source exceeds the size cap
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/script/cost:
    post:
      tags:
      - script
      summary: |-
        `POST /script/cost` — the total reduce cost under a bounded accumulator.
        Same request shape as `execute`; reuses the SAME bounded reduce primitive
        (compose, don't reimplement the cost accounting — fragment §4.4).
      operationId: cost
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteBody'
        required: true
      responses:
        '200':
          description: Total reduce cost (breakdown empty until cost-trace is wired)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostResponse'
        '400':
          description: Invalid input, cost_limit exceeded, or too_deep
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '413':
          description: Source exceeds the size cap
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/script/diff:
    post:
      tags:
      - script
      summary: |-
        `POST /script/diff` — reduce via OUR path AND the Scala oracle, diff the
        verdict. **Unconfigured oracle ⇒ `oracle_unavailable`** (D3 residual; the
        oracle is never required to exist). The Rust side runs under the same
        bounded cost governor as `execute`.
      operationId: diff
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiffBody'
        required: true
      responses:
        '200':
          description: Rust vs Scala-oracle verdict comparison
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiffResponse'
        '400':
          description: Invalid input, cost_limit exceeded, or too_deep
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '501':
          description: No Scala reference oracle configured on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/script/execute:
    post:
      tags:
      - script
      summary: |-
        `POST /script/execute` — reduce a tree/source against a context on the exact
        block-validation path, **bounded by the cost governor** (D2). A script that
        would exceed the per-request cost cap answers `400 cost_limit`, never hangs.
      operationId: execute
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteBody'
        required: true
      responses:
        '200':
          description: Reduction result + cost
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecuteResponse'
        '400':
          description: Invalid input, cost_limit exceeded, or too_deep
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '413':
          description: Source exceeds the size cap
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/script/explain:
    post:
      tags:
      - script
      summary: |-
        `POST /script/explain` — same input as `simulate`, plus the mechanical
        diagnosis: the reduction trace and a best-effort human line. The mechanical
        fields ship in the node; the `human_diagnosis` is explicitly
        non-authoritative (fragment §7-D3).
      operationId: explain
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimulateBody'
        required: true
      responses:
        '200':
          description: Reduction trace + human_diagnosis (non-authoritative)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExplainResponse'
        '400':
          description: Malformed box_id, cost_limit exceeded, or too_deep
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '404':
          description: No unspent box with that id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Chain reader unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/script/inspect:
    post:
      tags:
      - script
      summary: |-
        `POST /script/inspect` — decompile an `ergo_tree` (hex) or `address` into a
        structured typed view. Pure parse; no eval, no chain read.
      operationId: inspect
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InspectBody'
        required: true
      responses:
        '200':
          description: Structured typed decompilation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InspectResponse'
        '400':
          description: Invalid ergo_tree/address, or neither/both supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/script/simulate:
    post:
      tags:
      - script
      summary: |-
        `POST /script/simulate` — resolve a REAL on-chain box and reduce its guard
        against real chain state. `box_id` missing ⇒ `box_not_found`; the chain
        reader unwired ⇒ `chain_reader_unavailable` (never a bare 404).
      operationId: simulate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimulateBody'
        required: true
      responses:
        '200':
          description: Spendability against the real resolved box (single-box scope — no tx/proof verified)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulateResponse'
        '400':
          description: Malformed box_id, cost_limit exceeded, or too_deep
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '404':
          description: No unspent box with that id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Chain reader unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/stats/difficulty:
    get:
      tags:
      - stats
      summary: |-
        `GET /api/v1/stats/difficulty` — per-block difficulty series (O8 canonical
        home; supersedes the legacy bare-array `difficulty/history`). `hashrate` is
        a server derivation (`difficulty / target_block_interval_s`).
      operationId: difficulty
      parameters:
      - name: from_height
        in: query
        description: Start height
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: to_height
        in: query
        description: End height (default tip)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: limit
        in: query
        description: Page size (default 720, cap 16384)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      - name: resolution
        in: query
        description: '`block` (default), `hour`, or `day`'
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Difficulty series with derived hashrate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeriesPage_DifficultyPoint'
        '400':
          description: Invalid resolution/cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Chain reader unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/stats/emission-schedule:
    get:
      tags:
      - stats
      summary: |-
        `GET /api/v1/stats/emission-schedule` — the projected forward curve
        (heights may exceed the tip). Pure schedule math, no chain read, so no
        timestamps.
      operationId: emission_schedule
      parameters:
      - name: from_height
        in: query
        description: Start height (default 0)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: to_height
        in: query
        description: End height — required, may exceed the tip
        required: true
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: step
        in: query
        description: Height stride (default 1)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: limit
        in: query
        description: Page size (default 720, cap 16384)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Projected emission-schedule series
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeriesPage_SupplyPoint'
        '400':
          description: Missing to_height, or to_height < from_height
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Emission schedule not wired on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/stats/fees:
    get:
      tags:
      - stats
      summary: |-
        `GET /api/v1/stats/fees` — per-block fee statistics from confirmed blocks.
        Fees are summed output-side over the fee-proposition outputs (the same
        honest, input-free approach as `transactions/{id}`), so no input resolution
        is needed. The per-point cost is a full-block read, so the cap is tighter.
      operationId: fees
      parameters:
      - name: from_height
        in: query
        description: Start height
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: to_height
        in: query
        description: End height (default tip)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: limit
        in: query
        description: Page size (default 720, cap 1024)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      - name: resolution
        in: query
        description: '`block` (default), `hour`, or `day`'
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Per-block fee statistics series
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeriesPage_FeesPoint'
        '400':
          description: Invalid resolution/cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Chain reader unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/stats/holders:
    get:
      tags:
      - stats
      summary: |-
        `GET /api/v1/stats/holders` — token-holder distribution + concentration
        metrics. **Overlap O3:** reuses the ONE bounded holder-aggregation scan from
        `tokens/{id}/holders` (`scan_token_holders`); this surface adds `share_pct`
        per holder and the `gini` / `top10_share_pct` concentration metrics.
      operationId: holders
      parameters:
      - name: token_id
        in: query
        description: 64-char lowercase hex token id — required
        required: true
        schema:
          type: string
      - name: limit
        in: query
        description: Page size (default 100, cap 1000)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      - name: include_metrics
        in: query
        description: Include gini/top10_share_pct (default true)
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Holder distribution + concentration metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionMeta_HolderRow_HolderMetrics'
        '400':
          description: Missing/malformed token_id, or invalid cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '404':
          description: No token with that id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Extra index disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Extra index syncing/halted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/stats/mempool-depth:
    get:
      tags:
      - stats
      summary: |-
        `GET /api/v1/stats/mempool-depth` — the congestion chart. Consumes the SAME
        O4 sample ring the mempool group built (Overlap O4). When the ring has not
        yet recorded a sample, one live point is synthesized from the current
        summary so the series is never empty on a fresh node.
      operationId: mempool_depth
      parameters:
      - name: limit
        in: query
        description: Page size (default 720, capped at the depth ring size)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      responses:
        '200':
          description: Mempool depth series (single page, never empty)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeriesPage_V1MempoolDepthPoint'
  /api/v1/stats/supply:
    get:
      tags:
      - stats
      summary: |-
        `GET /api/v1/stats/supply` — realized circulating + remaining ERG over
        height (the emission curve). Emission is pure arithmetic; timestamps come
        from the header fold.
      operationId: supply
      parameters:
      - name: from_height
        in: query
        description: Start height
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: to_height
        in: query
        description: End height (default tip)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: limit
        in: query
        description: Page size (default 720, cap 16384)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      - name: resolution
        in: query
        description: '`block` (default), `hour`, or `day`'
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Supply series (timestamps null without a chain reader)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeriesPage_SupplyPoint'
        '400':
          description: Invalid resolution/cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Emission schedule not wired on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/tokens:
    get:
      tags:
      - tokens
      summary: |-
        `GET /api/v1/tokens` — mint-order list. Phase-2 (design G3): `INDEXED_TOKEN`
        is hash-keyed with no mint-sequence enumeration index, so there is no honest
        way to enumerate every token in mint order today. Answers `503
        state_unavailable` (never fabricated data) once the index is confirmed
        present-but-disabled by the gate.
      operationId: tokens_list
      responses:
        '409':
          description: Extra index disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Mint-order enumeration not available on this node (design gap), or extra index syncing/halted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/tokens/{token_id}:
    get:
      tags:
      - tokens
      summary: '`GET /api/v1/tokens/{token_id}` — bare token object. `404` on miss.'
      operationId: token_by_id
      parameters:
      - name: token_id
        in: path
        description: 64-char lowercase hex token id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: The token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Token'
        '400':
          description: Malformed token id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '404':
          description: No token with that id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Extra index disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Extra index syncing/halted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/tokens/{token_id}/holders:
    get:
      tags:
      - tokens
      summary: '`GET /api/v1/tokens/{token_id}/holders` — `{items, page, meta}` (Part D).'
      operationId: token_holders
      parameters:
      - name: token_id
        in: path
        description: 64-char lowercase hex token id
        required: true
        schema:
          type: string
      - name: limit
        in: query
        description: Page size (default 50, cap 500)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Holder ranking + scan meta (scan_capped honesty flag)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionMeta_V1TokenHolder_HoldersMeta'
        '400':
          description: Malformed token id/cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Extra index disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Extra index syncing/halted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/tokens/{token_id}/stats:
    get:
      tags:
      - tokens
      summary: |-
        `GET /api/v1/tokens/{token_id}/stats` — bare object; shares the holders
        scan. `404 token_not_found` when the mint record is unknown.
      operationId: token_stats
      parameters:
      - name: token_id
        in: path
        description: 64-char lowercase hex token id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Token stats (holder_count/circulating_supply inherit scan_capped honesty)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1TokenStats'
        '400':
          description: Malformed token id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '404':
          description: No token with that id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Extra index disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Extra index syncing/halted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/transactions-psbt:
    post:
      tags:
      - accounts
      summary: |-
        Any PSBT-session route (`v1-api-design.md` §3.11). The commitment/hint math
        exists (`generate_commitments`/`extract_hints`) but the durable session +
        threshold state + a hints-bag sign variant do not → honest
        `route_unavailable`, never a faked partial signature. Representative mount
        for the whole PSBT family — every method on `/api/v1/transactions-psbt`,
        `/api/v1/transactions-psbt/{psbt_id}`,
        `/api/v1/transactions-psbt/{psbt_id}/contributions`, and
        `/api/v1/transactions-psbt/{psbt_id}/finalize` shares this SAME handler and
        answers identically.
      operationId: psbt_seam
      responses:
        '503':
          description: PSBT-session subsystem not wired on this node (same answer on every psbt route/method)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/transactions/build:
    post:
      tags:
      - transactions
      summary: |-
        `POST /api/v1/transactions/build` — keyless `tx_intent` → unsigned tx. T0:
        no secret material crosses this boundary (explicit inputs + change address).
      operationId: build
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuildBody'
        required: true
      responses:
        '200':
          description: Unsigned tx + summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildResponse'
        '400':
          description: Invalid intent (bad address/amount/too many inputs)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '404':
          description: No spendable inputs found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Extra index disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '422':
          description: Well-formed but not-yet-supported intent (mint/burn/registers/raw boxes)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '500':
          description: Build failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Keyless builder not wired on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/transactions/check:
    post:
      tags:
      - transactions
      summary: |-
        `POST /api/v1/transactions/check` — validate raw tx bytes without
        broadcasting. Also mounted at `POST /api/v1/mempool/check` (Overlap O1).
      operationId: check
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RawTransactionBytes'
        required: true
      responses:
        '200':
          description: Would be admitted — `{ tx_id }`
          content:
            application/json:
              schema: {}
        '400':
          description: Would be rejected by admission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Submission not wired on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Node overloaded or shutting down
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '504':
          description: Admission timed out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/transactions/fee-estimate:
    get:
      tags:
      - transactions
      summary: |-
        `GET /api/v1/transactions/fee-estimate?target_blocks=1|3|10&tx_size_bytes=` —
        mempool-derived fee tiers (nanoERG-per-byte as strings). Backed by the chain
        reader's `pool_recommended_fee`; honest `mempool_view_disabled` if unwired.
      operationId: fee_estimate
      parameters:
      - name: target_blocks
        in: query
        description: 1, 3 (default), or 10
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: tx_size_bytes
        in: query
        description: Assumed tx size in bytes (default 200)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      responses:
        '200':
          description: Fee tiers for the requested + standard horizons
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeeEstimateResponse'
        '400':
          description: Invalid target_blocks/tx_size_bytes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Fee estimation not wired on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/transactions/simulate:
    post:
      tags:
      - transactions
      summary: |-
        `POST /api/v1/transactions/simulate` — dry-run an assembled tx: accept/reject
        + cost + conflicts, NO broadcast and NO mempool mutation (G8).
      operationId: simulate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimulateBody'
        required: true
      responses:
        '200':
          description: Simulation outcome (valid:false is a normal result, not an error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulateResponse'
        '400':
          description: Malformed tx bytes, or a malformed/transient admission rejection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Simulation not wired on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '413':
          description: Assembled tx exceeds the simulate body cap
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Node overloaded or shutting down
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '504':
          description: Simulation timed out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/transactions/submit:
    post:
      tags:
      - transactions
      summary: |-
        `POST /api/v1/transactions/submit` — broadcast raw tx bytes into the pool.
        Also mounted at `POST /api/v1/mempool/submit` (Overlap O1 — same handler,
        documented alias, not a second implementation).
      operationId: submit
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RawTransactionBytes'
        required: true
      responses:
        '200':
          description: Admitted — `{ tx_id }`
          content:
            application/json:
              schema: {}
        '400':
          description: Rejected by admission (deserialize/non_canonical/double_spend/...)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Submission not wired on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Node overloaded or shutting down
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '504':
          description: Admission timed out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/transactions/{tx_id}:
    get:
      tags:
      - transactions
      summary: |-
        `GET /api/v1/transactions/{tx_id}` — one transaction, confirmed (indexer)
        first then the mempool overlay. The single source of truth for "is this
        on-chain yet" (`confirmed`).
      operationId: tx_by_id
      parameters:
      - name: tx_id
        in: path
        description: 64-char lowercase hex transaction id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Transaction (confirmed or pooled)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Tx'
        '400':
          description: Malformed tx id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '404':
          description: Unknown, confirmed or pooled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Extra index disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '500':
          description: Failed to assemble the transaction response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Extra index syncing/halted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/transactions/{tx_id}/status:
    get:
      tags:
      - transactions
      summary: |-
        `GET /api/v1/transactions/{tx_id}/status` — lifecycle + ETA. Confirmed
        (extra-index) wins over pooled; a well-formed unknown id is a 200
        `state:"unknown"` (a legitimate polled answer), only a malformed id is a 400.
      operationId: status
      parameters:
      - name: tx_id
        in: path
        description: 64-char lowercase hex transaction id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: 'Lifecycle status: confirmed / pending / unknown'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Malformed tx id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '500':
          description: Failed to assemble the confirmed transaction status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/voting/candidate:
    get:
      tags:
      - voting
      summary: |-
        `GET /api/v1/voting/candidate` — T0, seam-deferred. The next-block vote-byte
        preview (§3.4 #3) has no projection in `ergo-api` and needs a read threaded
        through the candidate-builder crate; until then it answers the honest
        `route_unavailable` rather than fabricating vote bytes.
      operationId: candidate
      responses:
        '503':
          description: Next-block vote-byte preview not wired on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/voting/history:
    get:
      tags:
      - voting
      summary: |-
        `GET /api/v1/voting/history` — T0. Bare-object reshape of
        [`NodeChainQuery::votes_history`](crate::compat::NodeChainQuery).
        `503 chain_reader_unavailable` with no chain reader.
      operationId: history
      responses:
        '200':
          description: Per-epoch parameter changes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VotesHistory'
        '503':
          description: Chain reader unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
  /api/v1/voting/operator-votes:
    get:
      tags:
      - voting
      summary: |-
        `GET /api/v1/voting/operator-votes` — T1. The operator-private half split off
        `ApiVotes.configured_votes` (finding 5), now gated. Collection envelope
        (bounded, ≤ ~9 entries).
      operationId: operator_votes_get
      parameters:
      - name: limit
        in: query
        description: Page size (default 50, cap 100)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      responses:
        '200':
          description: The operator's configured votes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection_ConfiguredVote'
        '400':
          description: Invalid cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
    post:
      tags:
      - voting
      summary: |-
        `POST /api/v1/voting/operator-votes` — T1. Reuses
        [`NodeAdmin::set_voting_targets`]. REPLACES the configured set. `204` on
        success; `400 not_votable` / `400 out_of_range` / `409 mining_disabled`
        (reason re-spelled from the dot-form `mining.disabled` per §1.4 rule 7).
      operationId: operator_votes_set
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetVotesRequest'
        required: true
      responses:
        '204':
          description: Replaced — the configured set now exactly matches the request
        '400':
          description: Malformed body, non-votable parameter id, or target outside its bounds
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Mining disabled on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Admin control bridge not wired on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/voting/votes:
    get:
      tags:
      - voting
      summary: |-
        `GET /api/v1/voting/votes` — T0. Public votable-parameter descriptor only;
        `configured_votes` is NOT exposed here (moved to the T1 `operator-votes`).
      operationId: votes
      responses:
        '200':
          description: Public votable-parameter descriptor (no configured_votes — see operator-votes)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicVotes'
  /api/v1/webhooks:
    get:
      tags:
      - webhooks
      summary: '`GET /api/v1/webhooks` — list subscriptions (T1), cursor-paginated.'
      operationId: list
      parameters:
      - name: limit
        in: query
        description: Page size
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Registered webhooks (never the secret) — `{ items, page }`
          content:
            application/json:
              schema: {}
        '400':
          description: Invalid cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Webhooks subsystem disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
    post:
      tags:
      - webhooks
      summary: |-
        `POST /api/v1/webhooks` — register a subscription (T1). Returns 201 with the
        subscription **and** the secret echoed exactly once.
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '201':
          description: Registered — subscription + secret (echoed only here)
          content:
            application/json:
              schema: {}
        '400':
          description: Malformed body, empty channels/secret, invalid channel selector, or insecure/malformed/forbidden-target url
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Webhooks subsystem disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '429':
          description: Maximum number of webhooks already registered, or too many channels for one webhook
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '503':
          description: Named channel has no live feed on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/webhooks/{webhook_id}:
    get:
      tags:
      - webhooks
      summary: '`GET /api/v1/webhooks/{webhook_id}` — one subscription (T1). Never the secret.'
      operationId: detail
      parameters:
      - name: webhook_id
        in: path
        description: Registered webhook id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: The subscription (never the secret)
          content:
            application/json:
              schema: {}
        '404':
          description: No webhook with that id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Webhooks subsystem disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
    delete:
      tags:
      - webhooks
      summary: '`DELETE /api/v1/webhooks/{webhook_id}` — deregister (T1).'
      operationId: delete
      parameters:
      - name: webhook_id
        in: path
        description: Registered webhook id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Deregistered — `{ webhook_id, deleted }`
          content:
            application/json:
              schema: {}
        '404':
          description: No webhook with that id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Webhooks subsystem disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
    patch:
      tags:
      - webhooks
      summary: '`PATCH /api/v1/webhooks/{webhook_id}` — pause / resume (T1).'
      operationId: patch_active
      parameters:
      - name: webhook_id
        in: path
        description: Registered webhook id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchRequest'
        required: true
      responses:
        '200':
          description: Updated subscription
          content:
            application/json:
              schema: {}
        '400':
          description: Request body is not valid JSON for this endpoint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '404':
          description: No webhook with that id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Webhooks subsystem disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/webhooks/{webhook_id}/deliveries:
    get:
      tags:
      - webhooks
      summary: |-
        `GET /api/v1/webhooks/{webhook_id}/deliveries` — delivery-status log (T1),
        cursor-paginated, newest-first.
      operationId: deliveries
      parameters:
      - name: webhook_id
        in: path
        description: Registered webhook id
        required: true
        schema:
          type: string
      - name: limit
        in: query
        description: Page size
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: cursor
        in: query
        description: Opaque page cursor from a prior response
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Delivery log, newest-first — `{ items, page }`
          content:
            application/json:
              schema: {}
        '400':
          description: Invalid cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '404':
          description: No webhook with that id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '409':
          description: Webhooks subsystem disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
      security:
      - ApiKeyAuth: []
  /api/v1/ws:
    get:
      tags:
      - realtime
      summary: |-
        `GET /api/v1/ws` handler. Rejects before upgrade with the standard v1 error
        envelope when the subsystem is off (`realtime_disabled`) or a connection cap
        is hit (`connection_limit`, HTTP 429).
      description: |-
        **Not a plain REST read.** A successful call performs the WebSocket
        upgrade handshake (HTTP 101) and hands off to the long-lived [`Session`]
        protocol (subscribe/unsubscribe/resume/ping, `v1-api-design.md` §4.1) — not
        representable as an OpenAPI response body. Only the pre-upgrade rejection
        paths are documented below.
      operationId: ws_handler
      responses:
        '101':
          description: Switching Protocols — WebSocket session established
        '409':
          description: Real-time subsystem disabled on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
        '429':
          description: Connection cap reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1Error'
components:
  schemas:
    ApiBlockApplyError:
      type: object
      description: |-
        A block this node rejected during apply, surfaced to operators. Distinct
        from a benign data-wait (section not yet downloaded) or reorg — this is a
        block the node refused on validation while its peers may have accepted it.
      required:
      - block_id
      - height
      - reason
      - age_ms
      properties:
        age_ms:
          type: integer
          format: int64
          description: Milliseconds since the rejection was recorded (computed at read time).
          minimum: 0
        block_id:
          type: string
          description: Hex-encoded rejected header id.
        height:
          type: integer
          format: int32
          description: Height the rejected block claimed.
          minimum: 0
        reason:
          type: string
          description: Operator-facing rejection reason (the `BlockProcessError` Display).
    ApiBootstrapPhase:
      type: string
      description: |-
        UTXO snapshot bootstrap reducer phase, as surfaced on
        [`ApiBootstrapStatus`]. UI maps each variant to a human label and
        phase indicator.
      enum:
      - discovery
      - manifest_requested
      - manifest_verified
      - downloading_chunks
      - reconstructing
      - installing
      - post_install_catchup
    ApiBootstrapStatus:
      type: object
      description: |-
        Bootstrap progress for the Mode 2 (UTXO snapshot) consume side.
        Surfaced to operators so the ~30–60 minute boot window doesn't
        look like a stuck node (fullHeight=0, indexer=0%, etc.). Each
        field maps directly to a dashboard cell or progress bar.
      required:
      - phase
      - snapshot_height
      - voters
      - chunks_received
      - chunks_total
      - trust_check_passed
      - started_unix_ms
      properties:
        chunks_received:
          type: integer
          format: int32
          description: |-
            Chunks received and committed to assembly. `0` until the
            `downloading_chunks` phase starts.
          minimum: 0
        chunks_total:
          type: integer
          format: int32
          description: |-
            Total chunks expected per the verified manifest. `0` before
            `manifest_verified`.
          minimum: 0
        header_availability:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ApiHeaderAvailability'
            description: |-
              Header-chain availability mode as reported by the store —
              `dense` for a full-node-sync history, `sparse` for a NiPoPoW-
              bootstrapped history. Absent when the store reports the
              default (Dense) and no NiPoPoW bootstrap is in progress.

              Distinct from [`ApiIdentity::history_mode`] — that field is the
              operator-configured chain-retention policy (archive / pruned /
              utxo-bootstrapped / headers-only), this field is the on-disk
              header-section shape (dense from genesis vs sparse with a
              NiPoPoW dense-suffix anchor).
        manifest_id:
          type:
          - string
          - 'null'
          description: |-
            Hex-encoded manifest_id when known (post-discovery), else `None`.
            32 bytes / 64 hex chars.
        phase:
          $ref: '#/components/schemas/ApiBootstrapPhase'
          description: |-
            Current bootstrap phase. UI maps each variant to its human
            label and phase indicator.
        popow_dense_from_height:
          type:
          - integer
          - 'null'
          format: int32
          description: |-
            In `HeaderAvailability::PoPowSparse` mode, the lowest height
            for which a `HEADER_CHAIN_INDEX` row exists locally. Heights
            below this are sparse-prefix witnesses (not chain-indexed).
            `None` when mode is Dense.
          minimum: 0
        popow_phase:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ApiPopowPhase'
            description: |-
              NiPoPoW bootstrap phase, when enabled. Absent when NiPoPoW
              bootstrap is disabled (legacy Mode 2-only flow) or hasn't
              started.
        popow_providers:
          type:
          - integer
          - 'null'
          format: int32
          description: |-
            Number of distinct peers that have responded with a NiPoPoW
            proof so far. `0` when popow_phase is absent or before any
            inbound proof.
          minimum: 0
        snapshot_height:
          type: integer
          format: int32
          description: |-
            Snapshot height as selected by the discovery quorum.
            `0` when still in `discovery` and no manifest has been picked.
          minimum: 0
        started_unix_ms:
          type: integer
          format: int64
          description: |-
            Unix-ms timestamp when the bootstrap reducer first transitioned
            out of `Idle`. Lets the UI compute an "elapsed" clock without
            holding state of its own.
          minimum: 0
        trust_check_passed:
          type: boolean
          description: |-
            `true` once the manifest's root label has been compared
            against the canonical header.state_root at `snapshot_height`
            and matched. False until the trust check fires.
        voters:
          type: integer
          format: int32
          description: |-
            Number of peers in the quorum that voted for the selected
            manifest. `0` during the `discovery` phase before quorum.
          minimum: 0
    ApiFullBlockRef:
      type: object
      required:
      - height
      - header_id
      - parent_id
      - timestamp_unix_ms
      - state_root_avl
      - n_bits
      - difficulty
      properties:
        difficulty:
          type: string
          description: Network difficulty decoded from `n_bits`, as a decimal string.
        header_id:
          type: string
        height:
          type: integer
          format: int32
          minimum: 0
        n_bits:
          type: integer
          format: int32
          description: Compact difficulty target (`nBits`) committed in this header.
          minimum: 0
        parent_id:
          type: string
        state_root_avl:
          type: string
          description: |-
            AVL+ authenticated UTXO-tree root digest committed in this full
            block's header — 33 bytes (`Digest32 || balance-byte`), hex-encoded
            (66 chars). Mirrors the on-chain `Header.stateRoot` field;
            distinct from the chain's cumulative-PoW score or any header hash.
        timestamp_unix_ms:
          type: integer
          format: int64
          minimum: 0
    ApiHeaderAvailability:
      type: string
      description: Header-chain density reported by the chain store.
      enum:
      - dense
      - sparse
    ApiHeaderRef:
      type: object
      required:
      - height
      - header_id
      - parent_id
      - timestamp_unix_ms
      - n_bits
      - difficulty
      properties:
        difficulty:
          type: string
          description: |-
            Network difficulty decoded from `n_bits`, as a decimal string —
            full precision, since difficulty exceeds `u64` at high mainnet
            difficulty. Hashrate is a client derivation (`difficulty /
            target_block_interval`), not a field here.
        header_id:
          type: string
        height:
          type: integer
          format: int32
          minimum: 0
        n_bits:
          type: integer
          format: int32
          description: Compact difficulty target (`nBits`) committed in this header.
          minimum: 0
        parent_id:
          type: string
        timestamp_unix_ms:
          type: integer
          format: int64
          minimum: 0
    ApiHealth:
      type: object
      required:
      - status
      - behind
      - last_progress_age_ms
      - peer_count
      properties:
        behind:
          type: integer
          format: int32
          minimum: 0
        last_progress_age_ms:
          type: integer
          format: int64
          minimum: 0
        peer_count:
          type: integer
          format: int32
          minimum: 0
        status:
          $ref: '#/components/schemas/HealthStatus'
    ApiHistoryMode:
      oneOf:
      - type: object
        description: |-
          `blocks_to_keep = -1` and `utxo_bootstrap = false` and not the
          canonical Mode 6 combo. Full archive — the most common live
          runtime mode and the `Default` variant.
        required:
        - kind
        properties:
          kind:
            type: string
            enum:
            - archive
      - type: object
        description: |-
          `utxo_bootstrap = true`. Operator opted into the Mode 2 UTXO
          snapshot bootstrap path. The `kind` wires regardless of whether
          the snapshot has been applied — observe `fullHeight > 0` on
          `/info` or `/api/v1/tip` for that.
        required:
        - kind
        properties:
          kind:
            type: string
            enum:
            - utxo_bootstrapped
      - type: object
        description: |-
          Canonical Mode 6 combo: `state_type = Digest`,
          `verify_transactions = false`, `blocks_to_keep = 0`. Boots
          successfully via the `is_canonical_mode_6` short-circuit in
          `validate_runtime_mode_support`.
        required:
        - kind
        properties:
          kind:
            type: string
            enum:
            - headers_only
      - type: object
        description: |-
          `blocks_to_keep = N` for `N >= 1`. Forward-compat with the
          Mode 3 eviction roadmap; currently rejected by the runtime
          gate.
        required:
        - suffix_len
        - kind
        properties:
          kind:
            type: string
            enum:
            - pruned
          suffix_len:
            type: integer
            format: int32
            minimum: 0
      description: |-
        Chain-history retention policy as configured at boot. Tagged
        union; clients switch on `kind`.
    ApiHost:
      type: object
      description: |-
        Host-process metrics: memory, on-disk databases, free space on the
        data-directory volume. `None` on any field means "could not
        determine" — sysinfo refresh failure, permissions, missing file,
        or platform gap. `Some(0)` means a legitimately zero measurement.
      properties:
        cpu_pct:
          type:
          - number
          - 'null'
          format: float
          description: CPU usage of the node process as a percent of one core.
        disk_free_bytes:
          type:
          - integer
          - 'null'
          format: int64
          description: Free bytes on the volume containing the data directory.
          minimum: 0
        disk_total_bytes:
          type:
          - integer
          - 'null'
          format: int64
          description: Total bytes on that volume.
          minimum: 0
        index_db_bytes:
          type:
          - integer
          - 'null'
          format: int64
          description: |-
            Size of `indexer.redb`. `None` when the indexer is disabled or
            the file is missing.
          minimum: 0
        load_1m:
          type:
          - number
          - 'null'
          format: float
          description: 1-minute load average.
        net_in_bps:
          type:
          - integer
          - 'null'
          format: int64
          description: Receive bytes-per-second across all interfaces.
          minimum: 0
        net_out_bps:
          type:
          - integer
          - 'null'
          format: int64
          description: Transmit bps.
          minimum: 0
        rss_bytes:
          type:
          - integer
          - 'null'
          format: int64
          description: Resident set size of the node process.
          minimum: 0
        state_db_bytes:
          type:
          - integer
          - 'null'
          format: int64
          description: Size of `state.redb` on disk.
          minimum: 0
    ApiIdentity:
      type: object
      description: |-
        What kind of node this is, beyond the boot-time `ApiInfo` shape.

        Captures the protocol-visible mode flags advertised on the P2P
        handshake plus operator-config toggles (extra-index, API submission,
        declared / bind addr). Set at boot from `NodeConfig` + the hardcoded
        `Mode` peer-feature; doesn't change at runtime today.

        `mining` mirrors the node's mining configuration (whether the
        `/mining/*` work-serving routes are wired).

        Backs `GET /api/v1/identity`; consumed by the operator dashboard's
        identity strip. Rust-native — Scala's `/info` has no equivalent.

        Field contract:
        - `state_type`, `verify_transactions`, `history_mode`, `mining`,
          `extra_index_enabled`, `declared_addr`, `bind_addr` are
          config-intent: what `NodeConfig` asked for at boot. Scala parity
          for the wire-visible fields lives here.
        - `utxo_bootstrap` and `nipopow_bootstrap` are effective-state:
          true when either the operator's config flag is set OR a
          matching provenance marker on disk confirms the bootstrap
          actually ran. An operator who cleared the bootstrap flag in
          config after a successful install therefore still sees `true`
          on the surface that survived the install. Refreshed by the
          action loop on bootstrap transitions; live for the process
          lifetime via `Arc<ArcSwap<ApiIdentity>>` in `api_bridge.rs`.
        - `mode` is a compact human-readable label composed from both
          classes, including the Mode 4 `"mode-4 · …"` variants.

        To observe actual runtime progress (e.g. current chain height,
        peer count), read `fullHeight` / `bestFullHeaderId` on adjacent
        endpoints.
      required:
      - mode
      - state_type
      - verify_transactions
      - history_mode
      - utxo_bootstrap
      - nipopow_bootstrap
      - mining
      - extra_index_enabled
      properties:
        bind_addr:
          type:
          - string
          - 'null'
          description: |-
            `[peers] bind_addr` — local TCP listen address. `None` =
            outbound-only.
        declared_addr:
          type:
          - string
          - 'null'
          description: |-
            `[peers] declared_addr` from the TOML config — what we advertise
            to peers in the handshake. `None` = anonymous, not gossipable.
        extra_index_enabled:
          type: boolean
        history_mode:
          $ref: '#/components/schemas/ApiHistoryMode'
          description: |-
            How the operator configured chain-history retention. Tagged
            union — clients switch on `kind`. See [`ApiHistoryMode`].
        mining:
          type: boolean
        mode:
          type: string
          description: |-
            Compact human-readable summary (e.g. "archive · utxo"). Derived
            from `state_type` + `history_mode` + `utxo_bootstrap` so the
            dashboard hero strip can render a single string.
        nipopow_bootstrap:
          type: boolean
        state_type:
          $ref: '#/components/schemas/ApiStateType'
          description: |-
            Wire byte = 0 / 1 in the `Mode` peer-feature; mirrored here as
            a typed enum so consumers don't have to guess the string set.
        utxo_bootstrap:
          type: boolean
        verify_transactions:
          type: boolean
    ApiInfo:
      type: object
      description: Static node identity. Cheap to compute; doesn't change after boot.
      required:
      - agent_name
      - node_name
      - network
      - version
      - started_at_unix_ms
      - uptime_seconds
      properties:
        agent_name:
          type: string
        network:
          type: string
        node_name:
          type: string
        started_at_unix_ms:
          type: integer
          format: int64
          minimum: 0
        target_block_interval_ms:
          type: integer
          format: int64
          description: |-
            Target block interval for this network, in milliseconds.
            Mainnet = 120_000 (2 min). Testnet = 45_000 (45 s). Read from
            the chain spec's `DifficultyParams::desired_interval_ms` at
            boot so the operator dashboard can label "avg block time"
            against the *actual* network's target instead of hardcoding
            the mainnet value (which was wrong on testnet).
          minimum: 0
        uptime_seconds:
          type: integer
          format: int64
          minimum: 0
        version:
          type: string
    ApiMinerStat:
      type: object
      description: One miner's aggregate over the `minerStats` window.
      required:
      - pk
      - count
      - last_height
      properties:
        address:
          type:
          - string
          - 'null'
          description: |-
            P2PK address derived from `pk` with this node's network prefix.
            Absent only when the stored pk bytes fail address encoding.
        count:
          type: integer
          format: int32
          description: Blocks this miner produced within the window.
          minimum: 0
        last_height:
          type: integer
          format: int32
          description: Height of this miner's most recent block in the window.
          minimum: 0
        pk:
          type: string
          description: |-
            Miner public key (33-byte compressed point, hex) from the folded
            headers' Autolykos solutions.
    ApiMinerStats:
      type: object
      description: |-
        Response of `GET /api/v1/mining/minerStats` — the network mining
        landscape over the last `window` headers of the canonical chain.
      required:
      - tip_height
      - window
      - blocks
      - miners
      properties:
        blocks:
          type: integer
          format: int32
          description: Headers actually scanned — shorter than `window` near genesis.
          minimum: 0
        miners:
          type: array
          items:
            $ref: '#/components/schemas/ApiMinerStat'
          description: |-
            Miners sorted by `count` descending, ties by `last_height`
            descending.
        tip_height:
          type: integer
          format: int32
          description: Best-header height at fold time (0 on an empty chain).
          minimum: 0
        window:
          type: integer
          format: int32
          description: Requested window after clamping to `[1, 16384]`.
          minimum: 0
    ApiPeer:
      type: object
      required:
      - addr
      - direction
      - state
      - score
      - sync_version
      - connected_seconds
      - last_seen_seconds
      properties:
        addr:
          type: string
        agent:
          type:
          - string
          - 'null'
        bytes_in:
          type:
          - integer
          - 'null'
          format: int64
          description: |-
            Cumulative post-handshake framed-message bytes received from this
            peer (per-frame header+checksum+payload), counted at the per-peer
            I/O task's transport boundary. Excludes the handshake exchange,
            which precedes that task. Read-only telemetry, never fed into peer
            scoring/throttle. `None` only on snapshots that predate the peer's
            connection.
          minimum: 0
        bytes_out:
          type:
          - integer
          - 'null'
          format: int64
          description: |-
            Cumulative post-handshake framed-message bytes sent to this peer.
            Same accounting as [`Self::bytes_in`].
          minimum: 0
        connected_seconds:
          type: integer
          format: int64
          minimum: 0
        declared_address:
          type:
          - string
          - 'null'
          description: |-
            Peer's declared public address (`ip:port`) from its `PeerSpec`,
            what it advertises as reachable. `None` when the peer declared no
            address (anonymous / not gossipable).
        direction:
          $ref: '#/components/schemas/ApiPeerDirection'
        last_seen_seconds:
          type: integer
          format: int64
          minimum: 0
        node_name:
          type:
          - string
          - 'null'
        peer_height:
          type:
          - integer
          - 'null'
          format: int32
          description: |-
            Peer's own best-block height as advertised in the most recent
            `SyncInfo` exchange. `None` until the sync layer plumbs it through.
          minimum: 0
        rest_api_url:
          type:
          - string
          - 'null'
          description: |-
            Peer's advertised REST API URL (the `RestApiUrl` handshake
            feature), verbatim as the peer sent it. `None` when the peer
            advertised none. Identity/observability only — not validated
            here beyond what the handshake parser already did.
        score:
          type: integer
          format: int32
        state:
          $ref: '#/components/schemas/ApiPeerState'
        sync_version:
          type: string
        version:
          type:
          - string
          - 'null'
    ApiPeerDirection:
      type: string

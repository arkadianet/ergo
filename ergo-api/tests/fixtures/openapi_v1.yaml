          - total_amount
          - scan_capped
          properties:
            gini:
              type: string
            holder_count:
              type: integer
              format: int64
              minimum: 0
            scan_capped:
              type: boolean
              description: |-
                Honest flag: the bounded O3 scan hit its cap, so the ranking/metrics are
                approximate (never silently partial).
            top10_share_pct:
              type: string
            total_amount:
              type: string
        page:
          $ref: '#/components/schemas/Page'
    CollectionMeta_V1TokenHolder_HoldersMeta:
      type: object
      description: |-
        A v1 collection carrying an extra `meta` object for whole-result scalars
        (coherence Part D): `{items, page, meta}`. Used by `tokens/{id}/holders`,
        whose `as_of_height` / `scanned_boxes` / `scan_capped` belong under `meta`,

openapi: 3.1.0
info:
  title: Ergo Rust Node — Native API
  description: 'Rust-native operator API for the Ergo node (`/api/v1/*`). This document describes the production-superset route set: the conditional routes (`/api/v1/mempool/submit`, `/api/v1/mempool/check`, `/api/v1/node/shutdown`, `/api/v1/difficulty/history`, `/api/v1/votes/history`) are mounted only when the node is wired with the matching submit / admin / chain-reader handles, so a given process may serve fewer routes than appear here. Query `GET /api/v1/health` to confirm a running node''s state.'
  license:
    name: MIT OR Apache-2.0
    identifier: MIT OR Apache-2.0
  version: 0.4.3
paths:
  /api/v1/blocks/recent:
    get:
      tags:
      - chain
      description: 'Most-recent full blocks for the dashboard, newest first. Reflects the *committed* full-block chain: it reads durably-stored section bytes, whereas `/api/v1/tip` reads the in-memory tip. During the async-persist window this list may therefore trail `/tip` by a block or two — it never advertises a block whose sections are not yet committed. Self-heals as the sections commit.'
      operationId: recent_blocks_handler
      parameters:
      - name: n
        in: query
        description: Number of most-recent full blocks, newest first. Defaults to 10. Out-of-range values are clamped to [1, 32] (the snapshot-precomputed tail), not rejected.
        required: false
        schema:
          type: integer
          format: int32
          maximum: 32
          minimum: 1
      responses:
        '200':
          description: Most-recent full blocks, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiRecentBlock'
  /api/v1/difficulty/history:
    get:
      tags:
      - chain
      operationId: difficulty_history_handler
      parameters:
      - name: blocks
        in: query
        description: Most-recent blocks to return, ascending by height. Defaults to 720 (~one day at 120s blocks); clamped to [2, 16384].
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      responses:
        '200':
          description: 'Per-block network difficulty across the recent chain, oldest first. Conditional: mounted only when the node is wired with a chain reader (the same handle the Scala-compat routes use).'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDifficultySeries'
  /api/v1/health:
    get:
      tags:
      - health
      operationId: health_handler
      responses:
        '200':
          description: Node is healthy (synced and connected)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiHealth'
        '503':
          description: Node is stalled, disconnected, or rejecting blocks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiHealth'
  /api/v1/host:
    get:
      tags:
      - node
      operationId: host_handler
      responses:
        '200':
          description: Host-process metrics (memory, disk, CPU, network)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiHost'
  /api/v1/identity:
    get:
      tags:
      - node
      operationId: identity_handler
      responses:
        '200':
          description: Node mode and protocol-visible flags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiIdentity'
  /api/v1/info:
    get:
      tags:
      - node
      operationId: info_handler
      responses:
        '200':
          description: Static node identity snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiInfo'
  /api/v1/mempool/check:
    post:
      tags:
      - mempool
      operationId: check_handler
      requestBody:
        description: Serialized transaction bytes — validated against the pool without admission
        content:
          application/octet-stream:
            schema:
              $ref: '#/components/schemas/RawTransactionBytes'
        required: true
      responses:
        '200':
          description: Transaction would be accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSubmitResponse'
        '400':
          description: Transaction rejected by validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiNativeSubmitError'
  /api/v1/mempool/submit:
    post:
      tags:
      - mempool
      operationId: submit_handler
      requestBody:
        description: Serialized transaction bytes — forwarded verbatim to the admission pipeline
        content:
          application/octet-stream:
            schema:
              $ref: '#/components/schemas/RawTransactionBytes'
        required: true
      responses:
        '200':
          description: Transaction accepted into the pool
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSubmitResponse'
        '400':
          description: Transaction rejected by admission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiNativeSubmitError'
  /api/v1/mempool/summary:
    get:
      tags:
      - mempool
      operationId: mempool_handler
      responses:
        '200':
          description: Mempool size and capacity counters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMempoolSummary'
  /api/v1/mempool/transactions:
    get:
      tags:
      - mempool
      operationId: mempool_transactions_handler
      responses:
        '200':
          description: Pooled transactions with priority weights
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMempoolTransactions'
  /api/v1/mempool/transactions/{tx_id}:
    get:
      tags:
      - mempool
      operationId: mempool_transaction_by_id_handler
      parameters:
      - name: tx_id
        in: path
        description: Hex-encoded transaction id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Pooled transaction detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMempoolTransaction'
        '404':
          description: No such transaction in the pool
  /api/v1/node/shutdown:
    post:
      tags:
      - admin
      summary: |-
        `POST /node/shutdown` (Scala-compat) and `POST /api/v1/node/shutdown`.
        Fires the action loop's shutdown signal and returns 202 immediately.
        The actual drain (UTXO commit, redb close) happens asynchronously in
        the action loop's existing shutdown path. Operators that need to
        confirm completion should poll `GET /api/v1/health` until the
        connection refuses.
      operationId: shutdown_handler
      responses:
        '202':
          description: Shutdown accepted; body is the literal text `shutdown_requested`. Drain proceeds asynchronously.
          content:
            text/plain:
              schema:
                type: string
        '403':
          description: Missing or invalid api_key (when API security is configured)
      security:
      - ApiKeyAuth: []
  /api/v1/peers:
    get:
      tags:
      - peers
      operationId: peers_handler
      responses:
        '200':
          description: Connected and known peer view
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiPeer'
  /api/v1/status:
    get:
      tags:
      - node
      operationId: status_handler
      responses:
        '200':
          description: Collapsed sync + tip + peer-count dashboard view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatus'
  /api/v1/sync:
    get:
      tags:
      - chain
      operationId: sync_handler
      responses:
        '200':
          description: Sync-pipeline state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSyncStatus'
  /api/v1/tip:
    get:
      tags:
      - chain
      operationId: tip_handler
      responses:
        '200':
          description: Best-header and best-full-block tip pointers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiTip'
  /api/v1/votes:
    get:
      tags:
      - node
      operationId: votes_handler
      responses:
        '200':
          description: Votable protocol parameters + bounds and the operator's configured votes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiVotes'
    post:
      tags:
      - admin
      operationId: set_votes_handler
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiSetVotesRequest'
        required: true
      responses:
        '204':
          description: Voting targets replaced
        '400':
          description: A target named a non-votable parameter, or fell outside the parameter's allowable [min, max] voting range
        '403':
          description: Missing or invalid api_key
        '409':
          description: Node is not mining
      security:
      - ApiKeyAuth: []
  /api/v1/votes/history:
    get:
      tags:
      - node
      operationId: votes_history_handler
      responses:
        '200':
          description: 'Protocol-parameter change timeline (epoch boundaries where a parameter changed, oldest first). Conditional: mounted only when the node is wired with a chain reader (the same handle the Scala-compat routes use).'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiVotesHistory'
  /api/v1/wallet/addresses:
    get:
      tags:
      - wallet
      summary: '`GET /api/v1/wallet/addresses` — paged tracked addresses + derivation metadata.'
      operationId: addresses
      parameters:
      - name: offset
        in: query
        description: Page offset (default 0)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: limit
        in: query
        description: Page size (default 50, cap 16384)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      responses:
        '200':
          description: Paged tracked addresses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressPage'
        '400':
          description: Bad page window
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
      security:
      - ApiKeyAuth: []
    post:
      tags:
      - wallet
      summary: |-
        `POST /api/v1/wallet/addresses` — derive a new key (next sequential, or at an
        explicit path) and register it as a tracked address. Needs unlock.
      operationId: derive_address
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeriveKeyRequest'
        required: true
      responses:
        '200':
          description: Derived address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DerivedAddress'
        '400':
          description: Malformed body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '409':
          description: Wallet locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
      security:
      - ApiKeyAuth: []
  /api/v1/wallet/balance:
    get:
      tags:
      - wallet
      summary: |-
        `GET /api/v1/wallet/balance` — the EIP-27-aware nanoErg breakdown
        (`confirmed`/`available`/`reserved`/`immature`), confirmed token balances,
        the re-emission reserve detail, and (only with `?includeUnconfirmed=true`)
        the labeled mempool delta. All amounts are decimal strings; the body is
        computed from one wallet read snapshot (`height` = its scan height).
      operationId: balance
      parameters:
      - name: includeUnconfirmed
        in: query
        description: Include the labeled single-hop mempool delta
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Wallet balance breakdown
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletBalanceDto'
        '400':
          description: Bad query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '403':
          description: Missing/invalid api key (route-layer gate)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '409':
          description: Wallet uninitialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
      security:
      - ApiKeyAuth: []
  /api/v1/wallet/boxes:
    get:
      tags:
      - wallet
      summary: '`GET /api/v1/wallet/boxes` — paged wallet boxes (newest creation first).'
      operationId: boxes
      parameters:
      - name: offset
        in: query
        description: Page offset (default 0)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: limit
        in: query
        description: Page size (default 50, cap 16384)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      responses:
        '200':
          description: Paged wallet boxes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoxPage'
        '400':
          description: Bad page window
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
      security:
      - ApiKeyAuth: []
  /api/v1/wallet/boxes/select:
    post:
      tags:
      - wallet
      summary: |-
        `POST /api/v1/wallet/boxes/select` — burn-aware box-selection dry-run. Returns
        the real selected inputs, computed change, and the exact EIP-27 re-emission
        burn. Requires an unlocked wallet (design §2).
      operationId: select_boxes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BoxSelectRequest'
        required: true
      responses:
        '200':
          description: Selection plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoxSelectResponse'
        '400':
          description: Malformed body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '403':
          description: Missing/invalid api key (route-layer gate)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '404':
          description: A requested box id is not a wallet box
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '409':
          description: Wallet locked/uninitialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '422':
          description: insufficient_funds / reemission_spend_not_allowed / change_address_untracked / unsupported_intent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
      security:
      - ApiKeyAuth: []
  /api/v1/wallet/boxes/{boxId}:
    get:
      tags:
      - wallet
      summary: '`GET /api/v1/wallet/boxes/{boxId}` — a single wallet box summary.'
      operationId: box_by_id
      parameters:
      - name: boxId
        in: path
        description: 32-byte box id (hex)
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Wallet box summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletBoxSummary'
        '400':
          description: Malformed box id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '404':
          description: Box not tracked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
      security:
      - ApiKeyAuth: []
  /api/v1/wallet/change-address:
    get:
      tags:
      - wallet
      summary: '`GET /api/v1/wallet/change-address` — current change address, or `null`.'
      operationId: change_address_get
      responses:
        '200':
          description: Change address (or null)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeAddressDto'
        '403':
          description: Missing/invalid api key (route-layer gate)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
      security:
      - ApiKeyAuth: []
    put:
      tags:
      - wallet
      summary: |-
        `PUT /api/v1/wallet/change-address` — set the change address. The address
        must be a tracked P2PK for this network (not unlock-gated).
      operationId: change_address_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetChangeAddressRequest'
        required: true
      responses:
        '200':
          description: Change address set
        '400':
          description: Malformed body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '422':
          description: Address is not a tracked P2PK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
      security:
      - ApiKeyAuth: []
  /api/v1/wallet/init:
    post:
      tags:
      - wallet
      summary: |-
        `POST /api/v1/wallet/init` — create a new encrypted wallet; returns the
        generated mnemonic ONCE (no-store).
      operationId: init
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitRequest'
        required: true
      responses:
        '200':
          description: Wallet created; mnemonic returned once
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitResponse'
        '400':
          description: Malformed body / invalid strength
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '409':
          description: Wallet already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
      security:
      - ApiKeyAuth: []
  /api/v1/wallet/lock:
    post:
      tags:
      - wallet
      summary: '`POST /api/v1/wallet/lock` — drop the in-memory master key (idempotent).'
      operationId: lock
      responses:
        '200':
          description: Locked
        '403':
          description: Missing/invalid api key (route-layer gate)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
      security:
      - ApiKeyAuth: []
  /api/v1/wallet/mnemonic/verify:
    post:
      tags:
      - wallet
      summary: |-
        `POST /api/v1/wallet/mnemonic/verify` — compare a candidate mnemonic against
        the persisted seed. `matched=false` is a factual answer, not an error.
      operationId: mnemonic_verify
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MnemonicVerifyRequest'
        required: true
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MnemonicVerifyResult'
        '400':
          description: Malformed body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '409':
          description: Wallet uninitialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
      security:
      - ApiKeyAuth: []
  /api/v1/wallet/rescan:
    post:
      tags:
      - wallet
      summary: |-
        `POST /api/v1/wallet/rescan` — trigger a wallet rescan (full rebuild when
        `fromHeight` is 0). `rescan_unavailable(409)` on a backend that cannot replay.
      operationId: rescan
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: 'null'
              - $ref: '#/components/schemas/RescanRequest'
      responses:
        '200':
          description: Rescan started
        '400':
          description: Malformed body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '409':
          description: Rescan unavailable / already in progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
      security:
      - ApiKeyAuth: []
  /api/v1/wallet/restore:
    post:
      tags:
      - wallet
      summary: |-
        `POST /api/v1/wallet/restore` — restore from a recovery phrase with an
        explicit derivation mode.
      operationId: restore
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestoreRequest'
        required: true
      responses:
        '200':
          description: Wallet restored
        '400':
          description: Malformed body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '409':
          description: Wallet exists / restore unsupported on a pruned node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
      security:
      - ApiKeyAuth: []
  /api/v1/wallet/rewards/retrieve:
    post:
      tags:
      - wallet
      summary: |-
        `POST /api/v1/wallet/rewards/retrieve` — sweep all matured miner-reward boxes
        into one P2PK output (the wallet change address, or `destination`), in one
        EIP-27-correct tx: the re-emission token is burned and its ERG routed to
        pay-to-reemission, other tokens are carried through. `dryRun` returns the
        breakdown without signing/submitting. `Cache-Control: no-store`.
      operationId: retrieve_rewards
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetrieveRewardsRequest'
        required: true
      responses:
        '200':
          description: Preview (dryRun) or submitted sweep
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrieveRewardsResultDto'
        '400':
          description: Malformed body / no matured rewards / too many token types
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '403':
          description: Missing/invalid api key (route-layer gate)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '409':
          description: Wallet locked (execute) / wallet uninitialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '422':
          description: insufficient_funds / change_address_untracked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
      security:
      - ApiKeyAuth: []
  /api/v1/wallet/status:
    get:
      tags:
      - wallet
      summary: '`GET /api/v1/wallet/status` — wallet state snapshot.'
      operationId: status
      responses:
        '200':
          description: Wallet status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletStatusDto'
        '403':
          description: Missing/invalid api key (route-layer gate)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
      security:
      - ApiKeyAuth: []
  /api/v1/wallet/transactions:
    get:
      tags:
      - wallet
      summary: '`GET /api/v1/wallet/transactions` — paged wallet transactions (newest first).'
      operationId: transactions
      parameters:
      - name: offset
        in: query
        description: Page offset (default 0)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      - name: limit
        in: query
        description: Page size (default 50, cap 16384)
        required: false
        schema:
          type: integer
          format: int32
          minimum: 0
      responses:
        '200':
          description: Paged wallet transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TxPage'
        '400':
          description: Bad page window
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
      security:
      - ApiKeyAuth: []
  /api/v1/wallet/transactions/build:
    post:
      tags:
      - wallet
      summary: |-
        `POST /api/v1/wallet/transactions/build` — build a burn-aware unsigned tx from
        an intent. Returns the unsigned tx plus the selected inputs, change outputs,
        fee, and re-emission burn. Requires an unlocked wallet (design §2).
      operationId: build_transaction
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TxIntent'
        required: true
      responses:
        '200':
          description: Built unsigned transaction + plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildTxResponse'
        '400':
          description: Malformed body / no outputs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '403':
          description: Missing/invalid api key (route-layer gate)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '409':
          description: Wallet locked/uninitialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '422':
          description: insufficient_funds / reemission_spend_not_allowed / change_address_untracked / unsupported_intent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
      security:
      - ApiKeyAuth: []
  /api/v1/wallet/transactions/send:
    post:
      tags:
      - wallet
      summary: |-
        `POST /api/v1/wallet/transactions/send` — build+sign+submit an intent (needs
        unlock) or submit a caller-supplied signed tx (no unlock). txId-first
        idempotency: an already-known tx returns `accepted:true` without re-submitting,
        and a duplicate submit is an idempotent accept. `Cache-Control: no-store`.
      operationId: send_transaction
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendTxRequest'
        required: true
      responses:
        '200':
          description: Accepted (fresh or idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendTxResponse'
        '400':
          description: Malformed body / submit rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '403':
          description: Missing/invalid api key (route-layer gate)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '409':
          description: Wallet locked (intent send)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '422':
          description: insufficient_funds / reemission_* / missing_secret / unsupported_intent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
      security:
      - ApiKeyAuth: []
  /api/v1/wallet/transactions/sign:
    post:
      tags:
      - wallet
      summary: |-
        `POST /api/v1/wallet/transactions/sign` — sign a caller-supplied unsigned tx.
        Conditional unlock: succeeds while locked when `externalSecrets` cover all
        inputs, else `missing_secret(422)` (never `wallet_locked`). Response is
        `Cache-Control: no-store` (it carries signed material).
      operationId: sign_transaction
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignTxRequest'
        required: true
      responses:
        '200':
          description: Signed transaction + txId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignTxResponse'
        '400':
          description: Malformed body / tx bytes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '403':
          description: Missing/invalid api key (route-layer gate)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '422':
          description: missing_secret / reemission_obligation_unmet / unsupported_script
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
      security:
      - ApiKeyAuth: []
  /api/v1/wallet/transactions/{txId}:
    get:
      tags:
      - wallet
      summary: '`GET /api/v1/wallet/transactions/{txId}` — a single wallet transaction summary.'
      operationId: transaction_by_id
      parameters:
      - name: txId
        in: path
        description: 32-byte transaction id (hex)
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Wallet transaction summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletTransactionSummary'
        '400':
          description: Malformed transaction id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '404':
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
      security:
      - ApiKeyAuth: []
  /api/v1/wallet/unlock:
    post:
      tags:
      - wallet
      summary: '`POST /api/v1/wallet/unlock` — load the in-memory master key.'
      operationId: unlock
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnlockRequest'
        required: true
      responses:
        '200':
          description: Unlocked
        '400':
          description: Malformed body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '401':
          description: Wrong password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
        '409':
          description: Wallet uninitialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NativeWalletError'
      security:
      - ApiKeyAuth: []
components:
  schemas:
    AddressPage:
      type: object
      description: |-
        Paged tracked-address list. `total` = full count, `asOf` = scan height, both
        from the same read snapshot.
      required:
      - items
      - total
      - asOf
      properties:
        asOf:
          type: integer
          format: int32
          minimum: 0
        items:
          type: array
          items:
            $ref: '#/components/schemas/WalletAddressDto'
        total:
          type: integer
          format: int32
          minimum: 0
    ApiBlockApplyError:
      type: object
      description: |-
        A block this node rejected during apply, surfaced to operators. Distinct
        from a benign data-wait (section not yet downloaded) or reorg — this is a
        block the node refused on validation while its peers may have accepted it.
      required:
      - block_id
      - height
      - reason
      - age_ms
      properties:
        age_ms:
          type: integer
          format: int64
          description: Milliseconds since the rejection was recorded (computed at read time).
          minimum: 0
        block_id:
          type: string
          description: Hex-encoded rejected header id.
        height:
          type: integer
          format: int32
          description: Height the rejected block claimed.
          minimum: 0
        reason:
          type: string
          description: Operator-facing rejection reason (the `BlockProcessError` Display).
    ApiBootstrapPhase:
      type: string
      description: |-
        UTXO snapshot bootstrap reducer phase, as surfaced on
        [`ApiBootstrapStatus`]. UI maps each variant to a human label and
        phase indicator.
      enum:
      - discovery
      - manifest_requested
      - manifest_verified
      - downloading_chunks
      - reconstructing
      - installing
      - post_install_catchup
    ApiBootstrapStatus:
      type: object
      description: |-
        Bootstrap progress for the Mode 2 (UTXO snapshot) consume side.
        Surfaced to operators so the ~30–60 minute boot window doesn't
        look like a stuck node (fullHeight=0, indexer=0%, etc.). Each
        field maps directly to a dashboard cell or progress bar.
      required:
      - phase
      - snapshot_height
      - voters
      - chunks_received
      - chunks_total
      - trust_check_passed
      - started_unix_ms
      properties:
        chunks_received:
          type: integer
          format: int32
          description: |-
            Chunks received and committed to assembly. `0` until the
            `downloading_chunks` phase starts.
          minimum: 0
        chunks_total:
          type: integer
          format: int32
          description: |-
            Total chunks expected per the verified manifest. `0` before
            `manifest_verified`.
          minimum: 0
        header_availability:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ApiHeaderAvailability'
            description: |-
              Header-chain availability mode as reported by the store —
              `dense` for a full-node-sync history, `sparse` for a NiPoPoW-
              bootstrapped history. Absent when the store reports the
              default (Dense) and no NiPoPoW bootstrap is in progress.

              Distinct from [`ApiIdentity::history_mode`] — that field is the
              operator-configured chain-retention policy (archive / pruned /
              utxo-bootstrapped / headers-only), this field is the on-disk
              header-section shape (dense from genesis vs sparse with a
              NiPoPoW dense-suffix anchor).
        manifest_id:
          type:
          - string
          - 'null'
          description: |-
            Hex-encoded manifest_id when known (post-discovery), else `None`.
            32 bytes / 64 hex chars.
        phase:
          $ref: '#/components/schemas/ApiBootstrapPhase'
          description: |-
            Current bootstrap phase. UI maps each variant to its human
            label and phase indicator.
        popow_dense_from_height:
          type:
          - integer
          - 'null'
          format: int32
          description: |-
            In `HeaderAvailability::PoPowSparse` mode, the lowest height
            for which a `HEADER_CHAIN_INDEX` row exists locally. Heights
            below this are sparse-prefix witnesses (not chain-indexed).
            `None` when mode is Dense.
          minimum: 0
        popow_phase:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ApiPopowPhase'
            description: |-
              NiPoPoW bootstrap phase, when enabled. Absent when NiPoPoW
              bootstrap is disabled (legacy Mode 2-only flow) or hasn't
              started.
        popow_providers:
          type:
          - integer
          - 'null'
          format: int32
          description: |-
            Number of distinct peers that have responded with a NiPoPoW
            proof so far. `0` when popow_phase is absent or before any
            inbound proof.
          minimum: 0
        snapshot_height:
          type: integer
          format: int32
          description: |-
            Snapshot height as selected by the discovery quorum.
            `0` when still in `discovery` and no manifest has been picked.
          minimum: 0
        started_unix_ms:
          type: integer
          format: int64
          description: |-
            Unix-ms timestamp when the bootstrap reducer first transitioned
            out of `Idle`. Lets the UI compute an "elapsed" clock without
            holding state of its own.
          minimum: 0
        trust_check_passed:
          type: boolean
          description: |-
            `true` once the manifest's root label has been compared
            against the canonical header.state_root at `snapshot_height`
            and matched. False until the trust check fires.
        voters:
          type: integer
          format: int32
          description: |-
            Number of peers in the quorum that voted for the selected
            manifest. `0` during the `discovery` phase before quorum.
          minimum: 0
    ApiConfiguredVote:
      type: object
      description: An operator's configured vote target for one parameter.
      required:
      - parameterId
      - name
      - target
      properties:
        name:
          type: string
        parameterId:
          type: integer
          format: int32
          minimum: 0
        target:
          type: integer
          format: int64
          description: Desired target value; the node votes up/down toward it.
    ApiDifficultyPoint:
      type: object
      description: |-
        One sample in the difficulty time series returned by
        `GET /api/v1/difficulty/history`: the network difficulty observed at a
        block height, alongside that block's timestamp.

        `difficulty` is the decoded decimal value as a string — at mainnet
        scale it exceeds `u64`, so a JSON number would silently lose precision
        in javascript consumers. `n_bits` is deliberately omitted: it is the
        compact encoding of this same value, so it would be a lossy duplicate.
        Consumers read `difficulty` directly.
      required:
      - height
      - timestamp_unix_ms
      - difficulty
      properties:
        difficulty:
          type: string
        height:
          type: integer
          format: int32
          minimum: 0
        timestamp_unix_ms:
          type: integer
          format: int64
          minimum: 0
    ApiDifficultySeries:
      type: object
      description: |-
        Ascending-by-height difficulty series for `GET
        /api/v1/difficulty/history`. Oldest point first so a consumer can plot
        it left-to-right without re-sorting.
      required:
      - points
      properties:
        points:
          type: array
          items:
            $ref: '#/components/schemas/ApiDifficultyPoint'
    ApiFullBlockRef:
      type: object
      required:
      - height
      - header_id
      - parent_id
      - timestamp_unix_ms
      - state_root_avl
      - n_bits
      - difficulty
      properties:
        difficulty:
          type: string
          description: Network difficulty decoded from `n_bits`, as a decimal string.
        header_id:
          type: string
        height:
          type: integer
          format: int32
          minimum: 0
        n_bits:
          type: integer
          format: int32
          description: Compact difficulty target (`nBits`) committed in this header.
          minimum: 0
        parent_id:
          type: string
        state_root_avl:
          type: string
          description: |-
            AVL+ authenticated UTXO-tree root digest committed in this full
            block's header — 33 bytes (`Digest32 || balance-byte`), hex-encoded
            (66 chars). Mirrors the on-chain `Header.stateRoot` field;
            distinct from the chain's cumulative-PoW score or any header hash.
        timestamp_unix_ms:
          type: integer
          format: int64
          minimum: 0
    ApiHeaderAvailability:
      type: string
      description: Header-chain density reported by the chain store.
      enum:
      - dense
      - sparse
    ApiHeaderRef:
      type: object
      required:
      - height
      - header_id
      - parent_id
      - timestamp_unix_ms
      - n_bits
      - difficulty
      properties:
        difficulty:
          type: string
          description: |-
            Network difficulty decoded from `n_bits`, as a decimal string —
            full precision, since difficulty exceeds `u64` at high mainnet
            difficulty. Hashrate is a client derivation (`difficulty /
            target_block_interval`), not a field here.
        header_id:
          type: string
        height:
          type: integer
          format: int32
          minimum: 0
        n_bits:
          type: integer
          format: int32
          description: Compact difficulty target (`nBits`) committed in this header.
          minimum: 0
        parent_id:
          type: string
        timestamp_unix_ms:
          type: integer
          format: int64
          minimum: 0
    ApiHealth:
      type: object
      required:
      - status
      - behind
      - last_progress_age_ms
      - peer_count
      properties:
        behind:
          type: integer
          format: int32
          minimum: 0
        last_progress_age_ms:
          type: integer
          format: int64
          minimum: 0
        peer_count:
          type: integer
          format: int32
          minimum: 0
        status:
          $ref: '#/components/schemas/HealthStatus'
    ApiHistoryMode:
      oneOf:
      - type: object
        description: |-
          `blocks_to_keep = -1` and `utxo_bootstrap = false` and not the
          canonical Mode 6 combo. Full archive — the most common live
          runtime mode and the `Default` variant.
        required:
        - kind
        properties:
          kind:
            type: string
            enum:
            - archive
      - type: object
        description: |-
          `utxo_bootstrap = true`. Operator opted into the Mode 2 UTXO
          snapshot bootstrap path. The `kind` wires regardless of whether
          the snapshot has been applied — observe `fullHeight > 0` on
          `/info` or `/api/v1/tip` for that.
        required:
        - kind
        properties:
          kind:
            type: string
            enum:
            - utxo_bootstrapped
      - type: object
        description: |-
          Canonical Mode 6 combo: `state_type = Digest`,
          `verify_transactions = false`, `blocks_to_keep = 0`. Boots
          successfully via the `is_canonical_mode_6` short-circuit in
          `validate_runtime_mode_support`.
        required:
        - kind
        properties:
          kind:
            type: string
            enum:
            - headers_only
      - type: object
        description: |-
          `blocks_to_keep = N` for `N >= 1`. Forward-compat with the
          Mode 3 eviction roadmap; currently rejected by the runtime
          gate.
        required:
        - suffix_len
        - kind
        properties:
          kind:
            type: string
            enum:
            - pruned
          suffix_len:
            type: integer
            format: int32
            minimum: 0
      description: |-
        Chain-history retention policy as configured at boot. Tagged
        union; clients switch on `kind`.
    ApiHost:
      type: object
      description: |-
        Host-process metrics: memory, on-disk databases, free space on the
        data-directory volume. `None` on any field means "could not
        determine" — sysinfo refresh failure, permissions, missing file,
        or platform gap. `Some(0)` means a legitimately zero measurement.
      properties:
        cpu_pct:
          type:
          - number
          - 'null'
          format: float
          description: CPU usage of the node process as a percent of one core.
        disk_free_bytes:
          type:
          - integer
          - 'null'
          format: int64
          description: Free bytes on the volume containing the data directory.
          minimum: 0
        disk_total_bytes:
          type:
          - integer
          - 'null'
          format: int64
          description: Total bytes on that volume.
          minimum: 0
        index_db_bytes:
          type:
          - integer
          - 'null'
          format: int64
          description: |-
            Size of `indexer.redb`. `None` when the indexer is disabled or
            the file is missing.
          minimum: 0
        load_1m:
          type:
          - number
          - 'null'
          format: float
          description: 1-minute load average.
        net_in_bps:
          type:
          - integer
          - 'null'
          format: int64
          description: Receive bytes-per-second across all interfaces.
          minimum: 0
        net_out_bps:
          type:
          - integer
          - 'null'
          format: int64
          description: Transmit bps.
          minimum: 0
        rss_bytes:
          type:
          - integer
          - 'null'
          format: int64
          description: Resident set size of the node process.
          minimum: 0
        state_db_bytes:
          type:
          - integer
          - 'null'
          format: int64
          description: Size of `state.redb` on disk.
          minimum: 0
    ApiIdentity:
      type: object
      description: |-
        What kind of node this is, beyond the boot-time `ApiInfo` shape.

        Captures the protocol-visible mode flags advertised on the P2P
        handshake plus operator-config toggles (extra-index, API submission,
        declared / bind addr). Set at boot from `NodeConfig` + the hardcoded
        `Mode` peer-feature; doesn't change at runtime today.

        `mining` is reserved for the future mining crate — always `false`
        until candidate generation lands.

        Backs `GET /api/v1/identity`; consumed by the operator dashboard's
        identity strip. Rust-native — Scala's `/info` has no equivalent.

        Field contract:
        - `state_type`, `verify_transactions`, `history_mode`, `mining`,
          `extra_index_enabled`, `declared_addr`, `bind_addr` are
          config-intent: what `NodeConfig` asked for at boot. Scala parity
          for the wire-visible fields lives here.
        - `utxo_bootstrap` and `nipopow_bootstrap` are effective-state:
          true when either the operator's config flag is set OR a
          matching provenance marker on disk confirms the bootstrap
          actually ran. An operator who cleared the bootstrap flag in
          config after a successful install therefore still sees `true`
          on the surface that survived the install. Refreshed by the
          action loop on bootstrap transitions; live for the process
          lifetime via `Arc<ArcSwap<ApiIdentity>>` in `api_bridge.rs`.
        - `mode` is a compact human-readable label composed from both
          classes, including the Mode 4 `"mode-4 · …"` variants.

        To observe actual runtime progress (e.g. current chain height,
        peer count), read `fullHeight` / `bestFullHeaderId` on adjacent
        endpoints.
      required:
      - mode
      - state_type
      - verify_transactions
      - history_mode
      - utxo_bootstrap
      - nipopow_bootstrap
      - mining
      - extra_index_enabled
      properties:
        bind_addr:
          type:
          - string
          - 'null'
          description: |-
            `[peers] bind_addr` — local TCP listen address. `None` =
            outbound-only.
        declared_addr:
          type:
          - string
          - 'null'
          description: |-
            `[peers] declared_addr` from the TOML config — what we advertise
            to peers in the handshake. `None` = anonymous, not gossipable.
        extra_index_enabled:
          type: boolean
        history_mode:
          $ref: '#/components/schemas/ApiHistoryMode'
          description: |-
            How the operator configured chain-history retention. Tagged
            union — clients switch on `kind`. See [`ApiHistoryMode`].
        mining:
          type: boolean
        mode:
          type: string
          description: |-
            Compact human-readable summary (e.g. "archive · utxo"). Derived
            from `state_type` + `history_mode` + `utxo_bootstrap` so the
            dashboard hero strip can render a single string.
        nipopow_bootstrap:
          type: boolean
        state_type:
          $ref: '#/components/schemas/ApiStateType'
          description: |-
            Wire byte = 0 / 1 in the `Mode` peer-feature; mirrored here as
            a typed enum so consumers don't have to guess the string set.
        utxo_bootstrap:
          type: boolean
        verify_transactions:
          type: boolean
    ApiInfo:
      type: object
      description: Static node identity. Cheap to compute; doesn't change after boot.
      required:
      - agent_name
      - node_name
      - network
      - version
      - started_at_unix_ms
      - uptime_seconds
      properties:
        agent_name:
          type: string
        network:
          type: string
        node_name:
          type: string
        started_at_unix_ms:
          type: integer
          format: int64
          minimum: 0
        target_block_interval_ms:
          type: integer
          format: int64
          description: |-
            Target block interval for this network, in milliseconds.
            Mainnet = 120_000 (2 min). Testnet = 45_000 (45 s). Read from
            the chain spec's `DifficultyParams::desired_interval_ms` at
            boot so the operator dashboard can label "avg block time"
            against the *actual* network's target instead of hardcoding
            the mainnet value (which was wrong on testnet).
          minimum: 0
        uptime_seconds:
          type: integer
          format: int64
          minimum: 0
        version:
          type: string
    ApiMempoolSummary:
      type: object
      required:
      - size
      - total_bytes
      - capacity_count
      - capacity_bytes
      - revalidation_pending
      properties:
        capacity_bytes:
          type: integer
          format: int64
          minimum: 0
        capacity_count:
          type: integer
          format: int32
          minimum: 0
        revalidation_pending:
          type: integer
          format: int32
          minimum: 0
        size:
          type: integer
          format: int32
          minimum: 0
        total_bytes:
          type: integer
          format: int64
          minimum: 0
    ApiMempoolTransaction:
      type: object
      required:
      - tx_id
      - fee_nano_erg
      - fee_per_byte_nano_erg
      - size_bytes
      - validation_cost_units
      - priority_weight
      - source
      - input_count
      - output_count
      - parents_in_pool
      - first_seen_unix_ms
      - first_seen_age_ms
      - last_checked_age_ms
      properties:
        fee_nano_erg:
          type: integer
          format: int64
          minimum: 0
        fee_per_byte_nano_erg:
          type: integer
          format: int64
          minimum: 0
        first_seen_age_ms:
          type: integer
          format: int64
          minimum: 0
        first_seen_unix_ms:
          type: integer
          format: int64
          minimum: 0
        input_count:
          type: integer
          format: int32
          minimum: 0
        last_checked_age_ms:
          type: integer
          format: int64
          minimum: 0
        output_count:
          type: integer
          format: int32
          minimum: 0
        parents_in_pool:
          type: integer
          format: int32
          minimum: 0
        priority_weight:
          type: integer
          format: int64
          description: |-
            Mempool priority weight = `(fee × 1024) / denom`, where `denom`
            is set by `weight_function` on the envelope.
          minimum: 0
        size_bytes:
          type: integer
          format: int32
          minimum: 0
        source:
          $ref: '#/components/schemas/ApiTxSource'
        tx_id:
          type: string
        validation_cost_units:
          type: integer
          format: int64
          description: |-
            Sigma-interpreter execution cost in block-budget units. Compare
            against the active epoch's `maxBlockCost`.
          minimum: 0
    ApiMempoolTransactions:
      type: object
      required:
      - transactions
      - weight_function
      properties:
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/ApiMempoolTransaction'
        weight_function:
          $ref: '#/components/schemas/ApiWeightFunction'
          description: |-
            Active priority-weight function for the running node — one of
            `"cost"`, `"size"`, `"min"`. Clients dividing `priority_weight`
            by 1024 and the matching denominator recover raw fee-per-resource.
    ApiNativeSubmitError:
      type: object
      description: |-
        4xx/5xx body for `POST /api/v1/mempool/{submit,check}`. Identical to
        [`ApiSubmitError`] minus the `error` field — Rust-native clients have
        the HTTP status from the response line, so duplicating it in the body
        is just bytes on the wire.
      required:
      - reason
      properties:
        detail:
          type:
          - string
          - 'null'
        reason:
          type: string
    ApiParamChange:
      type: object
      description: A single parameter's change across one epoch boundary.
      required:
      - id
      - name
      - description
      - to
      properties:
        description:
          type: string
          description: One-line operator-facing explanation of the parameter.
        from:
          type:
          - integer
          - 'null'
          format: int64
          description: |-
            Value before this boundary. `null` when the parameter first became
            active here (e.g. `subblocksPerBlock` at its activation fork).
        id:
          type: integer
          format: int32
          description: Parameter id (1..=8, 9 = subblocksPerBlock, or 123 = blockVersion).
          minimum: 0
        name:
          type: string
          description: Stable camelCase parameter name.
        to:
          type: integer
          format: int64
          description: Value from this boundary onward.
    ApiPeer:
      type: object
      required:
      - addr
      - direction
      - state
      - score
      - sync_version
      - connected_seconds
      - last_seen_seconds
      properties:
        addr:
          type: string
        agent:
          type:
          - string
          - 'null'
        bytes_in:
          type:
          - integer
          - 'null'
          format: int64
          description: |-
            Cumulative post-handshake framed-message bytes received from this
            peer (per-frame header+checksum+payload), counted at the per-peer
            I/O task's transport boundary. Excludes the handshake exchange,
            which precedes that task. Read-only telemetry, never fed into peer
            scoring/throttle. `None` only on snapshots that predate the peer's
            connection.
          minimum: 0
        bytes_out:
          type:
          - integer
          - 'null'
          format: int64
          description: |-
            Cumulative post-handshake framed-message bytes sent to this peer.
            Same accounting as [`Self::bytes_in`].
          minimum: 0
        connected_seconds:
          type: integer
          format: int64
          minimum: 0
        declared_address:
          type:
          - string
          - 'null'
          description: |-
            Peer's declared public address (`ip:port`) from its `PeerSpec`,
            what it advertises as reachable. `None` when the peer declared no
            address (anonymous / not gossipable).
        direction:
          $ref: '#/components/schemas/ApiPeerDirection'
        last_seen_seconds:
          type: integer
          format: int64
          minimum: 0
        node_name:
          type:
          - string
          - 'null'
        peer_height:
          type:
          - integer
          - 'null'
          format: int32
          description: |-
            Peer's own best-block height as advertised in the most recent
            `SyncInfo` exchange. `None` until the sync layer plumbs it through.
          minimum: 0
        rest_api_url:
          type:
          - string
          - 'null'
          description: |-
            Peer's advertised REST API URL (the `RestApiUrl` handshake
            feature), verbatim as the peer sent it. `None` when the peer
            advertised none. Identity/observability only — not validated
            here beyond what the handshake parser already did.
        score:
          type: integer
          format: int32
        state:
          $ref: '#/components/schemas/ApiPeerState'
        sync_version:
          type: string
        version:
          type:
          - string
          - 'null'
    ApiPeerDirection:
      type: string
      description: Which side initiated the peer connection.
      enum:
      - inbound
      - outbound
    ApiPeerState:
      type: string
      description: Connection lifecycle state observed by the peer manager.
      enum:
      - connecting
      - handshaking
      - active
      - degraded
      - disconnected
    ApiPopowPhase:
      type: string
      description: |-
        NiPoPoW bootstrap reducer phase, as surfaced on
        [`ApiBootstrapStatus::popow_phase`]. UI mirrors the UTXO bootstrap
        progression but for the NiPoPoW chain-prefix path.
      enum:
      - requesting
      - quorum_met
      - applied
      - catchup
    ApiRecentBlock:
      type: object
      description: |-
        One recent full block for the dashboard cockpit's "recent blocks" list,
        backing `GET /api/v1/blocks/recent` (newest-first). The list reflects the
        committed full-block chain and may briefly trail `/api/v1/tip` during the
        async-persist window (see the endpoint description). `size_bytes` sums the
        on-disk section byte lengths — header + blockTransactions + extension,
        plus adProofs when the node retains it (adProofs is optional in UTXO
        mode). A block whose required sections are missing, or whose any section
        read errors, is omitted from the list rather than reported with a
        silently undercounted size.
      required:
      - height
      - header_id
      - ts_unix_ms
      - txs
      - size_bytes
      properties:
        delivered_by:
          type:
          - string
          - 'null'
          description: |-
            Socket address (`ip:port`) of the FIRST peer that delivered this
            block's header to us — the peer whose `Modifier` carried the
            header bytes we accepted. A freshly-mined block is typically
            announced first by the miner/pool's node, so this attributes a
            block → peer (→ pool, with out-of-band peer↔pool knowledge).
            `None` when the deliverer is unknown: the block was synced before
            the bounded first-deliverer ring captured it, the entry has since
            been FIFO-evicted, or the block was applied locally (self-mined).
            Pure observability — never affects validation.
        header_id:
          type: string
        height:
          type: integer
          format: int32
          minimum: 0
        size_bytes:
          type: integer
          format: int64
          minimum: 0
        ts_unix_ms:
          type: integer
          format: int64
          minimum: 0
        txs:
          type: integer
          format: int32
          minimum: 0
    ApiSetVotesRequest:
      type: object
      description: |-
        Request body for `POST /api/v1/votes` (auth-gated operator write). The
        `votes` list is the FULL desired set and REPLACES the node's current voting
        targets — an empty list clears all votes.
      required:
      - votes
      properties:
        votes:
          type: array
          items:
            $ref: '#/components/schemas/ApiVoteTarget'
          description: The operator's desired votes, one entry per parameter to target.
    ApiStateType:
      type: string
      description: |-
        State-store backend kind, mirroring the protocol-visible `Mode`
        peer-feature byte (`utxo` = 0, `digest` = 1).
      enum:
      - utxo
      - digest
    ApiStatus:
      type: object
      description: |-
        Single-call dashboard view: collapses sync + tip + peer count.
        Polled at 1 Hz by the UI header strip.
      required:
      - sync_state
      - peer_count
      - best_header_height
      - best_full_block_height
      - headers_ahead_of_full_blocks
      - mempool_size
      - snapshot_age_ms
      properties:
        best_full_block_height:
          type: integer
          format: int32
          minimum: 0
        best_header_height:
          type: integer
          format: int32
          minimum: 0
        block_apply_errors_total:
          type: integer
          format: int64
          description: |-
            Monotonic count of block-apply rejections since node start (the
            `ergo_node_block_apply_errors_total` Prometheus counter source).
            Session-scoped — resets on restart, which `rate()` handles.
          minimum: 0
        bootstrap:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ApiBootstrapStatus'
            description: |-
              Mode 2 bootstrap progress. Populated while a UTXO snapshot
              bootstrap is in flight — i.e. operator config has
              `utxo_bootstrap = true` AND `best_full_block_height == 0`.
              Cleared (`None`) once the snapshot installs and the node
              transitions to normal block sync. Operators rendering the
              dashboard panel should treat `Some(_)` as "show the
              bootstrap card, hide the normal block-sync pipeline row".
        headers_ahead_of_full_blocks:
          type: integer
          format: int32
          minimum: 0
        last_block_apply_error:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ApiBlockApplyError'
            description: |-
              The most recent block this node REJECTED during apply — a consensus
              fork-from-network signal (the node refused a block its peers may have
              accepted). `None` when no rejection has occurred this session. A
              persistent `Some(_)` is an operator page.
        mempool_peer_tx_admitted_total:
          type: integer
          format: int64
          description: |-
            Monotonic count of peer-sourced (`TxSource::Peer`) transactions
            ADMITTED to the mempool (the
            `ergo_node_mempool_peer_tx_admitted_total` Prometheus counter
            source). API/Wallet-sourced admissions are excluded. Session-scoped
            — resets on restart, which `rate()` handles.
          minimum: 0
        mempool_peer_tx_rejected_total:
          type: integer
          format: int64
          description: |-
            Monotonic count of peer-sourced (`TxSource::Peer`) transactions
            REJECTED by admission (the
            `ergo_node_mempool_peer_tx_rejected_total` Prometheus counter
            source). API/Wallet-sourced rejections are excluded. Session-scoped
            — resets on restart, which `rate()` handles.
          minimum: 0
        mempool_size:
          type: integer
          format: int32
          minimum: 0
        mempool_tx_requested_total:
          type: integer
          format: int64
          description: |-
            Monotonic count of unconfirmed-tx ids this node REQUESTED from peers
            in response to a tx-typed `Inv` (the
            `ergo_node_mempool_tx_requested_total` Prometheus counter source).
            Counts ids passed to the coordinator's `request_transactions`, i.e.
            the `unknown` (not-already-pooled / not-invalidated) advertised set.
            Session-scoped — resets on restart, which `rate()` handles.
          minimum: 0
        peer_count:
          type: integer
          format: int32
          minimum: 0
        snapshot_age_ms:
          type: integer
          format: int64
          minimum: 0
        sync_state:
          $ref: '#/components/schemas/SyncStateLabel'
    ApiSubmitError:
      type: object
      description: |-
        4xx/5xx body for the Scala-compat submit endpoints
        (`POST /transactions`, `/transactions/bytes`, `/transactions/checkBytes`).
        Shape matches Scala's `ApiError` (`{error, reason, detail}`) where
        `error` is the HTTP status code repeated as an integer for
        Scala-client parity. Kept on the compat surface only.
      required:
      - error
      - reason
      properties:
        detail:
          type:
          - string
          - 'null'
        error:
          type: integer
          format: int32
          minimum: 0
        reason:
          type: string
    ApiSubmitResponse:
      type: object
      description: 200 body for `POST /api/v1/mempool/{submit,check}`.
      required:
      - tx_id
      properties:
        tx_id:
          type: string
    ApiSyncStatus:
      type: object
      description: Sync pipeline state.
      required:
      - headers_chain_synced
      - best_header_height
      - best_full_block_height
      - gap
      - download_window
      - pending_blocks
      - recovery_done
      properties:
        best_full_block_height:
          type: integer
          format: int32
          minimum: 0
        best_header_height:
          type: integer
          format: int32
          minimum: 0
        download_window:
          type: integer
          format: int32
          minimum: 0
        gap:
          type: integer
          format: int32
          minimum: 0
        headers_chain_synced:
          type: boolean
        pending_blocks:
          type: integer
          format: int32
          minimum: 0
        recovery_done:
          type: boolean
    ApiTip:
      type: object
      description: |-
        Tip pointers. During IBD `best_header` and `best_full_block` can
        diverge by tens of thousands of blocks — they are reported separately
        and the gap is precomputed for clients.
      required:
      - best_header
      - best_full_block
      - headers_ahead_of_full_blocks
      properties:
        best_full_block:
          $ref: '#/components/schemas/ApiFullBlockRef'
        best_header:
          $ref: '#/components/schemas/ApiHeaderRef'
        headers_ahead_of_full_blocks:
          type: integer
          format: int32
          minimum: 0
    ApiTxSource:
      oneOf:
      - type: object
        required:
        - addr
        - kind
        properties:
          addr:
            type: string
          kind:
            type: string
            enum:
            - peer
      - type: object
        required:
        - kind
        properties:
          kind:
            type: string
            enum:
            - api
      - type: object
        required:
        - kind
        properties:
          kind:
            type: string
            enum:
            - wallet
      - type: object
        required:
        - kind
        properties:
          kind:
            type: string
            enum:
            - demoted_from_block
      description: |-
        Where a mempool transaction entered our pool. Tagged union — clients
        switch on `kind` and read `addr` only for `peer`.
    ApiVotableParam:
      type: object
      description: |-
        A votable numeric protocol parameter and the inclusive `[min, max]` target
        bounds. A vote moves the parameter at most one `step` per voting epoch toward
        the target and only while it is inside the bound, so a target outside
        `[min, max]` is rejected. Mirror of `ergo_validation::voting::ParamDescriptor`.
      required:
      - id
      - name
      - description
      - current
      - step
      - min
      - max
      properties:
        current:
          type: integer
          format: int32
        description:
          type: string
          description: |-
            One-line operator-facing explanation of what the parameter governs and
            the implication of voting it higher. Sourced from
            `ergo_validation::voting::votable_param_description`.
        id:
          type: integer
          format: int32
          minimum: 0
        max:
          type: integer
          format: int32
          description: Inclusive upper target bound.
        min:
          type: integer
          format: int32
          description: |-
            Inclusive lower target bound. The recompute gates at the bound (won't
            step a parameter further past it) rather than hard-clamping.
        name:
          type: string
        step:
          type: integer
          format: int32
    ApiVoteChangeEvent:
      type: object
      description: One epoch boundary at which the active protocol parameters changed.
      required:
      - height
      - params
      properties:
        height:
          type: integer
          format: int32
          description: Epoch-start height at which these new values took effect.
          minimum: 0
        params:
          type: array
          items:
            $ref: '#/components/schemas/ApiParamChange'
          description: The parameters that changed at this boundary.
    ApiVoteTarget:
      type: object
      description: One desired vote in a `POST /api/v1/votes` request.
      required:
      - parameterId
      - target
      properties:
        parameterId:
          type: integer
          format: int32
          description: |-
            Votable parameter id (1..=8, or 9 = subblocksPerBlock). `blockVersion`
            (123) and soft-fork (120) are not operator-votable and are rejected.
          minimum: 0
        target:
          type: integer
          format: int64
          description: Desired value; the node votes up/down one step per block toward it.
    ApiVotes:
      type: object
      description: |-
        `GET /api/v1/votes` — what the node operator can vote on. Native operator
        endpoint (no Scala equivalent; ungated like the other `/api/v1/*` reads).
        The votable set + per-parameter bounds come from the same table the
        consensus vote-recompute uses, so an operator (and the candidate-vote
        selector) sees exactly which votes are legal.
      required:
      - blockHeight
      - blockVersion
      - epochStartHeight
      - votableParameters
      - configuredVotes
      properties:
        blockHeight:
          type: integer
          format: int32
          description: Current full-block height (votes are cast by the miner at the next height).
          minimum: 0
        blockVersion:
          type: integer
          format: int32
          description: Active block-format version.
          minimum: 0
        configuredVotes:
          type: array
          items:
            $ref: '#/components/schemas/ApiConfiguredVote'
          description: |-
            The operator's configured voting targets — the boot `[voting]` config
            plus any successful runtime `POST /api/v1/votes` edits (the live policy).
            Empty when no targets are configured.
        epochStartHeight:
          type: integer
          format: int32
          description: Height the current voting epoch's parameters took effect from.
          minimum: 0
        votableParameters:
          type: array
          items:
            $ref: '#/components/schemas/ApiVotableParam'
          description: |-
            The numeric parameters an operator can vote to change, with the bounds a
            vote must respect. Excludes blockVersion (soft-fork driven, not voted).
    ApiVotesHistory:
      type: object
      description: |-
        Response for `GET /api/v1/votes/history` — the protocol-parameter change
        timeline reconstructed from the node's stored per-epoch parameter rows.
        Each entry is an epoch boundary at which one or more parameters actually
        changed (boundaries with no change are omitted), so this reads as the
        governance history: what the network's votes have changed, and when.
      required:
      - epochLength
      - currentHeight
      - changes
      properties:
        changes:
          type: array
          items:
            $ref: '#/components/schemas/ApiVoteChangeEvent'
          description: Epoch boundaries where at least one parameter changed, oldest first.
        currentHeight:
          type: integer
          format: int32
          description: Current full-block height, for context.
          minimum: 0
        epochLength:
          type: integer
          format: int32
          description: |-
            Voting epoch length in blocks (mainnet 1024, testnet 128). Parameter
            changes can only take effect at heights that are multiples of this.
          minimum: 0
    ApiWeightFunction:
      type: string
      description: |-
        Active mempool priority-weight function. Wire strings match
        `ergo_mempool::WeightFunction::name()` exactly: `"cost"`, `"size"`,
        `"min"`. Boot-time `TryFrom<&str>` rejects unknown names.
      enum:
      - cost
      - size
      - min
    BoxPage:
      type: object
      description: Paged wallet-box list, ordered `(creationHeight desc, boxId asc)`.
      required:
      - items
      - total
      - asOf
      properties:
        asOf:
          type: integer
          format: int32
          minimum: 0
        items:
          type: array
          items:
            $ref: '#/components/schemas/WalletBoxSummary'
        total:
          type: integer
          format: int32
          minimum: 0
    BoxProvenanceDto:
      oneOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - owned
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - minerReward
      - type: object
        required:
        - scanId
        - type
        properties:
          scanId:
            type: integer
            format: int32
            minimum: 0
          type:
            type: string
            enum:
            - custom
      description: How a wallet box was classified at apply time. Tagged.
    BoxSelectRequest:
      type: object
      description: '`POST /api/v1/wallet/boxes/select` request.'
      required:
      - target
      properties:
        allowReemissionSpend:
          type: boolean
          description: Permit selecting a reward box carrying the re-emission token.
        changeAddress:
          type:
          - string
          - 'null'
          description: Change address; `null` → persisted change address.
        inputs:
          $ref: '#/components/schemas/InputSource'
          description: 'Where to draw inputs from (default: `auto`).'
        target:
          $ref: '#/components/schemas/SelectTarget'
          description: What to cover.
      additionalProperties: false
    BoxSelectResponse:
      type: object
      description: '`POST /api/v1/wallet/boxes/select` response — a real dry-run plan.'
      required:
      - inputsSelected
      - change
      - asOf
      properties:
        asOf:
          type: integer
          format: int32
          description: Wallet height the read was taken at.
          minimum: 0
        change:
          $ref: '#/components/schemas/ChangePlan'
          description: The real computed change.
        inputsSelected:
          type: array
          items:
            $ref: '#/components/schemas/SelectedBoxRef'
          description: Boxes the selector chose.
        reemissionBurn:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ReemissionBurn'
            description: EIP-27 burn the selection incurs, or `null`.
    BoxStatusDto:
      oneOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - confirmed
      - type: object
        required:
        - maturesAtHeight
        - type
        properties:
          maturesAtHeight:
            type: integer
            format: int32
            minimum: 0
          type:
            type: string
            enum:
            - immature
      - type: object
        required:
        - txId
        - height
        - type
        properties:
          height:
            type: integer
            format: int32
            minimum: 0
          txId:
            type: string
          type:
            type: string
            enum:
            - spent
      description: Lifecycle status of a wallet box. Tagged; lean (no full box rendering).
    BuildTxResponse:
      type: object
      description: '`POST /api/v1/wallet/transactions/build` response.'
      required:
      - unsignedTransaction
      - inputsSelected
      - changeOutputs
      - fee
      - asOf
      properties:
        asOf:
          type: integer
          format: int32
          description: Wallet height the inputs were read at.
          minimum: 0
        changeOutputs:
          type: array
          items:
            $ref: '#/components/schemas/ChangePlan'
          description: Change outputs (real values), if any.
        fee:
          type: string
          description: Miner fee, nanoErg (decimal string).
        inputsSelected:
          type: array
          items:
            $ref: '#/components/schemas/SelectedBoxRef'
          description: Boxes selected as inputs.
        reemissionBurn:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ReemissionBurn'
            description: EIP-27 burn the build incurs, or `null`.
        unsignedTransaction:
          $ref: '#/components/schemas/TxRepr'
          description: The built unsigned transaction.
    ChangeAddressDto:
      type: object
      description: '`GET /api/v1/wallet/change-address` response. `null` when unset.'
      properties:
        address:
          type:
          - string
          - 'null'
    ChangePlan:
      type: object
      description: |-
        The real computed change of a selection/build (replaces the Scala synthetic
        placeholder).
      required:
      - nanoErg
      - assets
      properties:
        assets:
          type: array
          items:
            $ref: '#/components/schemas/WalletAssetDto'
          description: Change tokens.
        nanoErg:
          type: string
          description: Change nanoErg (decimal string).
    DataInputSource:
      oneOf:
      - type: object
        description: Explicit data-input box ids.
        required:
        - boxIds
        - type
        properties:
          boxIds:
            type: array
            items:
              type: string
            description: 32-byte box ids, hex.
          type:
            type: string
            enum:
            - boxIds
      - type: object
        description: Explicit serialized data-input boxes, hex.
        required:
        - boxesHex
        - type
        properties:
          boxesHex:
            type: array
            items:
              type: string
            description: Serialized `ErgoBox` bytes, hex.
          type:
            type: string
            enum:
            - boxes
      description: 'Where a [`TxIntent`] draws its data inputs from, tagged (default: empty `boxIds`).'
    DerivationMode:
      oneOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - eip3
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - legacyPre1627
      description: |-
        Key-derivation mode for `restore` (tagged). Required — no default (the
        legacy-default trap is deliberately removed). Manual `Deserialize` so unknown
        sibling fields are rejected (serde can't `deny_unknown_fields` an
        internally-tagged enum).
    DeriveKeyRequest:
      oneOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - next
      - type: object
        required:
        - derivationPath
        - type
        properties:
          derivationPath:
            type: string
          type:
            type: string
            enum:
            - path
      description: |-
        `POST /api/v1/wallet/addresses` (derive) request (tagged). `next` derives the
        next sequential key; `path` derives at an explicit BIP32 path. Manual
        `Deserialize` so unknown sibling fields are rejected and each variant's fields
        are validated (serde can't `deny_unknown_fields` an internally-tagged enum).
    DerivedAddress:
      type: object
      description: '`POST /api/v1/wallet/addresses` (derive) response.'
      required:
      - address
      - derivationPath
      - index
      properties:
        address:
          type: string
          description: Encoded P2PK address for the derived key.
        derivationPath:
          type: string
          description: BIP32 derivation path of the derived key.
        index:
          type: integer
          format: int32
          description: Address index — the last path component.
          minimum: 0
    ExternalSecret:
      oneOf:
      - type: object
        description: Discrete-log secret.
        required:
        - secret
        - type
        properties:
          secret:
            type: string
            description: 32-byte big-endian hex scalar (SENSITIVE).
          type:
            type: string
            enum:
            - dlog
      - type: object
        description: Diffie-Hellman tuple secret.
        required:
        - g
        - h
        - u
        - v
        - secret
        - type
        properties:
          g:
            type: string
            description: Compressed SEC1 generator point, hex.
          h:
            type: string
            description: Compressed SEC1 `h` point, hex.
          secret:
            type: string
            description: 32-byte big-endian hex scalar (SENSITIVE).
          type:
            type: string
            enum:
            - dhTuple
          u:
            type: string
            description: Compressed SEC1 `u` point, hex.
          v:
            type: string
            description: Compressed SEC1 `v` point, hex.
      description: |-
        An externally-supplied prover secret (tagged). SENSITIVE: body-only, never
        logged (the `Debug` impl redacts the scalar). `secret` is a 32-byte big-endian
        hex scalar for both members; the DH-tuple member adds its four compressed SEC1
        group elements. Manual `Deserialize` for strict rejection. Deliberately NOT
        `Serialize` — it is request-only, and deriving `Serialize` would route the raw
        scalar straight to JSON, defeating the `Debug` redaction.
    HealthStatus:
      type: string
      enum:
      - ok
      - stalled
      - disconnected
      - rejecting
    InitRequest:
      type: object
      description: '`POST /api/v1/wallet/init` request. Secrets body-only, never logged.'
      required:
      - pass
      properties:
        mnemonicPass:
          type: string
          description: BIP39 passphrase (empty if none).
        pass:
          type: string
          description: Wallet password.
        strength:
          type: integer
          format: int32
          description: 'Mnemonic word count: one of 12/15/18/21/24.'
          minimum: 0
      additionalProperties: false
    InitResponse:
      type: object
      description: |-
        `POST /api/v1/wallet/init` response — the generated mnemonic, returned ONCE
        (no-store; the page is the only place it should ever live).
      required:
      - mnemonic
      properties:
        mnemonic:
          type: string
    InputSource:
      oneOf:
      - type: object
        description: Automatic wallet box selection.
        required:
        - type
        properties:
          excludeBoxIds:
            type: array
            items:
              type: string
            description: Box ids to exclude from selection.
          minConfirmations:
            type: integer
            format: int64
            description: Minimum confirmations a candidate box must have (`-1` = include pool).
          type:
            type: string
            enum:
            - auto
      - type: object
        description: Explicit wallet box ids.
        required:
        - boxIds
        - type
        properties:
          boxIds:
            type: array
            items:
              type: string
            description: 32-byte box ids, hex.
          type:
            type: string
            enum:
            - boxIds
      - type: object
        description: Explicit serialized boxes, hex.
        required:
        - boxesHex
        - type
        properties:
          boxesHex:
            type: array
            items:
              type: string
            description: Serialized `ErgoBox` bytes, hex.
          type:
            type: string
            enum:
            - boxes
      description: |-
        Where a [`TxIntent`]/[`BoxSelectRequest`] draws its inputs from, tagged.
        `auto` = wallet box selection (the default); `boxIds` = explicit wallet box
        ids; `boxes` = explicit serialized boxes (hex). Manual `Deserialize` for strict
        rejection.
    MnemonicVerifyRequest:
      type: object
      description: '`POST /api/v1/wallet/mnemonic/verify` request. Body-only secrets, never logged.'
      required:
      - mnemonic
      properties:
        mnemonic:
          type: string
          description: Candidate recovery phrase to compare against the persisted seed.
        mnemonicPass:
          type: string
          description: BIP39 passphrase (empty if none).
      additionalProperties: false
    MnemonicVerifyResult:
      type: object
      description: |-
        `POST /api/v1/wallet/mnemonic/verify` result. `matched=false` is a factual
        answer, not an error.
      required:
      - matched
      properties:
        matched:
          type: boolean
    NanoErgBreakdownDto:
      type: object
      description: |-
        nanoErg breakdown — all decimal strings.

        Invariant: `available == confirmed.saturating_sub(reserved)` **always**; and
        `available + reserved == confirmed` iff `reserved <= confirmed`, otherwise
        `available == 0` and `reserved > confirmed` (flagged by
        [`ReemissionInfoDto::reserved_exceeds_confirmed`]). `reserved` is never clamped.
      required:
      - confirmed
      - available
      - reserved
      - immature
      properties:
        available:
          type: string
          description: '`confirmed − reserved` (saturating). The factual spendable figure.'
        confirmed:
          type: string
          description: Gross sum of mature (`Confirmed`) box values.
        immature:
          type: string
          description: Sum of immature (mining-reward maturity-window) box values; separate.
        reserved:
          type: string
          description: EIP-27 re-emission holdback estimate (see [`ReemissionInfoDto`]).
    NativeWalletError:
      type: object
      description: The native wallet error body. `detail` is omitted (not `null`) when absent.
      required:
      - reason
      properties:
        detail:
          type:
          - string
          - 'null'
          description: Optional human-readable detail; never carries secret material.
        reason:
          type: string
          description: Closed snake_case reason set (see the design §4).
    NetworkDto:
      oneOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - mainnet
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - testnet
      description: The network this wallet is on (from `cfg.network`).
    OutputIntent:
      oneOf:
      - type: object
        description: Pay `value` nanoErg (+ optional `assets`/`registers`) to `address`.
        required:
        - address
        - value
        - type
        properties:
          address:
            type: string
            description: |-
              Recipient P2PK address for this network. P2S (contract) recipients are
              not yet supported — the builder decodes the recipient as P2PK, so a P2S
              address is rejected as a bad address.
          assets:
            type: array
            items:
              $ref: '#/components/schemas/WalletAssetDto'
            description: Tokens to send alongside.
          registers:
            type:
            - object
            - 'null'
            description: Non-default registers (R4..R9), hex-encoded constants. `unsupported_intent` until wired.
            additionalProperties:
              type: string
            propertyNames:
              type: string
          type:
            type: string
            enum:
            - payment
          value:
            type: string
            description: nanoErg to send (decimal string).
      - type: object
        description: Mint a new token to `address`. `unsupported_intent` until wired.
        required:
        - address
        - amount
        - type
        properties:
          address:
            type: string
            description: Recipient of the minted token.
          amount:
            type: string
            description: Amount to mint (decimal string).
          decimals:
            type:
            - integer
            - 'null'
            format: int32
            description: Optional EIP-4 decimals.
            minimum: 0
          description:
            type:
            - string
            - 'null'
            description: Optional EIP-4 description.
          name:
            type:
            - string
            - 'null'
            description: Optional EIP-4 token name.
          type:
            type: string
            enum:
            - mint
      - type: object
        description: Destroy a token surplus (no output keeps these). Requires `allowTokenBurn`.
        required:
        - assets
        - type
        properties:
          assets:
            type: array
            items:
              $ref: '#/components/schemas/WalletAssetDto'
            description: Tokens to burn (≥1).
          type:
            type: string
            enum:
            - burn
      description: |-
        One requested output of a [`TxIntent`], tagged. `payment` (+ optional
        assets/registers) and `burn` are load-bearing; `mint` and `payment.registers`
        are valid shapes that ship `unsupported_intent(422)` until builder support
        lands (P2-5 — a later 422→200 for the same well-formed request, not a behavior
        change). Manual `Deserialize` so unknown sibling fields and cross-variant field
        leakage are rejected.
    RawTransactionBytes:
      type: string
      format: binary
      description: |-
        OpenAPI request-body schema for the raw transaction bytes accepted by
        `POST /api/v1/mempool/{submit,check}`. The handlers take an opaque
        `axum::body::Bytes` and forward it verbatim; this renders that body as
        `application/octet-stream` binary (`type: string, format: binary`) in
        the generated spec. Documentation only — never constructed at runtime.
    ReemissionBurn:
      type: object
      description: |-
        The EIP-27 re-emission burn a selection/build incurs. Present (non-null) only
        when the selected inputs trigger the burn; computed exactly from the selected
        inputs via `reemission_obligation_core`, never the wallet-wide estimate.
      required:
      - tokenId
      - tokensBurned
      - nanoErgRouted
      properties:
        nanoErgRouted:
          type: string
          description: nanoErg routed to the pay-to-reemission contract (= `tokensBurned`).
        tokenId:
          type: string
          description: 32-byte re-emission token id, hex.
        tokensBurned:
          type: string
          description: Re-emission tokens burned (decimal string).
    ReemissionInfoDto:
      type: object
      description: EIP-27 re-emission reserve detail. `null` off EIP-27 nets or below activation.
      required:
      - tokenId
      - reservedTokenAmount
      - reservedBoxCount
      - reservedExceedsConfirmed
      properties:
        reservedBoxCount:
          type: integer
          format: int32
          description: |-
            Number of confirmed wallet boxes carrying the re-emission token. This is the
            shared obligation's box count — it counts every token-carrying input once the
            rule is triggered, not only the floor reward boxes that trigger it.
          minimum: 0
        reservedExceedsConfirmed:
          type: boolean
          description: |-
            `reserved > confirmed` — the pathological case where the holdback exceeds
            mature ERG (then `available == 0`).
        reservedTokenAmount:
          type: string
          description: |-
            Re-emission tokens held across the wallet's confirmed boxes; `== reserved`
            1:1 (1 nanoErg/token).
        tokenId:
          type: string
          description: 32-byte re-emission token id, hex.
    RescanRequest:
      type: object
      description: '`POST /api/v1/wallet/rescan` request (body optional; defaults to a full rebuild).'
      properties:
        fromHeight:
          type: integer
          format: int32
          description: Height to rescan from (0 = full rebuild).
          minimum: 0
      additionalProperties: false
    RescanStateDto:
      oneOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - idle
      - type: object
        required:
        - fromHeight
        - type
        properties:
          fromHeight:
            type: integer
            format: int32
            minimum: 0
          type:
            type: string
            enum:
            - running
      - type: object
        required:
        - detail
        - type
        properties:
          detail:
            type: string
          type:
            type: string
            enum:
            - unavailable
      description: |-
        Wallet rescan lifecycle phase. `running` is a real full-rebuild-in-progress
        state; `unavailable` is returned only on a backend that cannot replay blocks.
    RestoreRequest:
      type: object
      description: '`POST /api/v1/wallet/restore` request. Secrets body-only, never logged.'
      required:
      - mnemonic
      - pass
      - derivation
      properties:
        derivation:
          $ref: '#/components/schemas/DerivationMode'
          description: Required derivation mode.
        mnemonic:
          type: string
          description: Recovery phrase.
        mnemonicPass:
          type: string
          description: BIP39 passphrase (empty if none).
        pass:
          type: string
          description: Wallet password.
      additionalProperties: false
    RetrieveRewardsRequest:
      type: object
      description: |-
        `POST /api/v1/wallet/rewards/retrieve` request. Sweeps all matured
        (Confirmed) miner-reward boxes into one P2PK output, burning the re-emission
        token and routing its ERG to pay-to-reemission.
      properties:
        boxIds:
          type:
          - array
          - 'null'
          items:
            type: string
          description: |-
            Exact reward box ids (hex) to sweep — PIN the input set returned by a
            preview so execute spends the same boxes the user confirmed. When omitted,
            the server selects the oldest matured reward boxes (up to the per-sweep
            cap). Every id MUST still be a matured, unspent miner-reward box or the
            request is rejected.
        destination:
          type:
          - string
          - 'null'
          description: |-
            Destination for the swept ERG + non-re-emission tokens. MUST be a tracked
            wallet address (the sweep routes funds there as change). `null`/omitted →
            the wallet's current change address.
        dryRun:
          type: boolean
          description: |-
            `true` → build + report the breakdown WITHOUT signing/submitting (preview).
            `false` → execute: sign, self-verify (incl. EIP-27), and submit. Unknown
            keys are rejected (`deny_unknown_fields`) so a misspelled `dryRun` cannot
            silently execute a sweep the caller intended only to preview.
        fee:
          type:
          - string
          - 'null'
          description: |-
            Miner fee in nanoErg (decimal string). `null`/omitted → the wallet default
            minimum fee.
      additionalProperties: false
    RetrieveRewardsResultDto:
      type: object
      description: |-
        `POST /api/v1/wallet/rewards/retrieve` response (preview or executed). All
        nanoErg fields are decimal strings.
      required:
      - boxCount
      - boxIds
      - remaining
      - grossErg
      - reemissionPaid
      - fee
      - netToDestination
      - otherTokens
      - destination
      properties:
        boxCount:
          type: integer
          format: int32
          description: Matured reward boxes swept.
          minimum: 0
        boxIds:
          type: array
          items:
            type: string
          description: |-
            The exact reward box ids (hex) this sweep spends. Pass these back as
            `boxIds` on the execute call to pin the input set the preview showed.
        destination:
          type: string
          description: Destination address the sweep pays to.
        fee:
          type: string
          description: Miner fee.
        grossErg:
          type: string
          description: Gross matured ERG across those boxes.
        netToDestination:
          type: string
          description: Net ERG delivered to the destination (`gross − fee − reemission`).
        otherTokens:
          type: array
          items:
            $ref: '#/components/schemas/SweptTokenDto'
          description: Non-re-emission tokens carried to the destination output.
        reemissionPaid:
          type: string
          description: nanoErg routed to the pay-to-reemission contract (= re-emission tokens burned).
        remaining:
          type: integer
          format: int32
          description: |-
            Matured reward boxes NOT included this round (over the per-sweep cap). Run
            the sweep again to retrieve them. `0` when everything matured was swept.
          minimum: 0
        txId:
          type:
          - string
          - 'null'
          description: Submitted transaction id, or `null` on a dry-run (preview).
    ScopeDto:
      oneOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - singleHop
      description: |-
        Scope of an unconfirmed delta. Tagged; `singleHop` is the only reachable
        variant today (`fullOffChainRegistry` is reserved, additive).
    SelectTarget:
      type: object
      description: '`POST /api/v1/wallet/boxes/select` target — what the selection must cover.'
      required:
      - nanoErg
      properties:
        assets:
          type: array
          items:
            $ref: '#/components/schemas/WalletAssetDto'
          description: Tokens the selection must cover.
        nanoErg:
          type: string
          description: nanoErg the selection must cover (decimal string).
      additionalProperties: false
    SelectedBoxRef:
      type: object
      description: A selected input box (lean; additive fields later).
      required:
      - boxId
      - value
      - assets
      properties:
        assets:
          type: array
          items:
            $ref: '#/components/schemas/WalletAssetDto'
          description: Tokens the box carries.
        boxId:
          type: string
          description: 32-byte box id, hex.
        value:
          type: string
          description: Box value, nanoErg (decimal string).
    SendTxRequest:
      oneOf:
      - type: object
        description: Build + sign + send from an intent.
        required:
        - intent
        - type
        properties:
          intent:
            $ref: '#/components/schemas/TxIntent'
            description: The transaction intent.
          type:
            type: string
            enum:
            - intent
      - type: object
        description: Send a pre-signed transaction.
        required:
        - signedTransaction
        - type
        properties:
          signedTransaction:
            $ref: '#/components/schemas/TxRepr'
            description: The signed transaction.
          type:
            type: string
            enum:
            - signed
      description: |-
        `POST /api/v1/wallet/transactions/send` request (tagged). `intent` builds +
        signs with the wallet's own secrets (needs unlock); `signed` submits a
        caller-supplied signed tx (no unlock). Manual `Deserialize` for strictness.
    SendTxResponse:
      type: object
      description: |-
        `POST /api/v1/wallet/transactions/send` response. `accepted` is `true` both on
        a fresh submission and on an idempotent re-send of an already-known tx.
        `transaction` is the lean summary only when a confirmed wallet row exists.
      required:
      - txId
      - accepted
      properties:
        accepted:
          type: boolean
          description: Whether the tx is accepted (fresh submit or known-tx idempotent re-send).
        transaction:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/WalletTransactionSummary'
            description: The wallet tx summary when a confirmed row exists, else `null`.
        txId:
          type: string
          description: 32-byte transaction id, hex.
    SetChangeAddressRequest:
      type: object
      description: '`PUT /api/v1/wallet/change-address` request.'
      required:
      - address
      properties:
        address:
          type: string
          description: The address to use for change — must be a tracked P2PK on this network.
      additionalProperties: false
    SignTxRequest:
      type: object
      description: |-
        `POST /api/v1/wallet/transactions/sign` request. Signs a caller-supplied
        unsigned tx. Runs no `Locked` precondition: it succeeds while locked when
        `externalSecrets` cover every input; otherwise the prover's missing-secret →
        `missing_secret(422)`. The EIP-27 self-verify gate runs before emitting.
      required:
      - unsignedTransaction
      properties:
        externalSecrets:
          type: array
          items:
            $ref: '#/components/schemas/ExternalSecret'
          description: Externally-supplied prover secrets (default `[]`).
        unsignedTransaction:
          $ref: '#/components/schemas/TxRepr'
          description: The unsigned transaction to sign.
      additionalProperties: false
    SignTxResponse:
      type: object
      description: '`POST /api/v1/wallet/transactions/sign` response. `Cache-Control: no-store`.'
      required:
      - signedTransaction
      - txId
      properties:
        signedTransaction:
          $ref: '#/components/schemas/TxRepr'
          description: The signed transaction.
        txId:
          type: string
          description: 32-byte transaction id, hex.
    SweptTokenDto:
      type: object
      description: A non-re-emission token carried through a sweep to the destination output.
      required:
      - tokenId
      - amount
      properties:
        amount:
          type: string
          description: Token amount (decimal string).
        tokenId:
          type: string
          description: 32-byte token id, hex.
    SyncStateLabel:
      type: string
      enum:
      - disconnected
      - syncing
      - at_tip
      - stalled
    TxIntent:
      type: object
      description: |-
        `POST /api/v1/wallet/transactions/build` request (also `send.intent`). At least
        one output. `fee` `null` uses `MIN_FEE`; `changeAddress` `null` uses the
        persisted change address. `allowReemissionSpend`/`allowTokenBurn` default
        `false` (fail-closed against accidental reward-box spend / token loss).
      required:
      - outputs
      properties:
        allowReemissionSpend:
          type: boolean
          description: Permit spending a reward box carrying the re-emission token.
        allowTokenBurn:
          type: boolean
          description: |-
            Permit dropping (burning) a non-re-emission token surplus. RESERVED: the
            current builder never drops a non-re-emission token (any surplus always
            becomes change), so this flag has no effect yet; it gates the deferred
            `burn` output intent (which ships `unsupported_intent` until wired).
        changeAddress:
          type:
          - string
          - 'null'
          description: Change address; `null` → persisted change address.
        dataInputs:
          $ref: '#/components/schemas/DataInputSource'
          description: 'Where data inputs come from (default: empty `boxIds`).'
        fee:
          type:
          - string
          - 'null'
          description: Miner fee in nanoErg (decimal string); `null` → `MIN_FEE`.
        inputs:
          $ref: '#/components/schemas/InputSource'
          description: 'Where inputs come from (default: `auto`).'
        outputs:
          type: array
          items:
            $ref: '#/components/schemas/OutputIntent'
          description: Requested outputs (≥1; validated by the handler).
      additionalProperties: false
    TxPage:
      type: object
      description: Paged wallet-transaction list, ordered `(blockHeight desc, txId asc)`.
      required:
      - items
      - total
      - asOf
      properties:
        asOf:
          type: integer
          format: int32
          minimum: 0
        items:
          type: array
          items:
            $ref: '#/components/schemas/WalletTransactionSummary'
        total:
          type: integer
          format: int32
          minimum: 0
    TxRepr:
      oneOf:
      - type: object
        description: Hex of the serialized transaction bytes.
        required:
        - bytes
        - type
        properties:
          bytes:
            type: string
            description: Lowercase hex of the serialized transaction.
          type:
            type: string
            enum:
            - bytes
      description: |-
        Wire representation of a transaction (unsigned or signed), tagged (P2-1). Only
        `bytes` (hex of the serialized tx) is active today; `{type:"json"}` is reserved
        (additive). One shape everywhere a tx crosses the wire — `build` output, `sign`
        in/out, `send`, multisig in/out — never a second composition form. Manual
        `Deserialize` so unknown sibling fields are rejected.
    UnconfirmedDeltaDto:
      type: object
      description: |-
        A labeled single-hop unconfirmed delta. Present only with
        `?includeUnconfirmed=true`; **never folded** into `confirmed`/`available`.
      required:
      - scope
      - incomingNanoErg
      - outgoingNanoErg
      - netNanoErg
      properties:
        incomingNanoErg:
          type: string
          description: nanoErg arriving in pending pool outputs to the wallet (decimal string).
        netNanoErg:
          type: string
          description: '`incoming − outgoing`, signed decimal string.'
        outgoingNanoErg:
          type: string
          description: nanoErg leaving via confirmed wallet boxes a pool tx already spends.
        scope:
          $ref: '#/components/schemas/ScopeDto'
          description: What the delta covers.
    UnlockRequest:
      type: object
      description: '`POST /api/v1/wallet/unlock` request. `pass` is body-only, never logged.'
      required:
      - pass
      properties:
        pass:
          type: string
          description: Wallet password.
      additionalProperties: false
    WalletAddressDto:
      type: object
      description: A tracked wallet address with its derivation metadata.
      required:
      - address
      - derivationPath
      - index
      - addedAtHeight
      properties:
        addedAtHeight:
          type: integer
          format: int32
          description: Height at which this pubkey was first tracked.
          minimum: 0
        address:
          type: string
          description: The encoded P2PK address for this network.
        derivationPath:
          type: string
          description: BIP32 derivation path, e.g. `m/44'/429'/0'/0/0`.
        index:
          type: integer
          format: int64
          description: |-
            Monotonic tracked-pubkey index (insertion / derivation order). `u64` to
            match the storage `TrackedAddressMeta.path_idx` exactly — narrowing to
            `u32` would silently alias distinct addresses past `u32::MAX`.
          minimum: 0
        label:
          type:
          - string
          - 'null'
          description: Operator label, or `null` when unset.
    WalletAssetDto:
      type: object
      description: |-
        A token amount. `amount` is a decimal string (token amounts can exceed 2^53).
        `deny_unknown_fields` so this stays strict when nested inside request DTOs
        (e.g. `OutputIntent::payment.assets`, `SelectTarget.assets`).
      required:
      - tokenId
      - amount
      properties:
        amount:
          type: string
          description: Decimal-string amount.
        tokenId:
          type: string
          description: 32-byte token id, hex.
      additionalProperties: false
    WalletBalanceDto:
      type: object
      description: '`GET /api/v1/wallet/balance` response.'
      required:
      - height
      - nanoErg
      - assets
      properties:
        assets:
          type: array
          items:
            $ref: '#/components/schemas/WalletAssetDto'
          description: |-
            Confirmed token balances (the re-emission token is omitted — it is
            accounted for solely by `reserved`/`reemission`).
        height:
          type: integer
          format: int32
          description: |-
            `asOf` — the wallet scan height of the single read snapshot this body
            was computed from.
          minimum: 0
        nanoErg:
          $ref: '#/components/schemas/NanoErgBreakdownDto'
          description: nanoErg breakdown.
        reemission:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/ReemissionInfoDto'
            description: |-
              EIP-27 reserve detail, or `null` off EIP-27 nets / below activation.
              Serialized as `null` (not omitted) so the field's presence is stable.
        unconfirmed:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/UnconfirmedDeltaDto'
            description: Labeled unconfirmed delta, or `null` unless `?includeUnconfirmed=true`.
    WalletBoxSummary:
      type: object
      description: |-
        A lean wallet box summary — no ergoTree/registers/address (full hydration is
        an additive follow-up, never a reshape of this summary).
      required:
      - boxId
      - value
      - assets
      - creationTxId
      - creationOutputIndex
      - creationHeight
      - status
      - provenance
      properties:
        assets:
          type: array
          items:
            $ref: '#/components/schemas/WalletAssetDto'
        boxId:
          type: string
        creationHeight:
          type: integer
          format: int32
          minimum: 0
        creationOutputIndex:
          type: integer
          format: int32
          minimum: 0
        creationTxId:
          type: string
        provenance:
          $ref: '#/components/schemas/BoxProvenanceDto'
        status:
          $ref: '#/components/schemas/BoxStatusDto'
        value:
          type: string
          description: Box value in nanoErg (decimal string).
    WalletStatusDto:
      type: object
      description: '`GET /api/v1/wallet/status` — wallet state snapshot.'
      required:
      - initialized
      - locked
      - scanHeight
      - tipHeight
      - network
      - eip27Active
      - rescan
      - scanInvalidated
      properties:
        changeAddress:
          type:
          - string
          - 'null'
          description: |-
            Current change address, or `null` when unset (never `""`). Surfaced even
            while locked — it is read from the persisted change-address state, not the
            in-memory key.
        eip27Active:
          type: boolean
          description: |-
            EIP-27 is active for the next wallet spend (`cfg.reemission` set AND
            `tip+1 > activation`) — the same inputs as the balance `reserved` trigger.
        initialized:
          type: boolean
          description: A wallet exists (seed stored), independent of lock state.
        locked:
          type: boolean
          description: The in-memory master key is NOT loaded.
        network:
          $ref: '#/components/schemas/NetworkDto'
          description: The network this wallet is on.
        rescan:
          $ref: '#/components/schemas/RescanStateDto'
          description: Rescan lifecycle phase.
        scanHeight:
          type: integer
          format: int32
          description: Height the wallet has scanned through (the read snapshot's `asOf`).
          minimum: 0
        scanInvalidated:
          type: boolean
          description: The wallet scan was invalidated (balances/addresses may be stale until a rescan).
        tipHeight:
          type: integer
          format: int32
          description: Chain frontier height (so a client can compute the sync gap).
          minimum: 0
    WalletTransactionSummary:
      type: object
      description: A lean wallet-transaction summary — references only (no full IO/fee/bytes).
      required:
      - txId
      - blockId
      - blockHeight
      - walletInputBoxIds
      - walletOutputBoxIds
      properties:
        blockHeight:
          type: integer
          format: int32
          minimum: 0
        blockId:
          type: string
        txId:
          type: string
        walletInputBoxIds:
          type: array
          items:
            type: string
        walletOutputBoxIds:
          type: array
          items:
            type: string
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: api_key
tags:
- name: node
  description: Node identity, host, status
- name: chain
  description: Tip, sync progress
- name: peers
  description: Peer manager view
- name: mempool
  description: Mempool overlay + submission
- name: admin
  description: API-key-gated operator routes
- name: health
  description: Liveness + readiness
- name: wallet
  description: Native api-key-gated wallet surface

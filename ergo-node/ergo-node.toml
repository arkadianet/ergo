# Ergo Rust Node — developer config (arkadia-dev)
# Operator template: ergo-node.toml.example

network = "mainnet"
# data_dir = "./ergo-data"  # default

[node]
agent_name = "opus"
node_name = "arkadia-dev-mode2"

# Mode 2 (UTXO snapshot bootstrap). Fresh data_dir → discover a
# snapshot from quorum-agreeing peers, trust-check against the
# header.state_root at the snapshot height, download chunks,
# reconstruct + install the UTXO tree, then continue normal block
# sync from snapshot_height + 1.
#
# Activation gate lifted in Mode 2 part 2j (commit ac2aadb).
# Trust verification remains PROVISIONAL until a Scala oracle
# vector is pinned — operator should cross-check the installed
# root against a known-good Scala manifest before treating the
# UTXO state as authoritative.
state_type = "utxo"
verify_transactions = true
blocks_to_keep = -1

[node.utxo]
utxo_bootstrap = true

[node.nipopow]
# Part 2 sub-phase 14.6 — NiPoPoW bootstrap consume side. With this
# flag set AND a fresh data_dir, the node fans GetNipopowProof out
# to peers (filtered to those advertising NipopowSupport), latches
# the best valid proof on quorum, and applies it via
# apply_popow_proof. Bootstrap completes when the proof's suffix
# tip + bounded forward catchup populate the canonical header at
# snapshot_height; Mode 2 manifest verify + install then proceed
# as normal. Expected wall-clock cut: header phase 22min -> seconds.
nipopow_bootstrap = true
# Default 2 (matches mainnet.conf::p2p_nipopows). Lower for a
# faster but less-corroborated apply; higher for stronger
# multi-peer confirmation at the cost of longer wait.
p2p_nipopows = 2

[peers]
target_outbound = 75
max_connections = 100
# Local Scala node (LAN) + loopback fallback. Scala mainnet p2p
# defaults to 9030; REST is 9053. Multiple addresses give the
# discovery + bootstrap path resilient peer surface.
known = ["10.10.20.2:9030", "127.0.0.1:9030"]

[api]
# (Submission routes are always mounted, matching Scala. Not-ready
# signals during bootstrap come from the admission pipeline:
# tip_unready → ibd_gated → ok as state catches up. Use
# [mempool] disabled = true if you want to actively reject
# submissions for archival or sync-test runs.)

[sync]
enable_anchor_scheduler = true

[indexer]
# R2 (Scala ErgoSettingsReader.consistentSettings:189): extra-index
# requires not-pruned AND not-utxo-bootstrap. Disable during the
# bootstrap window; can be re-enabled post-bootstrap with the
# one-way-on caveat from the roadmap (would backfill from height 1
# in a Mode 1 setup; for post-bootstrap Mode 2 the index would
# start at snapshot_height — operator's choice).
enabled = false

[logging]
default_level = "info"

[logging.file]
dir       = "."
prefix    = "ergo-node"
rotation  = "never"
max_files = 1

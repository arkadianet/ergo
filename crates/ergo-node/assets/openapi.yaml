openapi: "3.0.2"

info:
  title: Ergo Node API
  version: "6.0.1"
  description: API for the Ergo full-node implementation in Rust.
  contact:
    name: Ergo Platform
    url: https://ergoplatform.org
  license:
    name: CC0 1.0 Universal
    url: https://creativecommons.org/publicdomain/zero/1.0/

servers:
  - url: /

tags:
  - name: info
    description: Node information
  - name: blocks
    description: Block retrieval and chain queries
  - name: nipopow
    description: NiPoPoW proof generation
  - name: peers
    description: Peer management
  - name: transactions
    description: Transaction submission and mempool queries
  - name: utils
    description: Utility endpoints (address, seed, hash)
  - name: script
    description: ErgoScript compilation and conversion
  - name: emission
    description: Emission schedule
  - name: node
    description: Node control
  - name: blockchain
    description: Indexed blockchain queries
  - name: utxo
    description: UTXO state queries
  - name: mining
    description: Mining candidate and solution
  - name: wallet
    description: Wallet operations (feature-gated)
  - name: scan
    description: External scan management (feature-gated)

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: api_key

  schemas:
    ApiError:
      type: object
      required: [error, reason, detail]
      properties:
        error:
          type: integer
        reason:
          type: string
        detail:
          type: string

    NodeInfo:
      type: object
      properties:
        currentTime:
          type: integer
          format: int64
        appVersion:
          type: string
        fullHeight:
          type: integer
          nullable: true
        headersHeight:
          type: integer
          nullable: true
        maxPeerHeight:
          type: integer
        bestFullHeaderId:
          type: string
          nullable: true
        previousFullHeaderId:
          type: string
          nullable: true
        bestHeaderId:
          type: string
        stateRoot:
          type: string
        stateType:
          type: string
        stateVersion:
          type: string
        isMining:
          type: boolean
        peersCount:
          type: integer
        unconfirmedCount:
          type: integer
        difficulty:
          type: string
        headersScore:
          type: string
        fullBlocksScore:
          type: string
        launchTime:
          type: integer
          format: int64
        genesisBlockId:
          type: string
        syncState:
          type: string
        network:
          type: string
        parameters:
          type: object
        eip27Supported:
          type: boolean
        eip37Supported:
          type: boolean
        isExplorer:
          type: boolean
        restApiUrl:
          type: string
        lastSeenMessageTime:
          type: integer
          format: int64

    Header:
      type: object
      description: Block header
      properties:
        id:
          type: string
        parentId:
          type: string
        version:
          type: integer
        height:
          type: integer
        nBits:
          type: integer
          format: int64
        difficulty:
          type: string
        timestamp:
          type: integer
          format: int64
        stateRoot:
          type: string
        adProofsRoot:
          type: string
        transactionsRoot:
          type: string
        extensionHash:
          type: string
        powSolutions:
          $ref: "#/components/schemas/PowSolutions"
        votes:
          type: string
        size:
          type: integer

    PowSolutions:
      type: object
      properties:
        pk:
          type: string
        w:
          type: string
        n:
          type: string
        d:
          type: string

    Block:
      type: object
      properties:
        header:
          $ref: "#/components/schemas/Header"
        blockTransactions:
          type: object
          properties:
            headerId:
              type: string
            transactions:
              type: array
              items:
                $ref: "#/components/schemas/Transaction"
        adProofs:
          type: object
          nullable: true
          properties:
            headerId:
              type: string
            proofBytes:
              type: string
        extension:
          type: object
          properties:
            headerId:
              type: string
            fields:
              type: array
              items:
                type: array
                items:
                  type: string
        size:
          type: integer

    Transaction:
      type: object
      properties:
        id:
          type: string
        inputs:
          type: array
          items:
            $ref: "#/components/schemas/Input"
        dataInputs:
          type: array
          items:
            $ref: "#/components/schemas/DataInput"
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/ErgoBox"
        size:
          type: integer

    Input:
      type: object
      properties:
        boxId:
          type: string
        spendingProof:
          type: object
          properties:
            proofBytes:
              type: string
            extension:
              type: object

    DataInput:
      type: object
      properties:
        boxId:
          type: string

    ErgoBox:
      type: object
      properties:
        boxId:
          type: string
        value:
          type: integer
          format: int64
        ergoTree:
          type: string
        creationHeight:
          type: integer
        assets:
          type: array
          items:
            $ref: "#/components/schemas/Asset"
        additionalRegisters:
          type: object
        transactionId:
          type: string
        index:
          type: integer

    Asset:
      type: object
      properties:
        tokenId:
          type: string
        amount:
          type: integer
          format: int64

    Peer:
      type: object
      properties:
        address:
          type: string
        name:
          type: string
        lastHandshake:
          type: integer
          format: int64
        lastMessage:
          type: integer
          format: int64
        connectionType:
          type: string

    MerkleProof:
      type: object
      properties:
        leaf:
          type: string
        levels:
          type: array
          items:
            type: array
            items:
              type: string

    EmissionInfo:
      type: object
      properties:
        minerReward:
          type: integer
          format: int64
        totalCoinsIssued:
          type: integer
          format: int64
        totalRemainCoins:
          type: integer
          format: int64

    WorkMessage:
      type: object
      properties:
        msg:
          type: string
        b:
          type: string
        h:
          type: integer
        pk:
          type: string

    MiningSolution:
      type: object
      required: [n]
      properties:
        pk:
          type: string
        w:
          type: string
        n:
          type: string
        d:
          type: string

    WalletStatus:
      type: object
      properties:
        isInitialized:
          type: boolean
        isUnlocked:
          type: boolean
        changeAddress:
          type: string
          nullable: true
        walletHeight:
          type: integer

    BalanceInfo:
      type: object
      properties:
        nanoErgs:
          type: integer
          format: int64
        tokens:
          type: array
          items:
            $ref: "#/components/schemas/Asset"

    PaymentRequest:
      type: object
      properties:
        address:
          type: string
        value:
          type: integer
          format: int64
        assets:
          type: array
          items:
            $ref: "#/components/schemas/Asset"
        registers:
          type: object

    ScanRequest:
      type: object
      properties:
        scanName:
          type: string
        walletInteraction:
          type: string
        trackingRule:
          type: object

    PopowHeader:
      type: object
      properties:
        header:
          $ref: "#/components/schemas/Header"
        interlinks:
          type: array
          items:
            type: string

    NipopowProof:
      type: object
      properties:
        m:
          type: integer
        k:
          type: integer
        prefix:
          type: array
          items:
            $ref: "#/components/schemas/PopowHeader"
        suffixHead:
          $ref: "#/components/schemas/PopowHeader"
        suffixTail:
          type: array
          items:
            $ref: "#/components/schemas/PopowHeader"

    IndexedHeight:
      type: object
      properties:
        indexedHeight:
          type: integer
        fullHeight:
          type: integer

    IndexedToken:
      type: object
      properties:
        id:
          type: string
        boxId:
          type: string
        emissionAmount:
          type: integer
          format: int64
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        decimals:
          type: integer
          nullable: true

  parameters:
    offsetParam:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
    limitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
    sortDirectionParam:
      name: sortDirection
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    includeUnconfirmedParam:
      name: includeUnconfirmed
      in: query
      schema:
        type: boolean
        default: false

paths:
  # ── Info ──────────────────────────────────────────────────────────────
  /info:
    get:
      summary: Get node information
      tags: [info]
      responses:
        "200":
          description: Node status and configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeInfo"

  # ── Blocks ────────────────────────────────────────────────────────────
  /blocks:
    get:
      summary: Get paginated block IDs
      tags: [blocks]
      parameters:
        - $ref: "#/components/parameters/offsetParam"
        - $ref: "#/components/parameters/limitParam"
      responses:
        "200":
          description: Array of header IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /blocks/lastHeaders/{n}:
    get:
      summary: Get last n block headers
      tags: [blocks]
      parameters:
        - name: n
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Array of headers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Header"

  /blocks/chainSlice:
    get:
      summary: Get headers in height range
      tags: [blocks]
      parameters:
        - name: fromHeight
          in: query
          schema:
            type: integer
        - name: toHeight
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Array of headers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Header"

  /blocks/headerIds:
    post:
      summary: Get blocks by array of header IDs
      tags: [blocks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
      responses:
        "200":
          description: Blocks matching the IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Block"

  /blocks/modifier/{modifier_id}:
    get:
      summary: Get raw modifier bytes by ID
      tags: [blocks]
      parameters:
        - name: modifier_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Modifier data
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Modifier not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /blocks/at/{height}:
    get:
      summary: Get header IDs at height
      tags: [blocks]
      parameters:
        - name: height
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Array of header IDs at this height
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /blocks/{header_id}/header:
    get:
      summary: Get block header by ID
      tags: [blocks]
      parameters:
        - name: header_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Block header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Header"
        "404":
          description: Header not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /blocks/{header_id}/transactions:
    get:
      summary: Get block transactions by header ID
      tags: [blocks]
      parameters:
        - name: header_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Block transactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  headerId:
                    type: string
                  transactions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Transaction"
        "404":
          description: Block not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /blocks/{header_id}/proofFor/{tx_id}:
    get:
      summary: Get Merkle proof for transaction in block
      tags: [blocks]
      parameters:
        - name: header_id
          in: path
          required: true
          schema:
            type: string
        - name: tx_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Merkle proof
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerkleProof"
        "404":
          description: Block or transaction not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /blocks/{header_id}:
    get:
      summary: Get full block by header ID
      tags: [blocks]
      parameters:
        - name: header_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full block
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Block"
        "404":
          description: Block not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ── NiPoPoW ──────────────────────────────────────────────────────────
  /nipopow/popowHeaderById/{id}:
    get:
      summary: Get NiPoPoW header with interlinks by ID
      tags: [nipopow]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Popow header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PopowHeader"
        "404":
          description: Header not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /nipopow/popowHeaderByHeight/{h}:
    get:
      summary: Get NiPoPoW header by height
      tags: [nipopow]
      parameters:
        - name: h
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Popow header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PopowHeader"
        "404":
          description: Header not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /nipopow/proof/{m}/{k}/{id}:
    get:
      summary: Get NiPoPoW proof for specific header
      tags: [nipopow]
      parameters:
        - name: m
          in: path
          required: true
          schema:
            type: integer
        - name: k
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: NiPoPoW proof
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NipopowProof"

  /nipopow/proof/{m}/{k}:
    get:
      summary: Get NiPoPoW proof for best header
      tags: [nipopow]
      parameters:
        - name: m
          in: path
          required: true
          schema:
            type: integer
        - name: k
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: NiPoPoW proof
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NipopowProof"

  # ── Peers ─────────────────────────────────────────────────────────────
  /peers/connected:
    get:
      summary: Get connected peers
      tags: [peers]
      responses:
        "200":
          description: Connected peer list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Peer"

  /peers/all:
    get:
      summary: Get all known peers
      tags: [peers]
      responses:
        "200":
          description: All known peers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Peer"

  /peers/blacklisted:
    get:
      summary: Get blacklisted peers
      tags: [peers]
      responses:
        "200":
          description: Blacklisted peer addresses
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /peers/connect:
    post:
      summary: Connect to a peer
      tags: [peers]
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: string
              description: Peer address (host:port)
      responses:
        "200":
          description: Connection initiated
        "403":
          description: API key required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /peers/status:
    get:
      summary: Get peer manager status
      tags: [peers]
      responses:
        "200":
          description: Peer status summary
          content:
            application/json:
              schema:
                type: object

  /peers/syncInfo:
    get:
      summary: Get sync tracker information
      tags: [peers]
      responses:
        "200":
          description: Per-peer sync status
          content:
            application/json:
              schema:
                type: object

  /peers/trackInfo:
    get:
      summary: Get delivery tracker information
      tags: [peers]
      responses:
        "200":
          description: Delivery tracker snapshot
          content:
            application/json:
              schema:
                type: object

  # ── Transactions ──────────────────────────────────────────────────────
  /transactions:
    post:
      summary: Submit a transaction
      tags: [transactions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Transaction"
      responses:
        "200":
          description: Transaction ID
          content:
            application/json:
              schema:
                type: string
        "400":
          description: Invalid transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /transactions/check:
    post:
      summary: Validate transaction without submitting
      tags: [transactions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Transaction"
      responses:
        "200":
          description: Transaction ID if valid
          content:
            application/json:
              schema:
                type: string
        "400":
          description: Invalid transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /transactions/bytes:
    post:
      summary: Submit transaction from raw bytes (hex)
      tags: [transactions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: string
      responses:
        "200":
          description: Transaction ID
          content:
            application/json:
              schema:
                type: string
        "400":
          description: Invalid bytes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /transactions/checkBytes:
    post:
      summary: Validate transaction bytes without submitting
      tags: [transactions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: string
      responses:
        "200":
          description: Transaction ID if valid
          content:
            application/json:
              schema:
                type: string
        "400":
          description: Invalid bytes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /transactions/poolHistogram:
    get:
      summary: Get mempool fee histogram
      tags: [transactions]
      responses:
        "200":
          description: Histogram buckets
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /transactions/getFee:
    get:
      summary: Get recommended fee for wait time
      tags: [transactions]
      parameters:
        - name: waitTime
          in: query
          schema:
            type: integer
        - name: txSize
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recommended fee in nanoErg
          content:
            application/json:
              schema:
                type: integer
                format: int64

  /transactions/waitTime:
    get:
      summary: Get expected wait time for fee
      tags: [transactions]
      parameters:
        - name: fee
          in: query
          schema:
            type: integer
            format: int64
        - name: txSize
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Expected wait time in ms
          content:
            application/json:
              schema:
                type: integer
                format: int64

  /transactions/unconfirmed:
    get:
      summary: Get unconfirmed transactions (paginated)
      tags: [transactions]
      parameters:
        - $ref: "#/components/parameters/offsetParam"
        - $ref: "#/components/parameters/limitParam"
      responses:
        "200":
          description: Unconfirmed transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /transactions/unconfirmed/{tx_id}:
    get:
      summary: Get unconfirmed transaction by ID
      tags: [transactions]
      parameters:
        - name: tx_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unconfirmed transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          description: Not in mempool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /transactions/unconfirmed/transactionIds:
    get:
      summary: Get all unconfirmed transaction IDs
      tags: [transactions]
      responses:
        "200":
          description: Array of transaction IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /transactions/unconfirmed/byTransactionIds:
    post:
      summary: Get unconfirmed transactions by IDs
      tags: [transactions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
      responses:
        "200":
          description: Matching unconfirmed transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /transactions/unconfirmed/inputs/byBoxId/{id}:
    get:
      summary: Get unconfirmed input spending a box
      tags: [transactions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Spending input info
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /transactions/unconfirmed/outputs/byBoxId/{id}:
    get:
      summary: Get unconfirmed output by box ID
      tags: [transactions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unconfirmed output box
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErgoBox"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /transactions/unconfirmed/outputs/byTokenId/{id}:
    get:
      summary: Get unconfirmed outputs containing token
      tags: [transactions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching output boxes
          content:
            application/json:
              schema:
                type: array
                items:

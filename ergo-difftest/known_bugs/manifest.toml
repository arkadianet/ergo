# Known-bug manifest for the re-injection gate.
# Schema defined in ergo-difftest/docs/interface-contracts.md §5.1.
#
# wire_reachable = true  → trigger_hex is present; patch + gate fully exercisable.
# wire_reachable = false → SD bug; trigger_hex = ""; replay-driver path (future).
#
# Detection channels (§5.2):
#   canonical     → difftest --repro <trigger_hex> --surface <s> --check-canonical <expected_canonical>
#   accept-reject → difftest --oracle --repro <trigger_hex> --surface <s>
#   cost          → difftest --oracle --repro <trigger_hex> --surface reduce
#   panic         → difftest --repro <trigger_hex> --surface <s>  (looks for [BUG] PANIC)

# ---------------------------------------------------------------------------
# 1. relation2-0x85-noncanonical  [PATCH VERIFIED, DEMONSTRATED]
# ---------------------------------------------------------------------------
[[bug]]
id             = "relation2-0x85-noncanonical"
surface        = "ergo_tree"
class          = "canonical"
wire_reachable = true
fix_file       = "ergo-ser/src/opcode/write.rs"
reinject       = "In write_payload Payload::Two arm, remove the relation2_bool_pair branch and always call write_expr(w, a) then write_expr(w, b)"
budget_iters   = 50000
trigger_hex    = "00938503"
# 00 = v0 no-size no-cseg header; 93 = Eq opcode; 85 = bool-pair marker; 03 = both true (bits 0+1)
expected_canonical = "00938503"
# Bugged write produces: 009301010101 (expanded: type=SBoolean=0x01 value=true=0x01, twice)
note = "HERMETIC: difftest --repro 00938503 --surface ergo_tree --check-canonical 00938503"


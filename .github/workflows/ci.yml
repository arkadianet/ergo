name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

# Least privilege: every job here only reads the repo (build/test/lint/audit).
permissions:
  contents: read

jobs:
  check:
    name: Check, clippy, test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # Toolchain is pinned via rust-toolchain.toml at the repo root.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --all

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all

      # `cargo test --all` above does not build with --features cost-trace,
      # so the feature-gated recording sites in `ergo-sigma` do not get
      # exercised. This step compiles and runs the two integration tests
      # that DO exercise the feature (`cost_trace_smoke` covers OP/Method
      # recording sites and the trace-shape contract; `traced_untraced_parity`
      # guards that enabling the feature does not perturb result or cost).
      # Coverage is narrow but enough to catch the common regression class
      # — a feature-gated `cost_trace::record(...)` site referencing the
      # wrong identifier and breaking the build under the feature.
      - name: cargo test (cost-trace feature)
        run: cargo test -p ergo-sigma --features cost-trace --test cost_trace_smoke --test traced_untraced_parity

  audit:
    name: cargo-audit (security advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: audit
      - name: install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        # --ignore RUSTSEC-2025-0141: bincode 1.x is unmaintained with no
        # patched version. It is used only for local wallet-state persistence
        # (not consensus), and migrating would break existing wallet DBs.
        # Full rationale lives in deny.toml [advisories]; keep the two in sync.
        run: cargo audit --deny warnings --ignore RUSTSEC-2025-0141

  deny:
    name: cargo-deny (licenses + duplicates + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: deny
      - name: install cargo-deny
        run: cargo install cargo-deny --locked
      - name: cargo deny check
        run: cargo deny check

  machete:
    name: cargo-machete (unused dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: machete
      - name: install cargo-machete
        run: cargo install cargo-machete --locked
      - name: cargo machete
        run: cargo machete

  diagnostics:
    name: cargo build (diagnostics feature compile-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: diagnostics
      # The diagnostic-only integration tests (`diagnose_block_*`,
      # `trace_*`, `parity_triage`, `eval_error_triage`, `cost_parity`,
      # `m7_scala_oracle`, `roundtrip_triage`) are gated behind the
      # `diagnostics` feature in their respective crates. Compile-only
      # because most need external state (gitignored mainnet vectors,
      # captured `/tmp/block_*.json` files, a running Scala node) that
      # CI doesn't have. The compile guarantees the feature-gated
      # bodies stay valid — runtime execution stays operator-driven.
      - name: cargo test --features diagnostics --no-run (ergo-validation)
        run: cargo test --no-run -p ergo-validation --features diagnostics
      - name: cargo test --features diagnostics --no-run (ergo-mempool)
        run: cargo test --no-run -p ergo-mempool --features diagnostics
      - name: cargo test --features diagnostics --no-run (ergo-ser)
        run: cargo test --no-run -p ergo-ser --features diagnostics

  difftest:
    name: difftest (structured hermetic campaign + coverage gate)
    runs-on: ubuntu-latest
    # Fail fast if the structured campaign hangs rather than burning the runner.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0

      - uses: Swatinem/rust-cache@v2
        with:
          key: difftest

      # Build in release mode so 50 000 iters stays under 2 minutes.
      - name: cargo build (release)
        run: cargo build --release -p ergo-difftest

      # Unit tests for fuzz_one (stable, no nightly required).
      - name: cargo test -p ergo-difftest
        run: cargo test -p ergo-difftest

      # Structured campaign: structure-aware generators + fixed-point invariant
      # + coverage gate. Exit non-zero on any invariant violation (Bug) OR if the
      # generator union coverage drops below 80 % of the declared adversarial
      # vocabulary. This catches a broken generator that silently stops producing
      # adversarial features.
      #
      # 50 000 iters ≈ 30 s on ubuntu-latest; full vocabulary is reachable in
      # < 40 000 iters per surface (verified by gen_coverage tests).
      #
      # The JVM-oracle differential and replay driver are NOT run here — they
      # need scala-cli + a live Scala node and are run manually by the operator.
      - name: run structured campaign (50 000 iters, min-coverage 0.80)
        run: |
          cargo run --release -p ergo-difftest -- \
            --structured --iters 50000 --min-coverage 0.80

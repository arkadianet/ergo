name: Release binaries

# Triggered by pushing a tag of the form `v*` (e.g. `v0.3.0`), or manually via
# workflow_dispatch with a `tag` input. Builds ergo-node + ergo-wallet for
# Linux (glibc + static musl), macOS, and Windows on x86_64. For each platform
# it publishes the bare binary, a `.tar.gz` / `.zip` archive (binary + README +
# licenses + CHANGELOG + SECURITY), and a `.sha256` for each, all uploaded to
# the GitHub Release (created if it does not already exist).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build + publish (e.g. v0.3.0)'
        required: true
        type: string

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --bin ergo-node --bin ergo-wallet --target ${{ matrix.target }}

      - name: Stage artifacts (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release"
          for b in ergo-node ergo-wallet; do
            # Bare binary, renamed with the target suffix.
            cp "$bin/$b" "$b-${{ matrix.target }}"
            # Archive: binary + docs + licenses.
            rm -rf "stage/$b" && mkdir -p "stage/$b"
            cp "$bin/$b" README.md LICENSE-MIT LICENSE-APACHE CHANGELOG.md SECURITY.md "stage/$b/"
            tar -czf "$b-${{ matrix.target }}.tar.gz" -C "stage/$b" .
            # Checksums for both the bare binary and the archive.
            shasum -a 256 "$b-${{ matrix.target }}"        > "$b-${{ matrix.target }}.sha256"
            shasum -a 256 "$b-${{ matrix.target }}.tar.gz" > "$b-${{ matrix.target }}.tar.gz.sha256"
          done

      - name: Stage artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release"
          foreach ($b in "ergo-node", "ergo-wallet") {
            Copy-Item "$bin/$b.exe" "$b-${{ matrix.target }}.exe"
            Remove-Item -Recurse -Force "stage/$b" -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Force "stage/$b" | Out-Null
            Copy-Item "$bin/$b.exe" "stage/$b/"
            Copy-Item README.md, LICENSE-MIT, LICENSE-APACHE, CHANGELOG.md, SECURITY.md "stage/$b/"
            Compress-Archive -Path "stage/$b/*" -DestinationPath "$b-${{ matrix.target }}.zip" -Force
            foreach ($f in "$b-${{ matrix.target }}.exe", "$b-${{ matrix.target }}.zip") {
              $h = (Get-FileHash -Algorithm SHA256 $f).Hash.ToLower()
              "$h  $f" | Out-File -Encoding ascii "$f.sha256"
            }
          }

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            ergo-node-${{ matrix.target }}*
            ergo-wallet-${{ matrix.target }}*

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          # Pre-1.0 releases are pre-release only when the tag carries an
          # -alpha / -beta / -rc suffix. The release body is managed manually
          # (not overwritten here) so curated notes survive a re-run.
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          files: artifacts/**/*
